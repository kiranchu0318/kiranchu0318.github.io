<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報表匯率管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC' } } }
        }
    </script>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <h1 class="ui-page-title">報表匯率管理</h1>
        </header>

        <!-- 列表卡片 -->
        <section class="ui-card flex flex-col p-4 sm:p-6 space-y-4">

            <!-- 工具列：期間 + 基準幣別 + 新增 -->
            <div class="flex flex-col lg:flex-row items-stretch lg:items-center justify-between gap-3">
                <div class="flex flex-wrap items-center gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold text-text-muted mb-1">報表期間</label>
                        <select id="period-filter" onchange="render()" class="ui-select">
                            <option value="2026-06">2026 年 06 月</option>
                            <option value="2026-05">2026 年 05 月</option>
                            <option value="2026-04">2026 年 04 月</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-text-muted mb-1">基準幣別</label>
                        <select id="base-currency" disabled class="ui-select bg-[#e9ecef] text-gray-500 cursor-not-allowed">
                            <option>CNY（人民幣）</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-end">
                    <button onclick="openRateModal()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-plus"></i> 新增匯率</button>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">月結匯率表</h2>
                <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆</span>
                <span class="text-xs text-gray-400">（以 1 外幣 = X 基準幣別 計算）</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table whitespace-nowrap">
                    <thead>
                        <tr>
                            <th class="text-left w-40">幣別</th>
                            <th class="text-center w-28">代碼</th>
                            <th class="text-right w-40">匯率（兌 CNY）</th>
                            <th class="text-center w-32">生效日期</th>
                            <th class="text-center w-40">操作</th>
                        </tr>
                    </thead>
                    <tbody id="rate-tbody"></tbody>
                </table>
            </div>

            <div id="no-data-view" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-money-bill-transfer text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">此期間尚無匯率資料</p>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>

    </div>

    <!-- 新增 / 編輯 匯率 彈窗 -->
    <div id="rate-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
                <h3 id="rate-modal-title" class="text-base font-bold text-gray-900">新增匯率</h3>
                <button onclick="closeRateModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 overflow-y-auto space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">幣別 <span class="text-rose-500">*</span></label>
                    <select id="rate-currency" class="ui-select">
                        <option value="USD|美元">USD（美元）</option>
                        <option value="TWD|新台幣">TWD（新台幣）</option>
                        <option value="JPY|日圓">JPY（日圓）</option>
                        <option value="EUR|歐元">EUR（歐元）</option>
                        <option value="GBP|英鎊">GBP（英鎊）</option>
                        <option value="MYR|馬來西亞令吉">MYR（馬來西亞令吉）</option>
                        <option value="HKD|港幣">HKD（港幣）</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">匯率（1 外幣 = ? CNY）<span class="text-rose-500">*</span></label>
                    <input type="text" id="rate-value" inputmode="decimal" placeholder="例如：7.1400" class="ui-input">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">生效日期</label>
                    <input type="date" id="rate-date" class="ui-input cursor-pointer">
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100 flex-shrink-0">
                <button onclick="closeRateModal()" class="ui-btn ui-btn-secondary">取消</button>
                <button onclick="saveRate()" class="ui-btn ui-btn-primary">儲存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium opacity-0 translate-y-3 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-circle-check text-emerald-400"></i><span id="toast-text"></span>
    </div>

    <script>
        // 各期間的匯率資料（以 1 外幣 = X CNY）
        const ratesByPeriod = {
            '2026-06': [
                { id: 1, code: 'USD', name: '美元', rate: '7.1400', date: '2026-06-01', status: '啟用' },
                { id: 2, code: 'TWD', name: '新台幣', rate: '0.2280', date: '2026-06-01', status: '啟用' },
                { id: 3, code: 'JPY', name: '日圓', rate: '0.0460', date: '2026-06-01', status: '啟用' },
                { id: 4, code: 'EUR', name: '歐元', rate: '7.6900', date: '2026-06-01', status: '啟用' },
                { id: 5, code: 'HKD', name: '港幣', rate: '0.9120', date: '2026-06-01', status: '停用' },
            ],
            '2026-05': [
                { id: 1, code: 'USD', name: '美元', rate: '7.2050', date: '2026-05-01', status: '啟用' },
                { id: 2, code: 'TWD', name: '新台幣', rate: '0.2265', date: '2026-05-01', status: '啟用' },
                { id: 3, code: 'JPY', name: '日圓', rate: '0.0471', date: '2026-05-01', status: '啟用' },
            ],
            '2026-04': [
                { id: 1, code: 'USD', name: '美元', rate: '7.2380', date: '2026-04-01', status: '啟用' },
                { id: 2, code: 'TWD', name: '新台幣', rate: '0.2250', date: '2026-04-01', status: '啟用' },
            ],
        };
        let editingId = null;

        const currentPeriod = () => document.getElementById('period-filter').value;

        function render() {
            const list = ratesByPeriod[currentPeriod()] || [];
            const tbody = document.getElementById('rate-tbody');
            tbody.innerHTML = list.map(r =>
                '<tr>' +
                '<td class="text-left font-medium text-gray-800">' + r.name + '</td>' +
                '<td class="text-center"><span class="font-mono text-gray-600">' + r.code + '</span></td>' +
                '<td class="text-right font-semibold text-gray-900 tabular-nums">' + r.rate + '</td>' +
                '<td class="text-center text-gray-500">' + r.date + '</td>' +
                '<td class="text-center"><div class="flex items-center justify-center gap-2">' +
                    '<button onclick="openRateModal(' + r.id + ')" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen"></i> 編輯</button>' +
                    '<button onclick="deleteRate(' + r.id + ')" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i></button>' +
                '</div></td>' +
                '</tr>'
            ).join('');
            document.getElementById('count-badge').innerText = list.length + ' 筆';
            document.getElementById('pagination-info').innerText = '顯示第 ' + (list.length ? 1 : 0) + ' 到 ' + list.length + ' 筆，共 ' + list.length + ' 筆記錄';
            document.getElementById('no-data-view').classList.toggle('hidden', list.length > 0);
        }

        function openRateModal(id) {
            editingId = id || null;
            document.getElementById('rate-modal-title').innerText = editingId ? '編輯匯率' : '新增匯率';
            const list = ratesByPeriod[currentPeriod()] || [];
            const r = editingId ? list.find(x => x.id === editingId) : null;
            document.getElementById('rate-currency').value = r ? (r.code + '|' + r.name) : 'USD|美元';
            document.getElementById('rate-value').value = r ? r.rate : '';
            document.getElementById('rate-date').value = r ? r.date : (currentPeriod() + '-01');
            document.getElementById('rate-modal').classList.remove('hidden');
        }
        function closeRateModal() { document.getElementById('rate-modal').classList.add('hidden'); }

        function saveRate() {
            const val = document.getElementById('rate-value').value.trim();
            if (!val || isNaN(parseFloat(val))) { showToast('請輸入有效的匯率數值'); return; }
            const [code, name] = document.getElementById('rate-currency').value.split('|');
            const date = document.getElementById('rate-date').value || (currentPeriod() + '-01');
            const list = ratesByPeriod[currentPeriod()] || (ratesByPeriod[currentPeriod()] = []);
            if (editingId) {
                const r = list.find(x => x.id === editingId);
                if (r) { r.code = code; r.name = name; r.rate = parseFloat(val).toFixed(4); r.date = date; }
                showToast('已更新匯率');
            } else {
                const nextId = list.length ? Math.max(...list.map(x => x.id)) + 1 : 1;
                list.push({ id: nextId, code, name, rate: parseFloat(val).toFixed(4), date });
                showToast('已新增匯率');
            }
            closeRateModal();
            render();
        }

        function deleteRate(id) {
            const list = ratesByPeriod[currentPeriod()] || [];
            const r = list.find(x => x.id === id);
            if (!r) return;
            if (!confirm('確定要刪除「' + r.name + '（' + r.code + '）」的匯率嗎？')) return;
            ratesByPeriod[currentPeriod()] = list.filter(x => x.id !== id);
            render();
            showToast('已刪除匯率');
        }

        let toastTimer = null;
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 12px)'; }, 2200);
        }

        document.getElementById('rate-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRateModal(); });
        render();
    </script>

</body>
</html>
