<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件庫管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC' } } }
        }
    </script>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <h1 class="ui-page-title">文件庫管理</h1>
        </header>

        <!-- 主版面：左側資料夾選單 + 右側檔案 -->
        <div class="ui-card overflow-hidden flex flex-col lg:flex-row min-h-[620px]">

            <!-- 左側：地區資料夾選單 -->
            <aside class="lg:w-64 shrink-0 border-b lg:border-b-0 lg:border-r border-gray-100 flex flex-col">
                <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between gap-2">
                    <h2 class="font-bold text-gray-900 text-sm">地區資料夾 <span id="folder-count" class="text-xs font-medium text-gray-400">(0)</span></h2>
                    <button onclick="openFolderModal()" class="ui-btn ui-btn-primary ui-btn-sm" title="新增地區資料夾"><i class="fa-solid fa-folder-plus"></i></button>
                </div>
                <div class="px-3 py-2 border-b border-gray-100">
                    <div class="ui-search w-full">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="folder-search" oninput="renderFolders()" placeholder="搜尋資料夾 / 地區..." class="ui-input ui-search-input">
                    </div>
                </div>
                <div id="folder-list" class="flex-1 overflow-y-auto p-2 space-y-1 lg:max-h-[560px]"></div>
                <div id="no-folder" class="hidden p-6 text-center text-sm text-gray-400">尚無資料夾</div>
            </aside>

            <!-- 右側：選定資料夾的檔案 -->
            <section class="flex-1 min-w-0 flex flex-col p-4 sm:p-6">

                <!-- 空狀態 -->
                <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-center text-gray-400 gap-3">
                    <i class="fa-regular fa-folder-open text-4xl"></i>
                    <p class="text-sm">請於左側選擇資料夾，或新增地區資料夾</p>
                </div>

                <!-- 檔案內容 -->
                <div id="file-content" class="hidden flex-1 flex flex-col space-y-4">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid fa-folder text-amber-400"></i>
                                <h2 id="folder-title" class="text-lg font-bold text-gray-900 truncate"></h2>
                                <span id="folder-region-badge" class="ui-badge ui-badge-info shrink-0"></span>
                            </div>
                            <p id="folder-perm" class="text-xs text-gray-400 mt-0.5"></p>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="openFolderModal(currentFolderId)" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen"></i> 編輯</button>
                            <button onclick="deleteFolder(currentFolderId)" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                            <button onclick="openFileModal()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-plus"></i> 新增檔案</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto rounded-lg border border-gray-100">
                        <table class="ui-table whitespace-nowrap">
                            <thead>
                                <tr>
                                    <th class="text-left">檔案名稱</th>
                                    <th class="text-center w-28">大小</th>
                                    <th class="text-center w-32">上傳日期</th>
                                    <th class="text-center w-44">操作</th>
                                </tr>
                            </thead>
                            <tbody id="file-tbody"></tbody>
                        </table>
                    </div>

                    <div id="no-file" class="hidden py-16 text-center space-y-3">
                        <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-regular fa-folder-open text-3xl"></i></div>
                        <p class="text-sm text-gray-500 font-medium">此資料夾尚無檔案，請新增檔案</p>
                    </div>
                </div>
            </section>
        </div>

    </div>

    <!-- ============ 新增 / 編輯 地區資料夾 彈窗 ============ -->
    <div id="folder-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 id="folder-modal-title" class="text-base font-bold text-gray-900">新增地區資料夾</h3>
                <button onclick="closeFolderModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">資料夾名稱 <span class="text-rose-500">*</span></label>
                    <input type="text" id="folder-name" placeholder="例如：T1 區營運文件" class="ui-input">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">指向地區 <span class="text-rose-500">*</span></label>
                    <select id="folder-region" class="ui-select"></select>
                    <p class="text-xs text-gray-400 mt-1.5">僅所選地區的員工可檢視此資料夾的文件；選「全區」則所有員工皆可檢視。</p>
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100">
                <button onclick="closeFolderModal()" class="ui-btn ui-btn-secondary">取消</button>
                <button onclick="saveFolder()" class="ui-btn ui-btn-primary">儲存</button>
            </div>
        </div>
    </div>

    <!-- ============ 新增檔案 彈窗 ============ -->
    <div id="file-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="text-base font-bold text-gray-900">新增檔案</h3>
                <button onclick="closeFileModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">檔案名稱 <span class="text-rose-500">*</span></label>
                    <input type="text" id="file-name" placeholder="例如：員工手冊 2026.pdf" class="ui-input">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">上傳檔案</label>
                    <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-white">
                        <button type="button" onclick="document.getElementById('file-input').click()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 border-r border-gray-300 text-sm font-medium transition cursor-pointer shrink-0">選擇檔案</button>
                        <span id="file-input-name" class="px-3 text-sm text-gray-500 grow whitespace-nowrap truncate">未選擇任何檔案</span>
                        <input type="file" id="file-input" class="hidden" onchange="onFilePicked(this)">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100">
                <button onclick="closeFileModal()" class="ui-btn ui-btn-secondary">取消</button>
                <button onclick="saveFile()" class="ui-btn ui-btn-primary">新增</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium opacity-0 translate-y-3 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-circle-check text-emerald-400"></i><span id="toast-text"></span>
    </div>

    <script>
        // 可指向的地區（admin 建立資料夾時選擇）
        const REGIONS = ['全區', 'THQ（台灣總部）', 'T1', 'T2', 'U', 'M', 'S', 'J', 'K', '馬來西亞', '新加坡'];

        // 地區資料夾（每個資料夾綁定一個地區，內含檔案）
        let folders = [
            { id: 1, name: '公司制度與規範', region: '全區', files: [
                { id: 1, name: '員工手冊 2026.pdf', size: '2.4 MB', date: '2026-01-15' },
                { id: 2, name: '差旅報銷規範.pdf', size: '880 KB', date: '2026-03-02' },
                { id: 3, name: '資訊安全政策.pdf', size: '1.1 MB', date: '2026-02-10' }
            ] },
            { id: 2, name: '台灣總部文件', region: 'THQ（台灣總部）', files: [
                { id: 1, name: '組織架構圖.pdf', size: '450 KB', date: '2026-05-12' },
                { id: 2, name: '總部辦公室規範.docx', size: '320 KB', date: '2026-04-05' }
            ] },
            { id: 3, name: 'T1 區營運文件', region: 'T1', files: [
                { id: 1, name: 'T1 區出勤規範.pdf', size: '210 KB', date: '2026-03-18' }
            ] },
            { id: 4, name: 'T2 區營運文件', region: 'T2', files: [] }
        ];

        let currentFolderId = null;
        let editingFolderId = null;

        // 與「文件庫（人員視角）」共用：持久化資料夾設定
        const LS_FOLDERS = 'hroa_doc_folders';
        (function loadFolders() {
            try {
                const f = JSON.parse(localStorage.getItem(LS_FOLDERS));
                if (Array.isArray(f) && f.length) folders = f;
            } catch (e) {}
        })();
        function persist() {
            try { localStorage.setItem(LS_FOLDERS, JSON.stringify(folders)); } catch (e) {}
        }

        const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const permText = region => region === '全區' ? '所有員工皆可檢視' : `僅「${region}」地區員工可檢視`;
        const currentFolder = () => folders.find(f => f.id === currentFolderId);

        /* ============ 左側資料夾選單 ============ */
        function renderFolders() {
            const kw = (document.getElementById('folder-search').value || '').trim().toLowerCase();
            const list = folders.filter(f => !kw || f.name.toLowerCase().includes(kw) || f.region.toLowerCase().includes(kw));
            const box = document.getElementById('folder-list');
            const onCls = 'w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-3 bg-primary-light text-primary transition-colors';
            const offCls = 'w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-3 text-gray-600 hover:bg-gray-50 transition-colors';
            box.innerHTML = list.map(f => `
                <button onclick="selectFolder(${f.id})" class="${f.id === currentFolderId ? onCls : offCls}">
                    <i class="fa-solid fa-folder ${f.id === currentFolderId ? 'text-primary' : 'text-amber-400'} shrink-0"></i>
                    <span class="flex-1 min-w-0">
                        <span class="block text-sm font-semibold truncate">${esc(f.name)}</span>
                        <span class="block text-xs ${f.id === currentFolderId ? 'text-primary/70' : 'text-gray-400'} truncate">${esc(f.region)} · ${f.files.length} 檔</span>
                    </span>
                </button>
            `).join('');
            document.getElementById('folder-count').innerText = `(${folders.length})`;
            document.getElementById('no-folder').classList.toggle('hidden', list.length > 0);
        }

        function selectFolder(id) {
            currentFolderId = id;
            renderFolders();
            renderFiles();
        }

        /* ============ 右側檔案 ============ */
        function renderFiles() {
            const f = currentFolder();
            const empty = document.getElementById('empty-state');
            const content = document.getElementById('file-content');
            if (!f) {
                empty.classList.remove('hidden');
                content.classList.add('hidden');
                return;
            }
            empty.classList.add('hidden');
            content.classList.remove('hidden');
            document.getElementById('folder-title').innerText = f.name;
            document.getElementById('folder-region-badge').innerText = f.region;
            document.getElementById('folder-perm').innerHTML = '<i class="fa-solid fa-user-shield mr-1"></i>' + permText(f.region);
            const tbody = document.getElementById('file-tbody');
            tbody.innerHTML = f.files.map(file => `
                <tr>
                    <td class="text-left font-medium text-gray-800"><i class="fa-regular fa-file-lines text-primary mr-2"></i>${esc(file.name)}</td>
                    <td class="text-center text-gray-500">${esc(file.size || '—')}</td>
                    <td class="text-center text-gray-500">${esc(file.date || '')}</td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="downloadFile(${file.id})" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-download"></i> 下載</button>
                            <button onclick="deleteFile(${file.id})" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            const noFile = f.files.length === 0;
            document.getElementById('no-file').classList.toggle('hidden', !noFile);
            tbody.parentElement.classList.toggle('hidden', noFile);
        }

        /* ============ 地區資料夾 新增 / 編輯 ============ */
        function openFolderModal(id) {
            editingFolderId = id || null;
            const f = editingFolderId ? folders.find(x => x.id === editingFolderId) : null;
            document.getElementById('folder-modal-title').innerText = editingFolderId ? '編輯地區資料夾' : '新增地區資料夾';
            const sel = document.getElementById('folder-region');
            sel.innerHTML = REGIONS.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('');
            document.getElementById('folder-name').value = f ? f.name : '';
            sel.value = f ? f.region : '全區';
            document.getElementById('folder-modal').classList.remove('hidden');
        }
        function closeFolderModal() { document.getElementById('folder-modal').classList.add('hidden'); }

        function saveFolder() {
            const name = document.getElementById('folder-name').value.trim();
            const region = document.getElementById('folder-region').value;
            if (!name) { showToast('請輸入資料夾名稱'); return; }
            if (editingFolderId) {
                const f = folders.find(x => x.id === editingFolderId);
                if (f) { f.name = name; f.region = region; }
                showToast('已更新資料夾');
                renderFolders();
                renderFiles();
            } else {
                const nextId = folders.length ? Math.max(...folders.map(f => f.id)) + 1 : 1;
                folders.push({ id: nextId, name, region, files: [] });
                showToast('已新增地區資料夾');
                selectFolder(nextId);
            }
            persist();
            closeFolderModal();
        }

        function deleteFolder(id) {
            const f = folders.find(x => x.id === id);
            if (!f) return;
            if (!confirm(`確定要刪除資料夾「${f.name}」嗎？\n其中的 ${f.files.length} 個檔案也會一併刪除。`)) return;
            folders = folders.filter(x => x.id !== id);
            persist();
            if (currentFolderId === id) currentFolderId = folders.length ? folders[0].id : null;
            renderFolders();
            renderFiles();
            showToast('已刪除資料夾');
        }

        /* ============ 檔案 新增 / 刪除 ============ */
        function openFileModal() {
            if (!currentFolder()) { showToast('請先選擇資料夾'); return; }
            document.getElementById('file-name').value = '';
            document.getElementById('file-input-name').innerText = '未選擇任何檔案';
            document.getElementById('file-input').value = '';
            document.getElementById('file-modal').classList.remove('hidden');
        }
        function closeFileModal() { document.getElementById('file-modal').classList.add('hidden'); }

        function onFilePicked(input) {
            const file = input.files && input.files[0];
            document.getElementById('file-input-name').innerText = file ? file.name : '未選擇任何檔案';
            if (file && !document.getElementById('file-name').value.trim()) {
                document.getElementById('file-name').value = file.name;
            }
        }

        function saveFile() {
            const f = currentFolder();
            if (!f) return;
            const name = document.getElementById('file-name').value.trim();
            if (!name) { showToast('請輸入檔案名稱'); return; }
            const picked = document.getElementById('file-input').files[0];
            const size = picked ? fmtSize(picked.size) : '—';
            const today = new Date().toISOString().slice(0, 10);
            const nextId = f.files.length ? Math.max(...f.files.map(x => x.id)) + 1 : 1;
            f.files.push({ id: nextId, name, size, date: today });
            persist();
            closeFileModal();
            renderFolders();
            renderFiles();
            showToast('已新增檔案');
        }

        function deleteFile(fileId) {
            const f = currentFolder();
            if (!f) return;
            const file = f.files.find(x => x.id === fileId);
            if (!file) return;
            if (!confirm(`確定要刪除檔案「${file.name}」嗎？`)) return;
            f.files = f.files.filter(x => x.id !== fileId);
            persist();
            renderFolders();
            renderFiles();
            showToast('已刪除檔案');
        }

        function downloadFile(fileId) {
            const f = currentFolder();
            if (!f) return;
            const file = f.files.find(x => x.id === fileId);
            if (!file) return;
            const blob = new Blob(['這是檔案「' + file.name + '」的示意內容（範例下載）。'], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = file.name;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function fmtSize(b) {
            return b >= 1048576 ? (b / 1048576).toFixed(1) + ' MB' : b >= 1024 ? (b / 1024).toFixed(0) + ' KB' : b + ' B';
        }

        /* ============ Toast ============ */
        let toastTimer = null;
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 12px)'; }, 2200);
        }

        document.getElementById('folder-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeFolderModal(); });
        document.getElementById('file-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeFileModal(); });

        // 初始化：預設選取第一個資料夾
        currentFolderId = folders.length ? folders[0].id : null;
        renderFolders();
        renderFiles();
    </script>

</body>
</html>
