<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件庫管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC' } } }
        }
    </script>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <h1 class="ui-page-title">文件庫管理</h1>
        </header>

        <!-- 列表卡片 -->
        <section class="ui-card flex flex-col p-4 sm:p-6 space-y-4">

            <!-- 工具列：搜尋 + 新增 -->
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3">
                <div class="flex flex-wrap items-center gap-2">
                    <div class="ui-search w-full sm:w-72">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" oninput="render()" placeholder="搜尋文件名稱..." class="ui-input ui-search-input">
                    </div>
                    <select id="cat-filter" onchange="render()" class="ui-select">
                        <option value="">全部分類</option>
                        <option>制度</option>
                        <option>規範</option>
                        <option>政策</option>
                        <option>流程</option>
                        <option>表單</option>
                        <option>公告</option>
                    </select>
                </div>
                <button onclick="openDocModal()" class="ui-btn ui-btn-primary w-full sm:w-auto">
                    <i class="fa-solid fa-plus"></i> 新增文件
                </button>
            </div>

            <div class="flex items-center gap-2">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">公司文件列表</h2>
                <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table whitespace-nowrap">
                    <thead>
                        <tr>
                            <th class="text-left">文件名稱</th>
                            <th class="text-center w-24">分類</th>
                            <th class="text-center w-24">大小</th>
                            <th class="text-center w-32">發布單位</th>
                            <th class="text-center w-32">更新日期</th>
                            <th class="text-center w-24">狀態</th>
                            <th class="text-center w-40">操作</th>
                        </tr>
                    </thead>
                    <tbody id="doc-tbody"></tbody>
                </table>
            </div>

            <div id="no-data-view" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-folder-open text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的資料</p>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>

    </div>

    <!-- 新增 / 編輯 文件 彈窗 -->
    <div id="doc-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
                <h3 id="doc-modal-title" class="text-base font-bold text-gray-900">新增文件</h3>
                <button onclick="closeDocModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 overflow-y-auto space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">文件名稱 <span class="text-rose-500">*</span></label>
                    <input type="text" id="doc-name" placeholder="請輸入文件名稱" class="ui-input">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-text-muted mb-1.5">分類 <span class="text-rose-500">*</span></label>
                        <select id="doc-cat" class="ui-select">
                            <option>制度</option><option>規範</option><option>政策</option><option>流程</option><option>表單</option><option>公告</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-text-muted mb-1.5">發布單位 <span class="text-rose-500">*</span></label>
                        <select id="doc-unit" class="ui-select">
                            <option>董事長辦公室</option><option>總經理辦公室</option><option>項目管理辦公室</option><option>人事中心</option><option>行政中心</option><option>財務中心</option><option>法務中心</option><option>運維中心</option><option>研發中心</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">狀態</label>
                    <select id="doc-status" class="ui-select"><option>已發布</option><option>草稿</option></select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">上傳檔案</label>
                    <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-white">
                        <button type="button" onclick="document.getElementById('doc-file').click()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 border-r border-gray-300 text-sm font-medium transition cursor-pointer shrink-0">選擇檔案</button>
                        <span id="doc-file-name" class="px-3 text-sm text-gray-500 grow whitespace-nowrap truncate">未選擇任何檔案</span>
                        <input type="file" id="doc-file" class="hidden" onchange="document.getElementById('doc-file-name').innerText = this.files[0] ? this.files[0].name : '未選擇任何檔案'">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100 flex-shrink-0">
                <button onclick="closeDocModal()" class="ui-btn ui-btn-secondary">取消</button>
                <button onclick="saveDoc()" class="ui-btn ui-btn-primary">儲存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium opacity-0 translate-y-3 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-circle-check text-emerald-400"></i><span id="toast-text"></span>
    </div>

    <script>
        let docs = [
            { id: 1, name: '員工手冊 2026.pdf', cat: '制度', size: '2.4 MB', unit: '人事中心', date: '2026-01-15', status: '已發布' },
            { id: 2, name: '差旅報銷規範.pdf', cat: '規範', size: '880 KB', unit: '財務中心', date: '2026-03-02', status: '已發布' },
            { id: 3, name: '資訊安全政策.pdf', cat: '政策', size: '1.1 MB', unit: '運維中心', date: '2026-02-10', status: '已發布' },
            { id: 4, name: '請購作業流程說明.docx', cat: '流程', size: '320 KB', unit: '行政中心', date: '2026-04-05', status: '已發布' },
            { id: 5, name: '組織架構圖.pdf', cat: '公告', size: '450 KB', unit: '總經理辦公室', date: '2026-05-12', status: '草稿' },
        ];
        let editingId = null;

        function statusBadge(s) {
            return s === '已發布'
                ? '<span class="ui-badge ui-badge-success">已發布</span>'
                : '<span class="ui-badge ui-badge-gray">草稿</span>';
        }

        function render() {
            const kw = (document.getElementById('search-input').value || '').trim().toLowerCase();
            const cat = document.getElementById('cat-filter').value;
            const list = docs.filter(d =>
                (!kw || d.name.toLowerCase().includes(kw)) &&
                (!cat || d.cat === cat)
            );
            const tbody = document.getElementById('doc-tbody');
            tbody.innerHTML = list.map(d =>
                '<tr>' +
                '<td class="text-left font-medium text-gray-800"><i class="fa-regular fa-file-lines text-primary mr-2"></i>' + d.name + '</td>' +
                '<td class="text-center"><span class="ui-badge ui-badge-info">' + d.cat + '</span></td>' +
                '<td class="text-center text-gray-500">' + d.size + '</td>' +
                '<td class="text-center text-gray-600">' + d.unit + '</td>' +
                '<td class="text-center text-gray-500">' + d.date + '</td>' +
                '<td class="text-center">' + statusBadge(d.status) + '</td>' +
                '<td class="text-center"><div class="flex items-center justify-center gap-2">' +
                    '<button onclick="openDocModal(' + d.id + ')" class="ui-btn ui-btn-secondary ui-btn-sm" title="編輯"><i class="fa-solid fa-pen"></i> 編輯</button>' +
                    '<button onclick="downloadDoc(' + d.id + ')" class="ui-btn ui-btn-primary ui-btn-sm" title="下載"><i class="fa-solid fa-download"></i></button>' +
                    '<button onclick="deleteDoc(' + d.id + ')" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50" title="刪除"><i class="fa-solid fa-trash-can"></i></button>' +
                '</div></td>' +
                '</tr>'
            ).join('');
            document.getElementById('count-badge').innerText = list.length + ' 筆資料';
            document.getElementById('pagination-info').innerText = '顯示第 ' + (list.length ? 1 : 0) + ' 到 ' + list.length + ' 筆，共 ' + list.length + ' 筆記錄';
            document.getElementById('no-data-view').classList.toggle('hidden', list.length > 0);
        }

        function openDocModal(id) {
            editingId = id || null;
            document.getElementById('doc-modal-title').innerText = editingId ? '編輯文件' : '新增文件';
            const d = editingId ? docs.find(x => x.id === editingId) : null;
            document.getElementById('doc-name').value = d ? d.name : '';
            document.getElementById('doc-cat').value = d ? d.cat : '制度';
            document.getElementById('doc-unit').value = d ? d.unit : '人事中心';
            document.getElementById('doc-status').value = d ? d.status : '已發布';
            document.getElementById('doc-file-name').innerText = '未選擇任何檔案';
            document.getElementById('doc-file').value = '';
            document.getElementById('doc-modal').classList.remove('hidden');
        }
        function closeDocModal() { document.getElementById('doc-modal').classList.add('hidden'); }

        function saveDoc() {
            const name = document.getElementById('doc-name').value.trim();
            if (!name) { showToast('請填寫文件名稱'); return; }
            const cat = document.getElementById('doc-cat').value;
            const unit = document.getElementById('doc-unit').value;
            const status = document.getElementById('doc-status').value;
            const today = new Date().toISOString().slice(0, 10);
            if (editingId) {
                const d = docs.find(x => x.id === editingId);
                if (d) { d.name = name; d.cat = cat; d.unit = unit; d.status = status; d.date = today; }
                showToast('已更新文件');
            } else {
                const nextId = docs.length ? Math.max(...docs.map(d => d.id)) + 1 : 1;
                docs.unshift({ id: nextId, name, cat, size: '—', unit, date: today, status });
                showToast('已新增文件');
            }
            closeDocModal();
            render();
        }

        function deleteDoc(id) {
            const d = docs.find(x => x.id === id);
            if (!d) return;
            if (!confirm('確定要刪除文件「' + d.name + '」嗎？')) return;
            docs = docs.filter(x => x.id !== id);
            render();
            showToast('已刪除文件');
        }

        function downloadDoc(id) {
            const d = docs.find(x => x.id === id);
            if (!d) return;
            const blob = new Blob(['這是文件「' + d.name + '」的示意內容（範例下載）。'], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = d.name;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        let toastTimer = null;
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 12px)'; }, 2200);
        }

        document.getElementById('doc-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDocModal(); });
        render();
    </script>

</body>
</html>
