<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簽核 - 簽核管理系統</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 供瀏覽器即時編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示 SVG 元件 ---
    const IconBase = ({ size = 24, strokeWidth = 2, children, className = '', ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Calendar = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
    const PenLine = (props) => <IconBase {...props}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></IconBase>;
    const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>;
    const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"></polyline></IconBase>;
    const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;

    // --- 自訂日期選取器 (DatePicker) 元件 ---
    const DatePickerDropdown = ({ isOpen, onToggle, value, onChange, placeholder }) => {
      const [viewDate, setViewDate] = useState(value ? new Date(value) : new Date());

      useEffect(() => {
        if (isOpen && value) {
          setViewDate(new Date(value));
        }
      }, [isOpen, value]);

      const formatDate = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };

      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const days = [];
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

      return (
        <div className="relative">
          <div
            onClick={onToggle}
            className={`flex items-center bg-white border rounded px-3 py-1.5 shadow-sm cursor-pointer transition-colors ${
              isOpen ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
            }`}
          >
            <Calendar size={15} className="text-gray-400 mr-2 flex-shrink-0" />
            <input
              type="text"
              className="w-24 outline-none text-sm text-gray-700 cursor-pointer bg-transparent pointer-events-none"
              placeholder={placeholder}
              value={value}
              readOnly
            />
          </div>
          
          {isOpen && (
            <div className="absolute top-full mt-1 left-0 bg-white border border-gray-200 rounded shadow-lg z-50 p-4 w-[280px]" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="rotate-90" />
                </button>
                <span className="text-[15px] font-semibold text-gray-800">{year}年 {month + 1}月</span>
                <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="-rotate-90" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-2 font-medium">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-sm">
                {days.map((d, i) => {
                  const dateStr = d ? formatDate(d) : '';
                  const isSelected = value === dateStr;
                  const isToday = d && formatDate(d) === formatDate(new Date());
                  
                  return (
                    <div
                      key={i}
                      onClick={() => {
                        if (d) {
                          onChange(isSelected ? '' : dateStr);
                          if (!isSelected) onToggle();
                        }
                      }}
                      className={`
                        py-1 rounded transition-colors
                        ${!d ? 'pointer-events-none' : 'cursor-pointer'}
                        ${isSelected ? 'bg-[#4A90E2] text-white font-medium shadow-sm' : 
                          d ? 'hover:bg-gray-100 text-gray-700' : ''}
                        ${!isSelected && isToday ? 'text-[#4A90E2] font-bold' : ''}
                      `}
                    >
                      {d ? d.getDate() : ''}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- 主程式元件 ---
    const App = () => {
      // 頁籤狀態
      const tabs = ['電子表單簽核', '請假簽核', '補卡簽核'];
      const [activeTab, setActiveTab] = useState('電子表單簽核');

      // 費用詳情彈窗控制狀態
      const [isModalOpen, setIsModalOpen] = useState(false);
      // 請假 / 補卡「檢視」詳情彈窗（依電子表單簽核彈窗樣式製作）
      const [viewItem, setViewItem] = useState(null); // { kind: 'leave' | 'timesheet', data: row }
      const [showOpinions, setShowOpinions] = useState(false);
      const [activeExportModal, setActiveExportModal] = useState(null);
      const [selectedBookkeeping, setSelectedBookkeeping] = useState([]);
      const [pendingApprovalOnly, setPendingApprovalOnly] = useState(false);
      const [withdrawConfirmItem, setWithdrawConfirmItem] = useState(null);

      // 批量審批相關狀態與假資料
      const [selectedLeave, setSelectedLeave] = useState([]);
      const [selectedTimesheet, setSelectedTimesheet] = useState([]);
      const [batchApproveModal, setBatchApproveModal] = useState(null); // 'leave' | 'timesheet' | null

      const mockLeaveData = [
        { id: 'L1', project: 'GT', dept: 'RD', empNo: '101372', applyTime: '2026-05-28 10:00:00', name: 'Kidd', startDate: '2026-06-01', endDate: '2026-06-02', leaveType: '年假', hours: '16', status: '需要審批' },
        { id: 'L2', project: 'GT', dept: 'RD', empNo: '100962', applyTime: '2026-05-29 09:30:00', name: 'Derrick', startDate: '2026-06-05', endDate: '2026-06-05', leaveType: '事假', hours: '8', status: '待他人審批' },
        { id: 'L3', project: 'GT', dept: 'RD', empNo: '101436', applyTime: '2026-05-30 11:00:00', name: 'Liz G', startDate: '2026-06-10', endDate: '2026-06-10', leaveType: '病假', hours: '4', status: '已完成審批' },
        { id: 'L4', project: 'GT', dept: 'RD', empNo: '100123', applyTime: '2026-05-31 14:20:00', name: 'Bertha W', startDate: '2026-06-15', endDate: '2026-06-16', leaveType: '年假', hours: '16', status: '被抄送審批' },
        { id: 'L5', project: 'GT', dept: 'RD', empNo: '101372', applyTime: '2026-06-03 16:45:00', name: 'Kidd', startDate: '2026-06-01', endDate: '2026-06-01', leaveType: '年假(銷假)', hours: '8', status: '需要審批' },
      ];

      const mockTimesheetData = [
        { id: 'T1', project: 'GT', dept: 'RD', empNo: '100344', submitDate: '2026-05-28', clockTime: '2026-05-27 08:55:00', period: '上班', type: '忘記打卡', status: '需要審批' },
        { id: 'T2', project: 'GT', dept: 'RD', empNo: '101436', submitDate: '2026-05-29', clockTime: '2026-05-28 18:05:00', period: '下班', type: '忘記打卡', status: '待他人審批' },
        { id: 'T3', project: 'GT', dept: 'RD', empNo: '100960', submitDate: '2026-05-30', clockTime: '2026-05-29 09:00:00', period: '上班', type: '公出', status: '已完成審批' },
        { id: 'T4', project: 'GT', dept: 'RD', empNo: '100570', submitDate: '2026-05-31', clockTime: '2026-05-30 18:30:00', period: '下班', type: '公出', status: '被抄送審批' },
      ];

      // 過濾出「需要審批」的資料，供全選功能使用（請假以篩選後的清單為準，定義於 selectedFilters 之後）
      const approvableTimesheets = mockTimesheetData.filter(d => d.status === '需要審批');

      // --- 輔助：取得格式化日期 (yyyy-MM-dd) ---
      const getFormattedDate = (daysOffset = 0) => {
        const d = new Date();
        d.setDate(d.getDate() + daysOffset);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      };

      // --- 發起申請資料 ---
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');

      // 請假與補卡簽核專用預設日期區間 (今日往前推 31 天到今日)
      const [ltStartDate, setLtStartDate] = useState(getFormattedDate(-31));
      const [ltEndDate, setLtEndDate] = useState(getFormattedDate(0));

      // 共用：控制篩選下拉選單開啟
      const [openDropdown, setOpenDropdown] = useState(null);

      // 電子表單簽核：篩選器設定
      const filterConfigs = [
        { id: 'status', label: '狀態', type: 'multi', options: ['待簽核', '簽核中(7)', '簽核完成', '撤回', '駁回', 'CC', '待補件'] },
        { id: 'oa', label: 'OA 類型', type: 'multi', options: ['商務', '合同', '財務', '行政', 'PMO'] },
        { id: 'project', label: '項目', type: 'multi', options: ['GT'] },
        { id: 'location', label: '地點', type: 'multi', options: ['T1', 'T2', 'THQ', 'T3', 'T4'] },
        { id: 'title', label: '職稱', type: 'multi', options: ['行政負責代表', '人力資源中心', '記帳', '財務總監', '費用會計'] },
        { id: 'docType', label: '單據類型', type: 'multi', options: ['新增資產申請 (ASSETS)', '費用申請單 (B)', '商務公告(BU)', '費用報銷單 (C)', '內部合同審批單 (IC)'] },
      ];

      // 請假/補卡簽核：專屬篩選器設定
      const ltFilterConfigs = [
        { id: 'ltStatus', label: '狀態', type: 'multi', options: ['待他人審批', '需要審批', '已完成審批', '被抄送審批'] },
        { id: 'ltProject', label: '項目', type: 'multi', options: ['GT'] },
        { id: 'ltDept', label: '部門', type: 'multi', options: ['API', 'RD'] },
      ];

      // 統一狀態管理
      const [selectedFilters, setSelectedFilters] = useState({
        status: ['待簽核', '簽核中(7)'], // 預設選中
        oa: [], project: [], location: [], title: [], docType: [],
        ltStatus: [], ltProject: [], ltDept: []
      });

      // 請假簽核：依篩選器（狀態 / 項目 / 部門，多選；未選代表全部）過濾列表
      const filteredLeaveData = mockLeaveData.filter(d =>
        (selectedFilters.ltStatus.length === 0 || selectedFilters.ltStatus.includes(d.status)) &&
        (selectedFilters.ltProject.length === 0 || selectedFilters.ltProject.includes(d.project)) &&
        (selectedFilters.ltDept.length === 0 || selectedFilters.ltDept.includes(d.dept))
      );
      // 全選 / 批量審批以「篩選後可審批」的資料為準
      const approvableLeaves = filteredLeaveData.filter(d => d.status === '需要審批');

      const toggleFilterOption = (filterId, option) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (Array.isArray(currentSelected)) {
            if (currentSelected.includes(option)) {
              return { ...prev, [filterId]: currentSelected.filter(item => item !== option) };
            } else {
              return { ...prev, [filterId]: [...currentSelected, option] };
            }
          } else {
            return { ...prev, [filterId]: option };
          }
        });
      };

      const toggleSelectAll = (filterId, options) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (currentSelected.length === options.length) {
            return { ...prev, [filterId]: [] }; 
          } else {
            return { ...prev, [filterId]: [...options] }; 
          }
        });
      };

      const removeFilterOption = (filterId, option, e) => {
        e.stopPropagation();
        toggleFilterOption(filterId, option);
      };

      // 提取共用的篩選列渲染函數
      const renderFilterBar = (configs) => (
        <div className="bg-[#F8F9FB] p-3 rounded border border-gray-200 flex flex-wrap gap-4 items-center">
          {configs.map((filter) => (
            <div key={filter.id} className={`flex items-center gap-2 flex-1 min-w-[180px] ${filter.id === 'docType' || filter.id === 'status' || filter.id === 'ltStatus' ? 'md:col-span-2 lg:min-w-[280px]' : ''}`}>
              <span className="whitespace-nowrap text-xs text-gray-600 font-medium w-16 text-right">{filter.label}</span>
              <div className="relative flex-1">
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setOpenDropdown(openDropdown === filter.id ? null : filter.id);
                  }}
                  className={`w-full flex items-center justify-between bg-white border rounded px-2.5 py-1.5 text-[13px] transition-colors shadow-sm min-h-[32px] ${
                    openDropdown === filter.id ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
                  }`}
                >
                  <div className="flex-1 flex flex-wrap gap-1 items-center overflow-hidden">
                    {filter.type === 'single' ? (
                      <span className="text-gray-700 truncate">{selectedFilters[filter.id]}</span>
                    ) : selectedFilters[filter.id].length > 0 ? (
                      selectedFilters[filter.id].map(opt => (
                        <span key={opt} className="inline-flex items-center gap-1 bg-[#F0F2F5] text-gray-700 px-1.5 py-0.5 rounded-sm text-[11px] border border-gray-200 max-w-full">
                          <span className="truncate">{opt}</span>
                          <div 
                            onClick={(e) => removeFilterOption(filter.id, opt, e)} 
                            className="hover:text-red-500 hover:bg-gray-200 rounded-full p-0.5 transition-colors cursor-pointer flex-shrink-0"
                          >
                            <X size={10} strokeWidth={2} />
                          </div>
                        </span>
                      ))
                    ) : (
                      <span className="text-gray-700">全部</span>
                    )}
                  </div>
                  <ChevronDown size={14} className={`text-gray-400 transition-transform flex-shrink-0 ml-1.5 ${openDropdown === filter.id ? 'rotate-180' : ''}`} />
                </button>

                {/* 下拉選單內容 */}
                {openDropdown === filter.id && (
                  <div 
                    className={`absolute top-full mt-1 left-0 w-full min-w-[200px] bg-white border border-gray-200 rounded shadow-lg z-50 py-1 ${filter.id === 'docType' || filter.id === 'status' || filter.id === 'ltStatus' ? 'md:w-[350px]' : ''}`}
                    onClick={(e) => e.stopPropagation()}
                  >
                    {filter.type === 'single' ? (
                      <div className="max-h-60 overflow-y-auto">
                        {filter.options.map(opt => (
                          <div 
                            key={opt} 
                            onClick={() => {
                              toggleFilterOption(filter.id, opt);
                              setOpenDropdown(null);
                            }}
                            className={`px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-[13px] transition-colors ${selectedFilters[filter.id] === opt ? 'text-[#4A90E2] bg-[#F5F7FA] font-medium' : 'text-gray-700'}`}
                          >
                            {opt}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="flex flex-col">
                        <div 
                          onClick={() => toggleSelectAll(filter.id, filter.options)}
                          className="px-3 py-1.5 text-[13px] text-[#4CAF50] font-medium cursor-pointer hover:bg-gray-50 transition-colors"
                        >
                          Select All
                        </div>
                        <div className="h-px bg-gray-100 my-1"></div>
                        <div className="max-h-48 overflow-y-auto">
                          {filter.options.map(opt => (
                            <label key={opt} className="flex items-center px-3 py-1.5 hover:bg-gray-50 cursor-pointer gap-2.5">
                              <input 
                                type="checkbox" 
                                checked={selectedFilters[filter.id].includes(opt)}
                                onChange={() => toggleFilterOption(filter.id, opt)}
                                className="w-3.5 h-3.5 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2]" 
                              />
                              <span className="text-[13px] text-gray-700">{opt}</span>
                            </label>
                          ))}
                        </div>
                        <div className="p-1.5 border-t border-gray-100 mt-1">
                          <input type="text" placeholder="請輸入關鍵字" className="w-full border border-gray-300 rounded p-1 text-[13px] focus:outline-none focus:border-[#4A90E2] focus:ring-1 focus:ring-[#4A90E2]" />
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      );

      // 提取共用的搜尋與日期列渲染函數
      const renderSearchBar = (showEmpNo, sDate, setSDate, eDate, setEDate, onReset) => (
        <div className="flex flex-wrap items-center justify-between gap-4 pb-2">
          <div className="flex flex-1 min-w-[200px] max-w-md gap-3">
            <div className="ui-search flex-1">
              <Search size={14} className="text-gray-400" />
              <input
                type="text"
                placeholder="請輸入關鍵字"
                className="ui-input ui-search-input"
              />
            </div>
            {showEmpNo && (
              <div className="w-[120px]">
                <input
                  type="text"
                  placeholder="搜尋工號"
                  className="ui-input"
                />
              </div>
            )}
          </div>
          
          <div className="flex flex-wrap items-center gap-1.5">
            <DatePickerDropdown 
              isOpen={openDropdown === 'startDate'}
              onToggle={(e) => {
                if(e) e.stopPropagation();
                setOpenDropdown(openDropdown === 'startDate' ? null : 'startDate');
              }}
              value={sDate}
              onChange={setSDate}
              placeholder="開始日期"
            />
            <span className="text-gray-400 text-sm">~</span>
            <DatePickerDropdown 
              isOpen={openDropdown === 'endDate'}
              onToggle={(e) => {
                if(e) e.stopPropagation();
                setOpenDropdown(openDropdown === 'endDate' ? null : 'endDate');
              }}
              value={eDate}
              onChange={setEDate}
              placeholder="結束日期"
            />

            <button className="ui-btn ui-btn-primary ml-2">
              搜尋
            </button>
            <button
              onClick={onReset}
              className="ui-btn ui-btn-secondary"
            >
              重設
            </button>
          </div>
        </div>
      );

      const mockData = [
        { oa: '財務', location: 'T1', type: 'BC', title: 'T1—一般費用-20260605', applicant: 'KKKKK', signature: 'KKKKK', amounts: ['TWD 1,000,000,000', 'CNY 225,733,634.31'], date: '2026-05-26 14:14:05', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '財務', location: 'T1', type: 'C', title: 'T1—一般費用-20260525', applicant: '101372', signature: '101372', amounts: ['TWD 2,000', 'CNY 451.47'], date: '2026-05-25 15:36:45', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '合同', location: 'THQ', type: 'IC', title: 'THQ-内部合同单-20260428', applicant: 'Yen', signature: 'Yen H', amounts: ['0'], date: '2026-04-28 15:05:09', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '合同', location: 'THQ', type: 'IC', title: 'THQ-内部合同单-20260428', applicant: 'Yen', signature: 'Yen H', amounts: ['TWD 11,111'], date: '2026-04-28 15:01:16', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '合同', location: 'THQ', type: 'IC', title: 'T2-内部合同单-20260428', applicant: 'Katherine', signature: 'Katherine C', amounts: ['TWD 11,111,111'], date: '2026-04-28 15:00:00', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '行政', location: 'T2', type: 'SA', title: 'T2-用印申請-20260428', applicant: 'Katherine C', signature: 'Katherine C', amounts: ['0'], date: '2026-04-28 13:54:39', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
        { oa: '行政', location: 'T0', type: 'PU', title: 'T0-資產及列管品採購-20260428', applicant: 'Yen', signature: 'Yen H', amounts: ['TWD 100,000', 'CNY 22,573.36'], date: '2026-04-28 13:26:16', approver: '部門主管', refNo: '-', status: '待簽核', isGreen: true },
      ];

      // 計算各頁籤未處理數量

                          {/* 抄送 3 */}

                          </tr>
                          {/* 抄送 5 */}
                          <tr className="border-b border-gray-200 bg-gray-50/50">
                            <td className="px-3 py-2.5 border-r border-gray-200 text-gray-400 text-center">抄送</td>
                            <td className="px-3 py-2.5 border-r border-gray-200 text-gray-400">抄送</td>
                            <td className="px-3 py-2.5 border-r border-gray-200 text-gray-500">財務總監</td>
                            <td className="px-3 py-2.5 text-center text-gray-400">-</td>
                          </tr>
                          {/* 抄送 6 */}
                          <tr className="border-b border-gray-200 bg-gray-50/50">
                            <td className="px-3 py-2.5 border-r border-gray-200 text-gray-400 text-center">抄送</td>

                      </table>
                    </div>
                  </div>

                </div>

              </div>
            </div>
          )}

          {/* ========== 請假 / 補卡「檢視」詳情彈窗（比照電子表單簽核彈窗） ========== */}
          {viewItem && (() => {
            const d = viewItem.data || {};
            const isLeave = viewItem.kind === 'leave';
            const docNo = isLeave
              ? `A-${d.dept || ''}-${d.empNo || ''}-${(d.startDate || '').replace(/-/g, '')}`
              : `T-${d.dept || ''}-${d.empNo || ''}-${(d.submitDate || '').replace(/-/g, '')}`;
            const title = isLeave ? `${d.leaveType || '請假'}申請` : `補卡-${d.period || ''}`;
            const applyDate = isLeave ? (d.applyTime || '').slice(0, 10) : (d.submitDate || '');
            const baseFields = [
              { label: '文件編號', value: docNo, muted: true, mono: true },
              { label: '申請日期', value: applyDate, muted: true },
              ...(isLeave ? [] : [{ label: '標題', value: title }]),
              { label: '申請人', value: d.name || d.empNo },
              { label: '工號', value: d.empNo, muted: true },
              { label: '項目', value: d.project, muted: true },
              { label: '部門', value: d.dept, muted: true },
            ];
            const detailFields = isLeave
              ? [
                  { label: '假期種類', value: d.leaveType },
                  { label: '開始時間', value: d.startDate ? `${d.startDate} 09:00` : '' },
                  { label: '結束時間', value: d.endDate ? `${d.endDate} 18:00` : '' },
                  { label: '請假時數（小時／最小單位 0.5）', value: d.hours ? `${parseFloat(d.hours).toFixed(1)} 小時` : '' },
                ]
              : [
                  { label: '種類', value: d.type },
                  { label: '時段', value: d.period },
                  { label: '補打卡時間', value: d.clockTime },
                  { label: '提交日期', value: d.submitDate },
                ];
            const fieldInput = (f, i) => (
              <div key={i}>
                <label className="block text-gray-700 text-xs mb-1.5 font-medium">{f.label}</label>
                <input
                  type="text"
                  disabled
                  value={(f.value === undefined || f.value === null || f.value === '') ? '-' : f.value}
                  className={`w-full border rounded px-3 py-2 text-sm cursor-not-allowed ${f.muted ? 'bg-[#EAECEF] border-gray-300 text-gray-700' : 'bg-white border-gray-200 text-gray-800'} ${f.mono ? 'font-mono' : ''}`}
                />
              </div>
            );
            return (
              <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4 overflow-y-auto" onClick={() => setViewItem(null)}>
                <div
                  className="bg-[#F0F2F5] rounded-xl shadow-2xl w-full max-w-[1100px] h-[90vh] flex flex-col overflow-hidden text-left"
                  onClick={e => e.stopPropagation()}
                >
                  {/* 標題列 */}
                  <div className="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200 flex-shrink-0">
                    <span className="font-bold text-gray-800 text-base">{isLeave ? '請假申請單 (A)' : '補卡申請單 (T)'}</span>
                    <button onClick={() => setViewItem(null)} className="bg-[#3F51B5] hover:bg-blue-800 text-white p-1 rounded transition-colors">
                      <X size={18} strokeWidth={2.5} />
                    </button>
                  </div>

                  <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                    {/* 左側：表單內容 + 固定底部 */}
                    <div className="flex-1 min-w-0 flex flex-col overflow-hidden">
                      <div className="flex-1 overflow-y-auto p-6 space-y-6">

                        {/* 基本資訊 */}
                        <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                          <div className="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">基本資訊</div>
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {baseFields.map(fieldInput)}
                          </div>
                        </div>

                        {/* 申請資訊 */}
                        <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                          <div className="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">{isLeave ? '請假資訊' : '補卡資訊'}</div>
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {detailFields.map(fieldInput)}
                          </div>
                          <div>
                            <label className="block text-gray-700 text-xs mb-1.5 font-medium">{isLeave ? '申請事由' : '補卡原因'}</label>
                            <textarea
                              disabled
                              value={isLeave ? '依個人需求提出請假申請，相關證明文件如附件。' : '因故漏打卡，檢附說明提出補卡申請。'}
                              className="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 h-20 resize-none cursor-not-allowed"
                            />
                          </div>
                        </div>

                        {/* 審批信息（歷程） */}
                        <div className="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                          <div className="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 px-6 py-3">審批信息</div>
                          <div className="overflow-x-auto">
                            <table className="w-full text-sm whitespace-nowrap">
                              <thead className="bg-[#F8F9FA] text-gray-500 text-xs">
                                <tr>
                                  <th className="px-4 py-3 text-center">序號</th>
                                  <th className="px-4 py-3 text-center">狀態</th>
                                  <th className="px-4 py-3 text-center">條件</th>
                                  <th className="px-4 py-3 text-left">職稱</th>
                                  <th className="px-4 py-3 text-left">姓名</th>
                                  <th className="px-4 py-3 text-left">工號</th>
                                  <th className="px-4 py-3 text-left">審批日期</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-100">
                                <tr>
                                  <td className="px-4 py-3 text-center font-bold text-gray-800">1</td>
                                  <td className="px-4 py-3 text-center"><span className="ui-badge ui-badge-success">已通過</span></td>
                                  <td className="px-4 py-3 text-center text-gray-500">串聯</td>
                                  <td className="px-4 py-3 text-gray-800">直屬主管</td>
                                  <td className="px-4 py-3 text-gray-800">-</td>
                                  <td className="px-4 py-3 text-gray-600 font-mono">-</td>
                                  <td className="px-4 py-3 text-gray-400">-</td>
                                </tr>
                                <tr>
                                  <td className="px-4 py-3 text-center font-bold text-gray-800">2</td>
                                  <td className="px-4 py-3 text-center"><span className="ui-badge ui-badge-warning">待審批</span></td>
                                  <td className="px-4 py-3 text-center text-gray-500">串聯</td>
                                  <td className="px-4 py-3 text-gray-800">人資審核</td>
                                  <td className="px-4 py-3 text-gray-800">-</td>
                                  <td className="px-4 py-3 text-gray-600 font-mono">-</td>
                                  <td className="px-4 py-3 text-gray-400">-</td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </div>

                        {/* 備註（供審批人填寫） */}
                        <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-3">
                          <div className="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">備註</div>
                          <textarea
                            placeholder="請輸入審批備註..."
                            className="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 h-24 resize-none focus:outline-none focus:ring-2 focus:ring-[#4A90E2]/40 focus:border-[#4A90E2]"
                          />
                        </div>

                      </div>

                      {/* 固定底部按鈕 */}
                      <div className="bg-[#F8F9FA] border-t border-gray-200 px-6 py-4 flex justify-center gap-3 flex-shrink-0 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
                        <button onClick={() => setViewItem(null)} className="ui-btn ui-btn-secondary">關閉</button>
                        <button onClick={() => setViewItem(null)} className="ui-btn ui-btn-success ui-btn-lg">審批</button>
                      </div>
                    </div>

                    {/* 右側：審批線預覽 */}
                    <div className="w-full lg:w-[320px] bg-white border-t lg:border-t-0 lg:border-l border-gray-200 overflow-y-auto flex flex-col flex-shrink-0">
                      <div className="bg-[#0097A7] text-white px-4 py-3.5 font-bold text-sm tracking-wide">審批線預覽</div>
                      <div className="p-1 flex-1 overflow-y-auto">
                        <table className="w-full table-fixed text-xs text-center border-collapse">
                          <thead>
                            <tr className="border-b border-gray-200 bg-gray-50 text-gray-500 font-bold">
                              <th className="px-2 py-2 w-10 border-r border-gray-200">序號</th>
                              <th className="px-2 py-2 w-14 border-r border-gray-200">條件</th>
                              <th className="px-2 py-2 border-r border-gray-200">職稱</th>
                              <th className="px-2 py-2 w-12">簽名</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100 font-semibold text-gray-700">
                            <tr className="border-b border-gray-200">
                              <td className="px-3 py-3 border-r border-gray-200 font-bold text-center text-gray-800">1</td>
                              <td className="px-3 py-3 border-r border-gray-200 text-gray-500">直屬主管</td>
                              <td className="px-3 py-3 border-r border-gray-200 text-gray-500">-</td>
                              <td className="px-3 py-3 text-center text-gray-400">-</td>
                            </tr>
                            <tr className="border-b border-gray-200">
                              <td className="px-3 py-3 border-r border-gray-200 font-bold text-center text-gray-800">2</td>
                              <td className="px-3 py-3 border-r border-gray-200 text-gray-500">人資審核</td>
                              <td className="px-3 py-3 border-r border-gray-200 text-gray-500">-</td>
                              <td className="px-3 py-3 text-center text-gray-400">-</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ================= 匯出設定彈窗群 ================= */}
          {activeExportModal && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-50 flex items-center justify-center p-4" onClick={() => setActiveExportModal(null)}>
              <div 
                className="bg-white rounded-md shadow-2xl w-full max-w-[520px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-left"
                onClick={e => e.stopPropagation()}
              >
                {/* 標頭 */}
                <div className="px-6 py-4 flex items-center justify-between border-b border-gray-200 bg-white">
                  <span className="font-bold text-gray-800 text-[15px]">
                    {activeExportModal === 'bookkeeping' && '記帳匯出'}
                    {activeExportModal === 'payment' && '資金支付匯出'}
                    {activeExportModal === 'accounting' && '費用會計匯出'}
                    {activeExportModal === 'excel' && '匯出 Excel'}
                    {activeExportModal === 'data' && '匯出資料'}
                  </span>
                  <button 
                    onClick={() => setActiveExportModal(null)}
                    className="text-gray-400 hover:text-gray-600 transition-colors"
                  >
                    <X size={20} strokeWidth={2} />
                  </button>
                </div>

                {/* 內容區 */}
                <div className="p-6 bg-white">
                  {activeExportModal === 'bookkeeping' ? (
                    <div className="space-y-3">
                      <label className="block text-gray-700 text-sm font-medium mb-2">地區</label>
                      <div className="border border-red-500 rounded p-4 max-h-[350px] overflow-y-auto">
                        <div 
                          onClick={() => {
                            const bookkeepingList = ['D', 'F', 'IM', 'J', 'K', 'M', 'S', 'T1', 'T2', 'T3', 'T4'];
                            if (selectedBookkeeping.length === bookkeepingList.length) {
                              setSelectedBookkeeping([]);
                            } else {
                              setSelectedBookkeeping([...bookkeepingList]);
                            }
                          }}
                          className="text-[#4CAF50] text-[13px] font-bold cursor-pointer hover:underline mb-2.5 inline-block"
                        >
                          Select All
                        </div>
                        <div className="h-px bg-gray-100 mb-2"></div>
                        <div className="space-y-1">
                          {['D', 'F', 'IM', 'J', 'K', 'M', 'S', 'T1', 'T2', 'T3', 'T4'].map(opt => (
                            <label key={opt} className="flex items-center gap-3 py-1.5 px-2 hover:bg-gray-50 rounded cursor-pointer transition-colors">
                              <input 
                                type="checkbox"
                                checked={selectedBookkeeping.includes(opt)}
                                onChange={() => {
                                  if (selectedBookkeeping.includes(opt)) {
                                    setSelectedBookkeeping(selectedBookkeeping.filter(x => x !== opt));
                                  } else {
                                    setSelectedBookkeeping([...selectedBookkeeping, opt]);
                                  }
                                }}
                                className="w-4 h-4 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2] cursor-pointer" 
                              />
                              <span className="text-[13px] text-gray-700">{opt}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="py-4">
                      <label className="flex items-center gap-3 py-2 px-1 hover:bg-gray-50 rounded cursor-pointer transition-colors">
                        <input 
                          type="checkbox"
                          checked={pendingApprovalOnly}
                          onChange={(e) => setPendingApprovalOnly(e.target.checked)}
                          className="w-4 h-4 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2] cursor-pointer" 
                        />
                        <span className="text-[13px] text-gray-700">待我審核</span>
                      </label>
                    </div>
                  )}
                </div>

                {/* 底部按鈕區 */}
                <div className="border-t border-gray-200 px-6 py-4 flex justify-end bg-white">
                  <button 
                    onClick={() => {
                      // 模擬匯出完成，關閉彈窗
                      setActiveExportModal(null);
                    }}
                    className="ui-btn ui-btn-primary"
                  >
                    匯出
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ================= 撤回確認彈窗 ================= */}
          {withdrawConfirmItem && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-[60] flex items-center justify-center p-4" onClick={() => setWithdrawConfirmItem(null)}>
              <div 
                className="bg-white rounded-md shadow-xl w-full max-w-[400px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-center"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8">
                  <div className="text-gray-800 text-sm font-medium mb-8">
                    确定要撤回此申请单吗？
                  </div>
                  <div className="flex justify-center gap-4">
                    <button
                      onClick={() => setWithdrawConfirmItem(null)}
                      className="ui-btn ui-btn-secondary"
                    >
                      取消
                    </button>
                    <button
                      onClick={() => {
                        // 模擬撤回邏輯
                        setWithdrawConfirmItem(null);
                      }}
                      className="ui-btn ui-btn-primary"
                    >
                      確定
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ================= 批量審批確認彈窗 ================= */}
          {batchApproveModal && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-[60] flex items-center justify-center p-4" onClick={() => setBatchApproveModal(null)}>
              <div 
                className="bg-white rounded-md shadow-xl w-full max-w-[400px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-center"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8">
                  <div className="text-gray-800 text-base font-medium mb-8">
                    確定要批量審批已選取的 {batchApproveModal === 'leave' ? selectedLeave.length : selectedTimesheet.length} 筆項目嗎？
                  </div>
                  <div className="flex justify-center gap-4">
                    <button
                      onClick={() => setBatchApproveModal(null)}
                      className="ui-btn ui-btn-secondary"
                    >
                      取消
                    </button>
                    <button
                      onClick={() => {
                        // 模擬審批邏輯：清空已選項
                        if (batchApproveModal === 'leave') setSelectedLeave([]);
                        if (batchApproveModal === 'timesheet') setSelectedTimesheet([]);
                        setBatchApproveModal(null);
                      }}
                      className="ui-btn ui-btn-success"
                    >
                      確定審批
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    // 將 React 元件渲染到 DOM 中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
