<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產盤點</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 用於圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB',
                        card: '#FFFFFF',
                        text: {
                            main: '#1F2937',
                            muted: '#6B7280',
                            light: '#9CA3AF'
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                        'modal': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.background');
            font-family: theme('fontFamily.sans');
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .asset-remark-editor:empty:before { content: attr(data-ph); color: #9ca3af; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 + 右上四顆功能按鈕 -->
        <header class="ui-page-header flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <h1 class="ui-page-title">資產盤點</h1>
            <div class="flex flex-wrap items-center gap-2">
                <button onclick="startAll()" class="ui-btn ui-btn-primary ui-btn-sm"><i class="fa-solid fa-play"></i> 全部盤點開始</button>
                <button onclick="startAssetOnly()" class="ui-btn ui-btn-primary ui-btn-sm"><i class="fa-solid fa-play"></i> 僅資產盤點開始</button>
                <button onclick="endInventory()" class="ui-btn ui-btn-sm text-amber-600 border border-amber-200 hover:bg-amber-50"><i class="fa-solid fa-flag-checkered"></i> 盤點結束</button>
                <button onclick="exportExcel()" class="ui-btn ui-btn-sm text-emerald-600 border border-emerald-200 hover:bg-emerald-50"><i class="fa-solid fa-file-excel"></i> 匯出Excel</button>
            </div>
        </header>

        <!-- 盤點清單 -->
        <section class="ui-card p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <div class="flex items-center gap-2">
                    <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">盤點清單</h2>
                    <span id="inv-count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
                </div>
                <div class="relative ui-search w-full sm:w-80">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="inv-search" oninput="renderInventory()" placeholder="搜尋資產編號 / 序列號 / 使用人..." class="ui-input ui-search-input">
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100 custom-scrollbar">
                <table class="ui-table text-center whitespace-nowrap">
                    <thead>
                        <tr>
                            <th scope="col" class="text-left">資產編號</th>
                            <th scope="col">型號代碼</th>
                            <th scope="col">序列號</th>
                            <th scope="col">項目</th>
                            <th scope="col">部門</th>
                            <th scope="col">資產使用人</th>
                            <th scope="col">資產管理人</th>
                            <th scope="col">初盤日期</th>
                            <th scope="col">標籤</th>
                            <th scope="col">序列號</th>
                            <th scope="col">功能外觀</th>
                            <th scope="col" class="text-left">備註</th>
                            <th scope="col">復盤日期</th>
                            <th scope="col">行政</th>
                            <th scope="col">財務</th>
                            <th scope="col">內審</th>
                            <th scope="col">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="inv-tbody"><!-- 動態由 JavaScript 渲染 --></tbody>
                </table>
            </div>

            <div id="inv-no-data" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-clipboard-list text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的盤點資料</p>
            </div>

            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="inv-pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>
    </div>

    <!-- 資產詳情彈窗 -->
    <div id="asset-detail-modal" class="fixed inset-0 z-50 hidden">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" onclick="closeAssetDetail()"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="relative bg-white w-full max-w-[1165px] max-h-[90vh] rounded-2xl shadow-modal flex flex-col overflow-hidden">
                <div class="px-6 py-4 flex items-center justify-between border-b border-gray-100 flex-shrink-0">
                    <h3 class="text-base font-bold text-gray-900">資產詳情 <span id="ad-no" class="text-primary font-mono ml-1"></span></h3>
                    <button onclick="closeAssetDetail()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="px-6 py-5 overflow-y-auto">
                    <div id="asset-detail-grid" class="space-y-6"></div>
                    <!-- 備註（可輸入多個）-->
                    <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm mt-6">
                        <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-200 flex items-center justify-between">
                            <div class="text-sm font-bold text-primary flex items-center gap-2"><span class="w-1.5 h-4 bg-primary rounded-full"></span>備註</div>
                            <button type="button" id="asset-remark-add" onclick="assetAddRemark()" class="ui-btn ui-btn-primary ui-btn-sm hidden"><i class="fa-solid fa-plus"></i> 添加備註</button>
                        </div>
                        <div class="p-4"><div id="asset-remark-list" class="space-y-3"></div></div>
                    </div>
                    <!-- 附件（可上傳多個；直接預覽檔案內容示意）-->
                    <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm mt-6">
                        <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-200 text-sm font-bold text-primary flex items-center gap-2"><span class="w-1.5 h-4 bg-primary rounded-full"></span>附件</div>
                        <div class="p-4">
                            <label id="asset-attach-upload" class="block mb-3 cursor-pointer hidden">
                                <input type="file" multiple class="hidden" onchange="assetAddFiles(this)">
                                <div class="border-2 border-dashed border-gray-300 rounded-lg py-4 flex flex-col items-center justify-center gap-1.5 text-gray-400 hover:border-primary hover:text-primary transition-colors">
                                    <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                    <div class="text-sm"><span class="text-primary font-medium">點擊上傳</span> 或將檔案拖曳至此</div>
                                    <div class="text-xs text-gray-400">支援多檔上傳（示意）</div>
                                </div>
                            </label>
                            <div id="asset-attach-list" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center flex-shrink-0">
                    <div class="flex flex-wrap gap-2">
                        <button onclick="openAssetHistory()" class="ui-btn ui-btn-secondary"><i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄</button>
                        <button onclick="showToast('success', '已下載所有附件（示範）')" class="ui-btn ui-btn-secondary"><i class="fa-solid fa-images"></i> 下載所有附件</button>
                    </div>
                    <div class="flex gap-2">
                        <div id="ad-view-btns" class="flex gap-2">
                            <button onclick="closeAssetDetail()" class="ui-btn ui-btn-secondary">關閉</button>
                            <button onclick="toggleAssetEdit(true)" class="ui-btn ui-btn-primary"><i class="fa-solid fa-pen"></i> 編輯</button>
                        </div>
                        <div id="ad-edit-btns" class="flex gap-2 hidden">
                            <button onclick="toggleAssetEdit(false)" class="ui-btn ui-btn-secondary">取消</button>
                            <button onclick="saveAssetDetail()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-check"></i> 儲存</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 資產歷史紀錄彈窗 -->
    <div id="asset-history-modal" class="fixed inset-0 z-[60] hidden">
        <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm" onclick="closeAssetHistory()"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="relative bg-white w-full max-w-[1228px] max-h-[88vh] rounded-2xl shadow-modal flex flex-col overflow-hidden">
                <div class="px-6 py-4 flex items-center justify-between border-b border-gray-100 flex-shrink-0">
                    <h3 class="text-base font-bold text-gray-900">歷史紀錄 <span id="ah-no" class="text-primary font-mono ml-1"></span></h3>
                    <button onclick="closeAssetHistory()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="px-6 py-5 overflow-auto">
                    <table class="ui-table w-full text-sm">
                        <thead>
                            <tr>
                                <th>資產編號</th><th>修改來源</th><th>修改項</th><th>修改前的內容</th><th>修改後的內容</th><th>修改者</th><th>修改時間</th>
                            </tr>
                        </thead>
                        <tbody id="asset-history-tbody"></tbody>
                    </table>
                </div>
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end flex-shrink-0">
                    <button onclick="closeAssetHistory()" class="ui-btn ui-btn-secondary">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 電子表單檢視彈窗（由關聯單據查閱開啟）-->
    <div id="form-view-modal" class="fixed inset-0 z-[60] hidden">
        <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm" onclick="closeFormView()"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="relative bg-white w-full max-w-2xl max-h-[88vh] rounded-md shadow-2xl flex flex-col overflow-hidden">
                <div class="bg-[#EAF2FC] flex justify-between items-center px-5 py-3 border-b border-blue-100 flex-shrink-0">
                    <h2 id="fv-title" class="text-[#2b3b84] font-bold text-[16px]">電子表單檢視</h2>
                    <button onclick="closeFormView()" class="bg-blue-500 hover:bg-blue-600 text-white rounded p-1.5 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto p-5 bg-[#f4f5f8] space-y-4">
                    <div class="bg-white border border-gray-300 rounded-md shadow-sm">
                        <div class="px-4 py-2.5 border-b border-gray-200"><h3 class="text-[#2b3b84] font-bold text-[15px]">基本資訊</h3></div>
                        <div class="p-4 grid grid-cols-2 gap-x-5 gap-y-4 text-sm">
                            <div><div class="text-xs text-text-muted mb-1">文件編號</div><div id="fv-docno" class="font-mono text-gray-800"></div></div>
                            <div><div class="text-xs text-text-muted mb-1">表單類型</div><div id="fv-type" class="text-gray-800"></div></div>
                            <div><div class="text-xs text-text-muted mb-1">申請人</div><div class="text-gray-800">Nick（100258）</div></div>
                            <div><div class="text-xs text-text-muted mb-1">申請日期</div><div class="text-gray-800">2026-05-30</div></div>
                            <div><div class="text-xs text-text-muted mb-1">狀態</div><div><span class="ui-badge ui-badge-success">簽核完成</span></div></div>
                            <div><div class="text-xs text-text-muted mb-1">金額</div><div class="text-gray-800">CNY 2,137.09</div></div>
                        </div>
                    </div>
                    <div class="text-center text-xs text-gray-400">— 電子表單檢視（示意）—</div>
                </div>
                <div class="bg-gray-50 px-5 py-3 border-t border-gray-100 flex justify-end flex-shrink-0">
                    <button onclick="closeFormView()" class="ui-btn ui-btn-secondary">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        // 盤點資料庫（欄位：資產編號 / 型號代碼 / 序列號 / 項目 / 部門 / 使用人 / 管理人 /
        // 初盤日期 / 標籤 / 序列號(複盤) / 功能外觀 / 備註 / 復盤日期 / 行政 / 財務 / 內審 / 狀態）
        const inventoryDb = [
            { no: 'ZC-24-0001', model: 'MBP14-M3',  serial: 'C02FK1ABCD01', project: 'GT', dept: 'RD',  user: 'Matthew', keeper: 'James',   firstDate: '2026-06-15', label: '正常', serial2: '正常', appearance: '正常', note: '', recheckDate: '2026-06-20', admin: '已確認', finance: '已確認', audit: '已確認', status: '已復盤' },
            { no: 'ZC-24-0002', model: 'IP15P-256', serial: 'F2LXY2ZZ3456', project: 'GT', dept: 'RD',  user: 'James',   keeper: 'James',   firstDate: '2026-06-15', label: '正常', serial2: '正常', appearance: '正常', note: '', recheckDate: '', admin: '已確認', finance: '待確認', audit: '待確認', status: '已初盤' },
            { no: 'ZC-24-0003', model: 'U2723QE',   serial: 'CN0ABCD789',   project: 'GT', dept: 'HR',  user: 'Henry',   keeper: 'William', firstDate: '2026-06-15', label: '異常', serial2: '正常', appearance: '刮痕', note: '外觀刮痕，待評估', recheckDate: '', admin: '待確認', finance: '待確認', audit: '待確認', status: '差異' },
            { no: 'ZC-24-0004', model: 'M90-Q88K',  serial: 'LN90X1Q88K',   project: 'GT', dept: 'FIN', user: 'Audrey',  keeper: 'William', firstDate: '', label: '', serial2: '', appearance: '', note: '', recheckDate: '', admin: '', finance: '', audit: '', status: '待盤點' },
            { no: 'ZC-24-0007', model: 'CAT9200',   serial: 'FOC2530NET',   project: 'GT', dept: 'IA1', user: 'Samuel',  keeper: 'Emma',    firstDate: '2026-06-16', label: '正常', serial2: '正常', appearance: '正常', note: '', recheckDate: '2026-06-21', admin: '已確認', finance: '已確認', audit: '已確認', status: '已復盤' }
        ];

        // 標籤 / 序列號(複盤) / 功能外觀：正常＝綠、異常＝紅、其他文字＝琥珀、空＝灰 dash
        function checkCell(v) {
            if (!v) return '<span class="text-gray-300">—</span>';
            if (v === '正常') return '<span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 rounded text-xs font-semibold">正常</span>';
            if (v === '異常') return '<span class="px-2 py-0.5 bg-rose-50 text-rose-600 rounded text-xs font-semibold">異常</span>';
            return '<span class="px-2 py-0.5 bg-amber-50 text-amber-600 rounded text-xs font-semibold">' + v + '</span>';
        }
        // 行政 / 財務 / 內審：已確認＝綠勾、待確認＝灰、空＝dash
        function confirmCell(v) {
            if (!v) return '<span class="text-gray-300">—</span>';
            if (v === '已確認') return '<span class="inline-flex items-center gap-1 text-emerald-600 text-xs font-semibold"><i class="fa-solid fa-circle-check"></i>已確認</span>';
            return '<span class="inline-flex items-center gap-1 text-gray-400 text-xs font-medium"><i class="fa-regular fa-circle"></i>待確認</span>';
        }
        // 狀態徽章
        function statusCell(v) {
            const map = {
                '待盤點': 'bg-gray-100 text-gray-500',
                '已初盤': 'bg-blue-50 text-primary',
                '已復盤': 'bg-emerald-50 text-emerald-600',
                '差異':   'bg-rose-50 text-rose-600'
            };
            return '<span class="px-2 py-0.5 ' + (map[v] || 'bg-gray-100 text-gray-500') + ' rounded text-xs font-semibold">' + (v || '—') + '</span>';
        }
        function dateCell(v) { return v ? '<span class="font-mono text-gray-500 text-xs">' + v + '</span>' : '<span class="text-gray-300">—</span>'; }

        function renderInventory() {
            const kw = document.getElementById('inv-search').value.trim().toLowerCase();
            const data = inventoryDb.filter(r =>
                !kw || r.no.toLowerCase().includes(kw) || r.serial.toLowerCase().includes(kw) || (r.user || '').toLowerCase().includes(kw));

            const tbody = document.getElementById('inv-tbody');
            const noData = document.getElementById('inv-no-data');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.parentElement.classList.add('hidden');
                noData.classList.remove('hidden');
                document.getElementById('inv-count-badge').innerText = '0 筆資料';
                document.getElementById('inv-pagination-info').innerText = '顯示第 0 到 0 筆，共 0 筆記錄';
                return;
            }
            tbody.parentElement.classList.remove('hidden');
            noData.classList.add('hidden');

            data.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50/70 transition-colors';
                tr.innerHTML = `
                    <td class="text-left"><button type="button" onclick="openAssetDetail('${r.no}')" class="font-mono font-semibold text-primary hover:underline">${r.no}</button></td>
                    <td class="font-mono text-gray-600 text-xs">${r.model}</td>
                    <td class="text-left font-mono text-gray-500 text-xs">${r.serial}</td>
                    <td><span class="px-2 py-0.5 bg-violet-50 text-violet-600 rounded text-xs font-semibold">${r.project}</span></td>
                    <td><span class="px-2 py-0.5 bg-gray-100 rounded text-xs font-semibold text-gray-700">${r.dept}</span></td>
                    <td class="text-gray-700">${r.user}</td>
                    <td class="text-gray-700">${r.keeper}</td>
                    <td>${dateCell(r.firstDate)}</td>
                    <td>${checkCell(r.label)}</td>
                    <td>${checkCell(r.serial2)}</td>
                    <td>${checkCell(r.appearance)}</td>
                    <td class="text-left text-gray-600 text-xs">${r.note || '<span class="text-gray-300">—</span>'}</td>
                    <td>${dateCell(r.recheckDate)}</td>
                    <td>${confirmCell(r.admin)}</td>
                    <td>${confirmCell(r.finance)}</td>
                    <td>${confirmCell(r.audit)}</td>
                    <td>${statusCell(r.status)}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('inv-count-badge').innerText = `${data.length} 筆資料`;
            document.getElementById('inv-pagination-info').innerText = `顯示第 1 到 ${data.length} 筆，共 ${data.length} 筆記錄`;
        }

        /* ============ 四顆功能按鈕 ============ */
        function startAll() { showToast('success', '已開始「全部盤點」（含資產、調撥、維修、報廢等）'); }
        function startAssetOnly() { showToast('success', '已開始「僅資產盤點」'); }
        function endInventory() {
            if (!confirm('確定要結束本次盤點嗎？結束後將無法再登記盤點結果。')) return;
            showToast('info', '本次盤點已結束');
        }
        function exportExcel() { showToast('success', '盤點清單已開始匯出 Excel，請稍候下載。'); }

        /* ============ Toast 提示控制 ============ */
        /* ============ 資產詳情彈窗（比照資產清單）============ */
        const fmt = (n) => Number(n || 0).toLocaleString('en-US');
        let _assetFields = [];
        let _assetEdit = false;
        const _assetRO = new Set();
        const _assetOptions = {
            '状态': ['使用中', '项目闲置', '行政闲置', '项目保管', '行政保管', '外借', '待出售', '已出售', '已赔付', '已销毁'],
            '类别': ['资产', '列管品', '软资产', '暂无类别'],
            '区域': ['T1', 'T2', 'U', 'J', 'S'],
            '币种': ['CNY', 'TWD', 'USD']
        };
        function openAssetDetail(no) {
            const r = inventoryDb.find(x => x.no === no);
            if (!r) return;
            const h = (no.replace(/\D/g, '').split('').reduce((a, c) => a + (+c || 0), 0)) || 1;
            const pick = (arr) => arr[h % arr.length];
            const price = h * 1000 + 5000;
            const residual = Math.round(price * 0.3);
            const TYPES = ['笔电-蘋果笔电', '手机-蘋果手机', '顯示器', '主机-非蘋果主機', '網路設備', '記憶體設備', '辦公家具'];
            const groups = [
                ['基本資訊', [['资产类型', pick(TYPES)], ['状态', pick(_assetOptions['状态'])], ['类别', pick(_assetOptions['类别'])], ['区域', pick(_assetOptions['区域'])], ['项目', r.project], ['部门', r.dept]]],
                ['資產識別', [['资产编号', r.no], ['型号', r.model], ['序列号', r.serial], ['历史资产编号', '-'], ['资产名称', r.model], ['规格', '標準規格'], ['数量', '1']]],
                ['採購 / 財務', [['购买日期', '2024-0' + (h % 9 + 1) + '-15'], ['币种', 'CNY'], ['价格', '¥ ' + fmt(price)], ['残值', '¥ ' + fmt(residual)], ['收据号码', 'RC-' + no.slice(-6)], ['文件编号', 'DOC-' + no.slice(-4)]]],
                ['使用 / 負責', [['使用人', r.user], ['負責人', r.keeper]]],
                ['關聯單據', [['物品购买申请号(PU单)', 'PU-THQ-0000' + (h % 90 + 10)], ['请款单号(A单/B单)', 'B-THQ-0000' + (h % 90 + 10)], ['报销单号(C单)', 'C-THQ-0000' + (h % 90 + 10)], ['维修记录(维修单号)', '-']]],
                ['費用歸屬', [['原采购单位(原费用项目)', r.project + ' / ' + r.dept], ['现资产所有权单位(现费用项目)', r.project + ' / ' + r.dept]]],
            ];
            _assetFields = [];
            groups.forEach(([g, items]) => items.forEach(([k, v]) => _assetFields.push({ k, v, g })));
            _assetEdit = false;
            document.getElementById('ad-no').textContent = r.no;
            _assetAttachments = [{ name: '採購發票.pdf' }, { name: '資產照片.jpg' }, { name: '保固證明.png' }];
            _assetRemarks = r.note ? [r.note] : ['2024-08-15 由行政部完成入庫驗收，配件齊全。'];
            renderAssetDetail();
            renderAssetAttachments();
            renderAssetRemarks();
            document.getElementById('asset-detail-modal').classList.remove('hidden');
        }
        function assetPeopleDir() {
            if (window._peopleDir) return window._peopleDir;
            const arr = [];
            inventoryDb.forEach(r => { if (r.user && !arr.some(p => p.name === r.user)) arr.push({ name: r.user, id: '' }); });
            inventoryDb.forEach(r => { if (r.keeper && !arr.some(p => p.name === r.keeper)) arr.push({ name: r.keeper, id: '' }); });
            window._peopleDir = arr.sort((a, b) => a.name.localeCompare(b.name));
            return window._peopleDir;
        }

        // 備註（可輸入多個；編輯時為嵌入式文字編輯器）
        let _assetRemarks = [];
        const _remarkTextEmpty = (html) => !String(html || '').replace(/<[^>]*>/g, '').replace(/&nbsp;/g, '').trim();
        function assetSyncRemarks() {
            const items = [...document.querySelectorAll('#asset-remark-list [data-r]')];
            if (items.length) _assetRemarks = items.map(el => el.innerHTML);
        }
        function assetRemarkToolbar() {
            const btns = [
                ['bold', 'B', 'font-bold', '粗體'],
                ['italic', 'I', 'italic font-serif', '斜體'],
                ['underline', 'U', 'underline', '底線'],
                ['strikeThrough', 'S', 'line-through', '刪除線'],
                ['|'],
                ['insertUnorderedList', '•—', '', '項目符號'],
                ['insertOrderedList', '1.', '', '編號清單'],
            ];
            return btns.map(b => b[0] === '|'
                ? '<span class="w-px h-5 bg-gray-300 mx-1"></span>'
                : `<button type="button" title="${b[3]}" onmousedown="event.preventDefault();document.execCommand('${b[0]}',false,null)" class="min-w-7 h-7 px-1.5 flex items-center justify-center rounded text-gray-600 hover:bg-gray-200 hover:text-gray-800 text-sm ${b[2]}">${b[1]}</button>`
            ).join('');
        }
        function assetAddRemark() { assetSyncRemarks(); _assetRemarks.push(''); renderAssetRemarks(); }
        function assetRemoveRemark(i) { assetSyncRemarks(); _assetRemarks.splice(i, 1); renderAssetRemarks(); }
        function renderAssetRemarks() {
            const list = document.getElementById('asset-remark-list');
            if (!list) return;
            const addBtn = document.getElementById('asset-remark-add');
            if (addBtn) addBtn.classList.toggle('hidden', !_assetEdit);
            if (_assetEdit) {
                list.innerHTML = (_assetRemarks.length ? _assetRemarks : ['']).map((v, i) => `<div class="flex gap-2 items-start">
                        <div class="flex-1 border border-gray-300 rounded overflow-hidden focus-within:border-primary">
                            <div class="flex flex-wrap items-center gap-0.5 px-2 py-1.5 border-b border-gray-200 bg-gray-50">${assetRemarkToolbar()}</div>
                            <div contenteditable data-r="${i}" data-ph="請輸入備註…" class="asset-remark-editor min-h-[80px] px-3 py-2 text-sm text-gray-800 focus:outline-none">${v}</div>
                        </div>
                        <button type="button" onclick="assetRemoveRemark(${i})" class="text-gray-400 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 shrink-0 mt-0.5"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`).join('');
            } else {
                const shown = _assetRemarks.filter(v => !_remarkTextEmpty(v));
                list.innerHTML = shown.length
                    ? shown.map(v => `<div class="asset-remark-view text-sm text-gray-800 border border-gray-200 rounded px-3 py-2 bg-gray-50/60 break-words">${v}</div>`).join('')
                    : '<div class="text-center text-xs text-gray-400 py-2">尚無備註</div>';
            }
        }
        // 附件（可上傳多個；直接預覽檔案內容示意）
        let _assetAttachments = [];
        const _isImage = (n) => /\.(png|jpe?g|gif|bmp|webp|svg)$/i.test(n || '');
        function assetAddFiles(input) {
            [...(input.files || [])].forEach(f => _assetAttachments.push({ name: f.name }));
            input.value = '';
            renderAssetAttachments();
        }
        function assetRemoveAttach(i) { _assetAttachments.splice(i, 1); renderAssetAttachments(); }
        function renderAssetAttachments() {
            const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            const wrap = document.getElementById('asset-attach-list');
            if (!wrap) return;
            const up = document.getElementById('asset-attach-upload');
            if (up) up.classList.toggle('hidden', !_assetEdit);
            if (!_assetAttachments.length) {
                wrap.innerHTML = '<div class="text-center text-xs text-gray-400 py-4">尚無附件</div>';
                return;
            }
            wrap.innerHTML = _assetAttachments.map((f, i) => {
                const img = _isImage(f.name);
                const viewer = img
                    ? `<div class="w-full max-w-[420px] self-start bg-white shadow-lg p-2"><div class="h-64 rounded flex flex-col items-center justify-center gap-2 text-gray-400 bg-gradient-to-br from-gray-100 to-gray-200"><i class="fa-solid fa-image text-5xl"></i><span class="text-xs">圖片預覽 · ${esc(f.name)}（示意）</span></div></div>`
                    : `<div class="bg-white w-full max-w-[520px] shadow-lg px-8 py-7 self-start">
                            <div class="h-5 w-2/3 bg-gray-800/80 rounded mb-5"></div>
                            <div class="space-y-2.5">
                                <div class="h-2.5 bg-gray-200 rounded w-full"></div>
                                <div class="h-2.5 bg-gray-200 rounded w-11/12"></div>
                                <div class="h-2.5 bg-gray-200 rounded w-full"></div>
                                <div class="h-2.5 bg-gray-200 rounded w-4/5"></div>
                            </div>
                            <div class="h-28 bg-gray-100 border border-gray-200 rounded my-5 flex items-center justify-center text-gray-400 text-sm">表格 / 圖示區</div>
                            <div class="space-y-2.5">
                                <div class="h-2.5 bg-gray-200 rounded w-full"></div>
                                <div class="h-2.5 bg-gray-200 rounded w-10/12"></div>
                                <div class="h-2.5 bg-gray-200 rounded w-9/12"></div>
                            </div>
                            <div class="mt-6 text-center text-[11px] text-gray-400">— PDF 預覽（示意）· ${esc(f.name)} —</div>
                        </div>`;
                return `<div class="border border-gray-300 rounded-lg overflow-hidden bg-white shadow-sm">
                        <div class="flex items-center justify-between px-3 py-2 bg-[#323639] text-gray-200 text-xs">
                            <span class="truncate flex items-center gap-1.5">${img ? '🖼️' : '📄'} ${esc(f.name)}</span>
                            <div class="flex items-center gap-4 shrink-0">
                                <span class="text-gray-400 hidden sm:inline">${img ? '圖片檢視器' : 'PDF 檢視器 · 1 / 1'}</span>
                                <a href="#" onclick="return false" class="hover:text-white inline-flex items-center gap-1"><i class="fa-solid fa-download"></i> 下載</a>
                                ${_assetEdit ? `<button type="button" onclick="assetRemoveAttach(${i})" class="hover:text-white inline-flex items-center gap-1"><i class="fa-solid fa-trash-can"></i> 刪除</button>` : ''}
                            </div>
                        </div>
                        <div class="bg-[#525659] px-4 py-5 h-72 overflow-auto flex justify-center">${viewer}</div>
                    </div>`;
            }).join('');
        }
        function renderAssetDetail() {
            const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            const cell = (f, i) => {
                let ctrl;
                if (_assetEdit && (f.k === '使用人' || f.k === '負責人')) {
                    ctrl = `<div class="relative asset-people-combo"><input data-i="${i}" value="${esc(f.v)}" autocomplete="off" oninput="assetPeopleFilter(this)" onfocus="assetPeopleFilter(this)" onblur="setTimeout(()=>assetPeopleHide(this),150)" placeholder="輸入姓名或工號" class="w-full border border-gray-300 rounded px-2 py-1 text-sm outline-none focus:border-primary"><div class="asset-people-list hidden absolute z-30 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-48 overflow-y-auto text-sm"></div></div>`;
                } else if (_assetEdit && !_assetRO.has(f.k)) {
                    if (_assetOptions[f.k]) {
                        ctrl = `<select data-i="${i}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm outline-none focus:border-primary">` +
                            _assetOptions[f.k].map(o => `<option${o === f.v ? ' selected' : ''}>${o}</option>`).join('') + `</select>`;
                    } else {
                        ctrl = `<input data-i="${i}" value="${esc(f.v)}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm outline-none focus:border-primary">`;
                    }
                } else {
                    const isDoc = f.g === '關聯單據' && f.v && f.v !== '-';
                    const viewBtn = isDoc ? ` <button type="button" onclick="openFormView('${esc(f.v)}')" title="查閱電子表單" class="text-primary hover:text-blue-700 ml-1"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></button>` : '';
                    ctrl = `<div class="text-sm text-gray-800 break-words flex items-center">${esc(f.v)}${viewBtn}</div>`;
                }
                return `<div><div class="text-xs font-semibold text-text-muted mb-1">${f.k}</div>${ctrl}</div>`;
            };
            const groupTitles = [...new Set(_assetFields.map(f => f.g))];
            document.getElementById('asset-detail-grid').innerHTML = groupTitles.map(g => {
                const cells = _assetFields.map((f, i) => ({ f, i })).filter(x => x.f.g === g)
                    .map(({ f, i }) => cell(f, i)).join('');
                return `<div class="border border-gray-200 rounded-lg shadow-sm"><div class="bg-gray-50 px-4 py-2.5 border-b border-gray-200 text-sm font-bold text-primary flex items-center gap-2 rounded-t-lg"><span class="w-1.5 h-4 bg-primary rounded-full"></span>${g}</div><div class="p-4 grid grid-cols-2 sm:grid-cols-4 gap-x-6 gap-y-4">${cells}</div></div>`;
            }).join('');
            document.getElementById('ad-view-btns').classList.toggle('hidden', _assetEdit);
            document.getElementById('ad-edit-btns').classList.toggle('hidden', !_assetEdit);
        }
        function toggleAssetEdit(on) { _assetEdit = on; renderAssetDetail(); renderAssetAttachments(); renderAssetRemarks(); }
        function saveAssetDetail() {
            document.querySelectorAll('#asset-detail-grid [data-i]').forEach(el => { _assetFields[+el.dataset.i].v = el.value; });
            assetSyncRemarks();
            _assetRemarks = _assetRemarks.filter(v => !_remarkTextEmpty(v));
            _assetEdit = false;
            renderAssetDetail();
            renderAssetRemarks();
            showToast('success', '已儲存資產資料（示範）');
        }
        function closeAssetDetail() { _assetEdit = false; document.getElementById('asset-detail-modal').classList.add('hidden'); }
        function assetPeopleFilter(input) {
            const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            const box = input.parentElement.querySelector('.asset-people-list');
            if (!box) return;
            const q = (input.value || '').trim().toLowerCase();
            const matches = assetPeopleDir().filter(p => !q || p.name.toLowerCase().includes(q) || (p.id || '').includes(q)).slice(0, 50);
            box.innerHTML = matches.length
                ? matches.map(p => `<div class="px-3 py-2 hover:bg-primary-light cursor-pointer flex justify-between gap-3" data-name="${esc(p.name)}" data-id="${esc(p.id)}" onmousedown="assetPeoplePick(this)"><span>${esc(p.name)}</span><span class="text-gray-400 font-mono text-xs">${esc(p.id)}</span></div>`).join('')
                : '<div class="px-3 py-2 text-gray-400">查無人員</div>';
            box.classList.remove('hidden');
        }
        function assetPeoplePick(el) {
            const name = el.dataset.name, id = el.dataset.id;
            const combo = el.closest('.asset-people-combo');
            const input = combo.querySelector('input');
            input.value = id ? name + '（' + id + '）' : name;
            combo.querySelector('.asset-people-list').classList.add('hidden');
        }
        function assetPeopleHide(input) {
            const box = input.parentElement.querySelector('.asset-people-list');
            if (box) box.classList.add('hidden');
        }
        // 歷史紀錄
        function openAssetHistory() {
            const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            const no = document.getElementById('ad-no').textContent || '-';
            const h = (no.replace(/\D/g, '').split('').reduce((a, c) => a + (+c || 0), 0)) || 1;
            const rows = [
                { src: '資產登記', item: '資產名稱', before: '-', after: '（初次登記）', by: 'System', at: '2024-0' + (h % 9 + 1) + '-15 09:12' },
                { src: '資產調撥單 (AT-THQ-00' + (h % 90 + 10) + ')', item: '使用人', before: 'James（100344）', after: 'Matthew（101383）', by: 'Henry', at: '2024-11-03 14:27' },
                { src: '手動編輯', item: '狀態', before: '使用中', after: '項目閒置', by: 'William', at: '2025-01-20 10:05' },
                { src: '資產維修單 (RP-THQ-00' + (h % 90 + 10) + ')', item: '殘值', before: '¥ 15,000', after: '¥ 12,000', by: 'Audrey', at: '2025-03-08 16:41' },
                { src: '手動編輯', item: '部門', before: 'RD', after: 'HR', by: 'Emma', at: '2025-06-12 11:33' },
            ];
            document.getElementById('ah-no').textContent = no;
            document.getElementById('asset-history-tbody').innerHTML = rows.map(r => `<tr>
                    <td class="font-mono">${esc(no)}</td>
                    <td>${esc(r.src)}</td>
                    <td>${esc(r.item)}</td>
                    <td class="text-gray-500">${esc(r.before)}</td>
                    <td class="text-gray-800">${esc(r.after)}</td>
                    <td>${esc(r.by)}</td>
                    <td class="whitespace-nowrap text-gray-500">${esc(r.at)}</td>
                </tr>`).join('');
            document.getElementById('asset-history-modal').classList.remove('hidden');
        }
        function closeAssetHistory() { document.getElementById('asset-history-modal').classList.add('hidden'); }
        // 電子表單檢視（由關聯單據查閱 icon 開啟）
        function openFormView(docNo) {
            const typeMap = { PU: '請購單 (PU)', B: '費用申請單 (B)', C: '費用報銷單 (C)', A: '請款單 (A)', RP: '維修單' };
            const prefix = (String(docNo).split('-')[0] || '').toUpperCase();
            document.getElementById('fv-title').textContent = (typeMap[prefix] || '電子表單') + '　' + docNo;
            document.getElementById('fv-docno').textContent = docNo;
            document.getElementById('fv-type').textContent = typeMap[prefix] || '-';
            document.getElementById('form-view-modal').classList.remove('hidden');
        }
        function closeFormView() { document.getElementById('form-view-modal').classList.add('hidden'); }

        function showToast(type, text) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = text;
            if (type === 'success') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20";
                toastIcon.className = "fa-solid fa-circle-check text-emerald-400 text-base";
            } else if (type === 'error') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-rose-500/20";
                toastIcon.className = "fa-solid fa-circle-xmark text-rose-400 text-base";
            } else {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20";
                toastIcon.className = "fa-solid fa-circle-info text-blue-400 text-base";
            }
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.transform = 'translateY(5rem)';
                toast.style.opacity = '0';
            }, 2600);
        }

        window.onload = renderInventory;
    </script>
</body>
</html>
