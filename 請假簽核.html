<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請假簽核 - 簽核管理系統</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 供瀏覽器即時編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link rel="stylesheet" href="shared-ui.css">
    <style>
      /* 審批意見內嵌編輯器 placeholder */
      .approve-editor:empty:before {
        content: attr(data-placeholder);
        color: #9CA3AF;
        pointer-events: none;
      }
    </style>
</head>
<body class="">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示 SVG 元件 ---
    const IconBase = ({ size = 24, strokeWidth = 2, children, className = '', ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Calendar = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
    const PenLine = (props) => <IconBase {...props}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></IconBase>;
    const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>;
    const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"></polyline></IconBase>;
    const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;

    // --- 自訂日期選取器 (DatePicker) 元件 ---
    const DatePickerDropdown = ({ isOpen, onToggle, value, onChange, placeholder }) => {
      const [viewDate, setViewDate] = useState(value ? new Date(value) : new Date());

      useEffect(() => {
        if (isOpen && value) {
          setViewDate(new Date(value));
        }
      }, [isOpen, value]);

      const formatDate = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };

      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const days = [];
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

      return (
        <div className="relative">
          <div
            onClick={onToggle}
            className={`flex items-center bg-white border rounded px-3 py-1.5 shadow-sm cursor-pointer transition-colors ${
              isOpen ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
            }`}
          >
            <Calendar size={15} className="text-gray-400 mr-2 flex-shrink-0" />
            <input
              type="text"
              className="w-24 outline-none text-sm text-gray-700 cursor-pointer bg-transparent pointer-events-none"
              placeholder={placeholder}
              value={value}
              readOnly
            />
          </div>
          
          {isOpen && (
            <div className="absolute top-full mt-1 left-0 bg-white border border-gray-200 rounded shadow-lg z-50 p-4 w-[280px]" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="rotate-90" />
                </button>
                <span className="text-[15px] font-semibold text-gray-800">{year}年 {month + 1}月</span>
                <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="-rotate-90" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-2 font-medium">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-sm">
                {days.map((d, i) => {
                  const dateStr = d ? formatDate(d) : '';
                  const isSelected = value === dateStr;
                  const isToday = d && formatDate(d) === formatDate(new Date());
                  
                  return (
                    <div
                      key={i}
                      onClick={() => {
                        if (d) {
                          onChange(isSelected ? '' : dateStr);
                          if (!isSelected) onToggle();
                        }
                      }}
                      className={`
                        py-1 rounded transition-colors
                        ${!d ? 'pointer-events-none' : 'cursor-pointer'}
                        ${isSelected ? 'bg-[#4A90E2] text-white font-medium shadow-sm' : 
                          d ? 'hover:bg-gray-100 text-gray-700' : ''}
                        ${!isSelected && isToday ? 'text-[#4A90E2] font-bold' : ''}
                      `}
                    >
                      {d ? d.getDate() : ''}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- 主程式元件 ---
    const App = () => {
      // 頁籤狀態
      const tabs = ['請假簽核'];
      const [activeTab, setActiveTab] = useState('請假簽核');

      // 費用詳情彈窗控制狀態
      const [isModalOpen, setIsModalOpen] = useState(false);
      // 關聯單號導覽堆疊：在彈窗內開啟關聯單時記住來源，關閉時可返回原本的單
      const [modalStack, setModalStack] = useState([]);
      // 從列表開啟（全新）詳情彈窗：清空導覽堆疊
      const openDocModal = (row) => { setModalStack([]); setModalRow(row); setIsModalOpen(true); };
      // 在彈窗內開啟關聯單：把目前的單推入堆疊
      const openRelatedDoc = (target) => { setModalStack(prev => [...prev, modalRow]); setModalRow(target); };
      // 關閉 / 返回：堆疊有來源則返回上一張，否則整個關閉
      const closeOrBackModal = () => {
        setModalStack(prev => {
          if (prev.length > 0) { setModalRow(prev[prev.length - 1]); return prev.slice(0, -1); }
          setIsModalOpen(false);
          return [];
        });
      };
      // 請假 / 補卡「檢視」詳情彈窗（依電子表單簽核彈窗樣式製作）
      const [viewItem, setViewItem] = useState(null); // { kind: 'leave' | 'timesheet', data: row }
      // 電子表單簽核：點擊編號開啟詳情彈窗時，記住該列資料以帶入彈窗內容
      const [modalRow, setModalRow] = useState(null);
      const [showOpinions, setShowOpinions] = useState(false);
      // 審批動作彈窗（審批 / 駁回 / 補件 + 意見 + 附件）
      const [approveActionOpen, setApproveActionOpen] = useState(false);
      const [approveDecision, setApproveDecision] = useState('審批');
      // 指派工作單彈窗（C-THQ-000002 審批通過後）
      const [assignModalOpen, setAssignModalOpen] = useState(false);
      const [assignee, setAssignee] = useState('');
      // 單據覆寫（指派後更新簽核/工作狀態）：{ [docNo]: { status, workStatus } }
      const [docOverrides, setDocOverrides] = useState({});
      const [approveFiles, setApproveFiles] = useState([]); // [{ name, size }]
      const approveEditorRef = React.useRef(null);
      // 費用報銷明細下方「說明」附件（預設帶入兩張發票示意）
      const [noteFiles, setNoteFiles] = useState([
        { name: 'A4紙發票.pdf', size: 245 * 1024 },
        { name: '洗碗精發票.pdf', size: 180 * 1024 },
      ]);
      const noteFileInputRef = React.useRef(null);
      const approveFileInputRef = React.useRef(null);
      const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB
      const formatFileSize = (bytes) => {
        if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
        return bytes + ' B';
      };
      const handleApproveFiles = (fileList) => {
        const incoming = Array.from(fileList || []);
        const accepted = [];
        const rejected = [];
        incoming.forEach(f => {
          if (f.size > MAX_FILE_SIZE) rejected.push(f.name);
          else accepted.push({ name: f.name, size: f.size });
        });
        if (rejected.length) {
          window.alert('以下附件超過 20MB 上限，已略過：\n' + rejected.join('\n'));
        }
        if (accepted.length) setApproveFiles(prev => [...prev, ...accepted]);
      };
      const handleNoteFiles = (fileList) => {
        const incoming = Array.from(fileList || []);
        const accepted = [];
        const rejected = [];
        incoming.forEach(f => {
          if (f.size > MAX_FILE_SIZE) rejected.push(f.name);
          else accepted.push({ name: f.name, size: f.size });
        });
        if (rejected.length) window.alert('以下附件超過 20MB 上限，已略過：\n' + rejected.join('\n'));
        if (accepted.length) setNoteFiles(prev => [...prev, ...accepted]);
      };
      const openApproveAction = () => {
        setApproveDecision('審批');
        setApproveFiles([]);
        setApproveActionOpen(true);
      };
      const submitApproveAction = () => {
        setApproveActionOpen(false);
        // C-THQ-000002 審批通過 → 開啟「指派工作單」彈窗
        if (modalRow?.docNo === 'C-THQ-000002' && approveDecision === '審批') {
          setAssignee('');
          setAssignModalOpen(true);
          return;
        }
        setIsModalOpen(false);
        setModalStack([]);
      };
      const submitAssign = () => {
        const dn = modalRow?.docNo;
        if (dn) setDocOverrides(prev => ({ ...prev, [dn]: { status: '簽核完成', workStatus: '已派工' } }));
        setAssignModalOpen(false);
        setIsModalOpen(false);
        setModalStack([]);
      };
      const [activeExportModal, setActiveExportModal] = useState(null);
      const [selectedBookkeeping, setSelectedBookkeeping] = useState([]);
      const [pendingApprovalOnly, setPendingApprovalOnly] = useState(false);
      const [withdrawConfirmItem, setWithdrawConfirmItem] = useState(null);

      // 批量審批相關狀態與假資料
      const [selectedLeave, setSelectedLeave] = useState([]);
      const [selectedTimesheet, setSelectedTimesheet] = useState([]);
      const [selectedCancel, setSelectedCancel] = useState([]);
      const [batchApproveModal, setBatchApproveModal] = useState(null); // 'leave' | 'timesheet' | 'cancel' | null

      const mockLeaveData = [
        { id: 'L1', project: 'GT', dept: 'RD', empNo: '101372', applyTime: '2026-05-28 10:00:00', name: 'Nick', startDate: '2026-06-01', endDate: '2026-06-02', leaveType: '年假', hours: '16', status: '待我簽核' },
        { id: 'L2', project: 'GT', dept: 'RD', empNo: '100962', applyTime: '2026-05-29 09:30:00', name: 'Miles', startDate: '2026-06-05', endDate: '2026-06-05', leaveType: '事假', hours: '8', status: '未簽核' },
        { id: 'L3', project: 'GT', dept: 'RD', empNo: '101436', applyTime: '2026-05-30 11:00:00', name: 'Stella', startDate: '2026-06-10', endDate: '2026-06-10', leaveType: '病假', hours: '4', status: '簽核完成' },
        { id: 'L4', project: 'GT', dept: 'RD', empNo: '100123', applyTime: '2026-05-31 14:20:00', name: 'Hazel', startDate: '2026-06-15', endDate: '2026-06-16', leaveType: '年假', hours: '16', status: 'CC' },
        { id: 'L5', project: 'GT', dept: 'RD', empNo: '101372', applyTime: '2026-06-03 16:45:00', name: 'Nick', startDate: '2026-06-01', endDate: '2026-06-01', leaveType: '年假(銷假)', hours: '8', status: '待我簽核' },
      ];

      const mockTimesheetData = [
        { id: 'T1', project: 'GT', dept: 'RD', empNo: '100344', submitDate: '2026-05-28', clockTime: '2026-05-27 08:55:00', period: '上班', type: '忘記打卡', status: '待我簽核' },
        { id: 'T2', project: 'GT', dept: 'RD', empNo: '101436', submitDate: '2026-05-29', clockTime: '2026-05-28 18:05:00', period: '下班', type: '忘記打卡', status: '未簽核' },
        { id: 'T3', project: 'GT', dept: 'RD', empNo: '100960', submitDate: '2026-05-30', clockTime: '2026-05-29 09:00:00', period: '上班', type: '公出', status: '簽核完成' },
        { id: 'T4', project: 'GT', dept: 'RD', empNo: '100570', submitDate: '2026-05-31', clockTime: '2026-05-30 18:30:00', period: '下班', type: '公出', status: 'CC' },
      ];

      // 銷假簽核：假單已完成後申請銷假，需主管簽核
      const mockCancelData = [
        { id: 'CL1', project: 'GT', dept: 'RD', empNo: '101372', applyTime: '2026-06-05 09:10:00', name: 'Nick', leaveType: '年假', startDate: '2026-06-01', endDate: '2026-06-02', hours: '16', reason: '行程取消，原假期不需請', status: '待我簽核' },
        { id: 'CL2', project: 'GT', dept: 'RD', empNo: '101436', applyTime: '2026-06-06 14:00:00', name: 'Stella', leaveType: '病假', startDate: '2026-06-10', endDate: '2026-06-10', hours: '4', reason: '已康復，提前返崗', status: '未簽核' },
        { id: 'CL3', project: 'GT', dept: 'RD', empNo: '100962', applyTime: '2026-06-02 11:30:00', name: 'Miles', leaveType: '事假', startDate: '2026-05-28', endDate: '2026-05-28', hours: '8', reason: '私事已處理完畢', status: '簽核完成' },
      ];

      // 過濾出「需要審批」的資料，供全選功能使用（請假以篩選後的清單為準，定義於 selectedFilters 之後）
      const approvableTimesheets = mockTimesheetData.filter(d => d.status === '待我簽核');

      // --- 輔助：取得格式化日期 (yyyy-MM-dd) ---
      const getFormattedDate = (daysOffset = 0) => {
        const d = new Date();
        d.setDate(d.getDate() + daysOffset);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      };

      // --- 發起申請資料 ---
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');

      // 請假與補卡簽核專用預設日期區間 (今日往前推 31 天到今日)
      const [ltStartDate, setLtStartDate] = useState(getFormattedDate(-31));
      const [ltEndDate, setLtEndDate] = useState(getFormattedDate(0));

      // 共用：控制篩選下拉選單開啟
      const [openDropdown, setOpenDropdown] = useState(null);

      // 電子表單簽核：篩選器設定
      const filterConfigs = [
        { id: 'status', label: '狀態', type: 'multi', options: ['未簽核', '待我簽核', '簽核中(7)', '簽核完成', '撤回', '駁回', 'CC', '待補件'] },
        { id: 'oa', label: 'OA 類型', type: 'multi', options: ['商務', '合同', '財務', '行政', 'PMO'] },
        { id: 'project', label: '項目', type: 'multi', options: ['GT'] },
        { id: 'location', label: '地點', type: 'multi', options: ['T1', 'T2', 'THQ', 'T3', 'T4'] },
        { id: 'title', label: '職稱', type: 'multi', options: ['行政負責代表', '人力資源中心', '記帳', '財務總監', '費用會計'] },
        { id: 'docType', label: '單據類型', type: 'multi', options: ['新增資產申請 (ASSETS)', '費用申請單 (B)', '商務公告(BU)', '費用報銷單 (C)', '內部合同審批單 (IC)'] },
      ];

      // 請假/補卡簽核：專屬篩選器設定
      const ltFilterConfigs = [
        { id: 'ltStatus', label: '狀態', type: 'multi', options: ['未簽核', '待我簽核', '簽核中(7)', '簽核完成', '撤回', '駁回', 'CC', '待補件'] },
        { id: 'ltProject', label: '項目', type: 'multi', options: ['GT'] },
        { id: 'ltDept', label: '部門', type: 'multi', options: ['API', 'RD'] },
      ];

      // 統一狀態管理
      const [selectedFilters, setSelectedFilters] = useState({
        status: ['未簽核', '待我簽核', '簽核中(7)'], // 預設選中
        oa: [], project: [], location: [], title: [], docType: [],
        ltStatus: ['未簽核', '待我簽核', '簽核中(7)'], ltProject: [], ltDept: []
      });

      // 請假簽核：依篩選器（狀態 / 項目 / 部門，多選；未選代表全部）過濾列表
      const filteredLeaveData = mockLeaveData.filter(d =>
        (selectedFilters.ltStatus.length === 0 || selectedFilters.ltStatus.includes(d.status)) &&
        (selectedFilters.ltProject.length === 0 || selectedFilters.ltProject.includes(d.project)) &&
        (selectedFilters.ltDept.length === 0 || selectedFilters.ltDept.includes(d.dept))
      );
      // 全選 / 批量審批以「篩選後可審批」的資料為準
      const approvableLeaves = filteredLeaveData.filter(d => d.status === '待我簽核');

      // 銷假簽核：依篩選器（狀態 / 項目 / 部門）過濾列表
      const filteredCancelData = mockCancelData.filter(d =>
        (selectedFilters.ltStatus.length === 0 || selectedFilters.ltStatus.includes(d.status)) &&
        (selectedFilters.ltProject.length === 0 || selectedFilters.ltProject.includes(d.project)) &&
        (selectedFilters.ltDept.length === 0 || selectedFilters.ltDept.includes(d.dept))
      );
      const approvableCancels = filteredCancelData.filter(d => d.status === '待我簽核');

      const toggleFilterOption = (filterId, option) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (Array.isArray(currentSelected)) {
            if (currentSelected.includes(option)) {
              return { ...prev, [filterId]: currentSelected.filter(item => item !== option) };
            } else {
              return { ...prev, [filterId]: [...currentSelected, option] };
            }
          } else {
            return { ...prev, [filterId]: option };
          }
        });
      };

      const toggleSelectAll = (filterId, options) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (currentSelected.length === options.length) {
            return { ...prev, [filterId]: [] }; 
          } else {
            return { ...prev, [filterId]: [...options] }; 
          }
        });
      };

      const removeFilterOption = (filterId, option, e) => {
        e.stopPropagation();
        toggleFilterOption(filterId, option);
      };

      // 提取共用的篩選列渲染函數
      const renderFilterBar = (configs) => (
        <div className="bg-[#F8F9FB] p-3 rounded border border-gray-200 flex flex-wrap gap-4 items-center">
          {configs.map((filter) => (
            <div key={filter.id} className={`flex items-center gap-2 flex-1 min-w-[180px] ${filter.id === 'docType' || filter.id === 'status' || filter.id === 'ltStatus' ? 'md:col-span-2 lg:min-w-[280px]' : ''}`}>
              <span className="whitespace-nowrap text-xs text-gray-600 font-medium w-16 text-right">{filter.label}</span>
              <div className="relative flex-1 group">
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setOpenDropdown(openDropdown === filter.id ? null : filter.id);
                  }}
                  className={`w-full flex items-center justify-between bg-white border rounded px-2.5 py-1.5 text-[13px] transition-colors shadow-sm min-h-[32px] ${
                    openDropdown === filter.id ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
                  }`}
                >
                  <div className="flex-1 flex flex-wrap gap-1 items-center overflow-hidden" title={filter.type !== 'single' && selectedFilters[filter.id].length > 0 ? selectedFilters[filter.id].join('、') : undefined}>
                    {filter.type === 'single' ? (
                      <span className="text-gray-700 truncate">{selectedFilters[filter.id]}</span>
                    ) : selectedFilters[filter.id].length > 0 ? (
                      <>
                        {selectedFilters[filter.id].slice(0, 3).map(opt => (
                          <span key={opt} className="inline-flex items-center gap-1 bg-[#F0F2F5] text-gray-700 px-1.5 py-0.5 rounded-sm text-[11px] border border-gray-200 max-w-full">
                            <span className="truncate">{opt}</span>
                            <div
                              onClick={(e) => removeFilterOption(filter.id, opt, e)}
                              className="hover:text-red-500 hover:bg-gray-200 rounded-full p-0.5 transition-colors cursor-pointer flex-shrink-0"
                            >
                              <X size={10} strokeWidth={2} />
                            </div>
                          </span>
                        ))}
                        {selectedFilters[filter.id].length > 3 && (

                        </div>
                        <div className="h-px bg-gray-100 mb-2"></div>
                        <div className="space-y-1">
                          {['D', 'F', 'IM', 'J', 'K', 'M', 'S', 'T1', 'T2', 'T3', 'T4'].map(opt => (
                            <label key={opt} className="flex items-center gap-3 py-1.5 px-2 hover:bg-gray-50 rounded cursor-pointer transition-colors">
                              <input 
                                type="checkbox"
                                checked={selectedBookkeeping.includes(opt)}
                                onChange={() => {
                                  if (selectedBookkeeping.includes(opt)) {
                                    setSelectedBookkeeping(selectedBookkeeping.filter(x => x !== opt));
                                  } else {
                                    setSelectedBookkeeping([...selectedBookkeeping, opt]);
                                  }
                                }}
                                className="w-4 h-4 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2] cursor-pointer" 
                              />
                              <span className="text-[13px] text-gray-700">{opt}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="py-4">
                      <label className="flex items-center gap-3 py-2 px-1 hover:bg-gray-50 rounded cursor-pointer transition-colors">
                        <input 
                          type="checkbox"
                          checked={pendingApprovalOnly}
                          onChange={(e) => setPendingApprovalOnly(e.target.checked)}
                          className="w-4 h-4 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2] cursor-pointer" 
                        />
                        <span className="text-[13px] text-gray-700">待我審核</span>
                      </label>
                    </div>
                  )}
                </div>

                {/* 底部按鈕區 */}
                <div className="border-t border-gray-200 px-6 py-4 flex justify-end bg-white">
                  <button 
                    onClick={() => {
                      // 模擬匯出完成，關閉彈窗
                      setActiveExportModal(null);
                    }}
                    className="ui-btn ui-btn-primary"
                  >
                    匯出
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ================= 撤回確認彈窗 ================= */}
          {withdrawConfirmItem && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-[60] flex items-center justify-center p-4" onClick={() => setWithdrawConfirmItem(null)}>
              <div 
                className="bg-white rounded-md shadow-xl w-full max-w-[400px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-center"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8">
                  <div className="text-gray-800 text-sm font-medium mb-8">
                    确定要撤回此申请单吗？
                  </div>
                  <div className="flex justify-center gap-4">
                    <button
                      onClick={() => setWithdrawConfirmItem(null)}
                      className="ui-btn ui-btn-secondary"
                    >
                      取消
                    </button>
                    <button
                      onClick={() => {
                        // 模擬撤回邏輯
                        setWithdrawConfirmItem(null);
                      }}
                      className="ui-btn ui-btn-primary"
                    >
                      確定
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ================= 批量審批確認彈窗 ================= */}
          {batchApproveModal && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-[60] flex items-center justify-center p-4" onClick={() => setBatchApproveModal(null)}>
              <div 
                className="bg-white rounded-md shadow-xl w-full max-w-[400px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-center"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8">
                  <div className="text-gray-800 text-base font-medium mb-8">
                    確定要批量審批已選取的 {batchApproveModal === 'leave' ? selectedLeave.length : batchApproveModal === 'cancel' ? selectedCancel.length : selectedTimesheet.length} 筆項目嗎？
                  </div>
                  <div className="flex justify-center gap-4">
                    <button
                      onClick={() => setBatchApproveModal(null)}
                      className="ui-btn ui-btn-secondary"
                    >
                      取消
                    </button>
                    <button
                      onClick={() => {
                        // 模擬審批邏輯：清空已選項
                        if (batchApproveModal === 'leave') setSelectedLeave([]);
                        if (batchApproveModal === 'timesheet') setSelectedTimesheet([]);
                        if (batchApproveModal === 'cancel') setSelectedCancel([]);
                        setBatchApproveModal(null);
                      }}
                      className="ui-btn ui-btn-success"
                    >
                      確定審批
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    // 將 React 元件渲染到 DOM 中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
