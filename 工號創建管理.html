<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工號創建管理</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 用於圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB',
                        card: '#FFFFFF',
                        text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                        'modal': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.background');
            font-family: theme('fontFamily.sans');
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }

        /* Modal 動畫過渡 */
        .modal-enter { opacity: 0; transform: scale(0.95) translateY(10px); }
        .modal-enter-active {
            opacity: 1; transform: scale(1) translateY(0);
            transition: opacity 200ms ease-out, transform 200ms ease-out;
        }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <h1 class="ui-page-title">工號創建管理</h1>
            <div class="flex items-center gap-2.5 w-full sm:w-auto">
                <button onclick="openAddModal()" class="ui-btn ui-btn-primary flex-1 sm:flex-none">
                    <i class="fa-solid fa-plus"></i> 新增問題
                </button>
            </div>
        </header>

        <!-- 問題列表 -->
        <section class="space-y-4">
            <div class="flex items-center gap-2">
                <h2 class="text-lg font-bold text-gray-900">問題清單</h2>
                <span id="q-count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 題</span>
            </div>

            <div id="question-list" class="grid grid-cols-1 xl:grid-cols-2 gap-4 items-start"><!-- 動態由 JavaScript 渲染 --></div>

            <div id="no-data-view" class="hidden ui-card py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-list-check text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">目前尚無問題，點擊右上角「新增問題」建立。</p>
            </div>
        </section>

    </div>

    <!-- ========================================== -->
    <!-- 彈出視窗：新增 / 編輯問題 -->
    <!-- ========================================== -->
    <div id="q-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>

        <div class="fixed inset-0 z-10 overflow-y-auto flex items-center justify-center p-4">
            <div class="relative bg-white rounded-lg shadow-modal w-full max-w-[720px] transform transition-all modal-enter flex flex-col my-8">

                <!-- 標頭 -->
                <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100">
                    <h3 id="q-modal-title" class="font-bold text-lg text-[#3245B1] tracking-wide">新增問題</h3>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-[#4A90E2] text-white rounded-md hover:bg-opacity-95 transition-colors shadow-sm">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>

                <!-- 內容 -->
                <div class="p-6 space-y-5 max-h-[75vh] overflow-y-auto custom-scrollbar">

                    <!-- 三語言問題內容 -->
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-gray-700">問題內容（簡體中文）<span class="text-red-500">*</span></label>
                        <textarea id="modal-zhcn" rows="3" placeholder="请输入简体中文问题内容..." class="ui-input resize-none"></textarea>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-gray-700">問題內容（繁體中文）<span class="text-red-500">*</span></label>
                        <textarea id="modal-zhtw" rows="3" placeholder="請輸入繁體中文問題內容..." class="ui-input resize-none"></textarea>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-gray-700">問題內容（English）<span class="text-red-500">*</span></label>
                        <textarea id="modal-en" rows="3" placeholder="Enter the question in English..." class="ui-input resize-none"></textarea>
                    </div>
                    <p id="modal-error" class="hidden text-xs text-rose-500">三種語言的問題內容皆為必填</p>

                    <!-- 回答行為配置 -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 border-t border-gray-100">
                        <div class="space-y-1.5">
                            <label class="text-sm font-semibold text-gray-700 flex items-center gap-1.5">
                                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span> 回答「是」時
                            </label>
                            <select id="modal-yes" class="ui-select"></select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-sm font-semibold text-gray-700 flex items-center gap-1.5">
                                <span class="inline-block w-2 h-2 rounded-full bg-rose-500"></span> 回答「否」時
                            </label>
                            <select id="modal-no" class="ui-select"></select>
                        </div>
                    </div>

                </div>

                <!-- 底部按鈕 -->
                <div class="px-6 py-4 flex justify-end gap-3 border-t border-gray-100 bg-gray-50/50 rounded-b-lg">
                    <button onclick="closeModal()" class="ui-btn ui-btn-secondary">取消</button>
                    <button onclick="saveQuestion()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-check"></i> 儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <!-- 共用題庫（單一來源，與「員工管理 → 工號申請」共用） -->
    <script src="工號問卷.js"></script>
    <script>
        // JUMP_OPTIONS / ID_OPTIONS / ID_QUESTIONS 由 工號問卷.js 提供
        // 本頁為編輯介面：以共用題庫為初始值（深拷貝，避免直接改動共用來源）
        let questions = JSON.parse(JSON.stringify(ID_QUESTIONS));

        let editingIndex = null;   // null = 新增模式

        const CN_NUM = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
        function numToCN(n) { return n <= 10 ? CN_NUM[n] : String(n); }

        // 是否為「核發工號」類行為
        function isIdBehavior(v) { return v && v.startsWith('工號'); }

        // 行為下拉選單 options（含 optgroup 分組）
        function behaviorOptionsHtml(selected) {
            const opt = v => `<option value="${v}" ${v === selected ? 'selected' : ''}>${v}</option>`;
            return `<optgroup label="跳轉至題目">${JUMP_OPTIONS.map(opt).join('')}</optgroup>` +
                   `<optgroup label="核發工號開頭">${ID_OPTIONS.map(opt).join('')}</optgroup>`;
        }

        // 行為摘要徽章（卡片內顯示）
        function behaviorBadge(v) {
            if (isIdBehavior(v)) {
                return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-violet-50 text-violet-600"><i class="fa-solid fa-id-card-clip text-[10px]"></i>核發 ${v}</span>`;
            }
            return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-blue-50 text-primary"><i class="fa-solid fa-arrow-right-long text-[10px]"></i>跳至 ${v}</span>`;
        }

        /* ============ 列表渲染 ============ */
        function renderQuestions() {
            const list = document.getElementById('question-list');
            const noData = document.getElementById('no-data-view');
            list.innerHTML = '';

            document.getElementById('q-count-badge').innerText = `${questions.length} 題`;

            if (questions.length === 0) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'ui-card p-5 flex flex-col h-[340px]';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-3 shrink-0">
                        <div class="flex items-center gap-2.5 min-w-0">
                            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-primary text-white text-xs font-bold shrink-0">No.${i + 1}</span>
                            <h3 class="text-base font-bold text-gray-800">問題${numToCN(i + 1)}</h3>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="openEditModal(${i})" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen"></i> 編輯</button>
                            <button onclick="deleteQuestion(${i})" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                        </div>
                    </div>

                    <div class="mt-4 space-y-3 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                        ${langRow('簡中', q.zhCN)}
                        ${langRow('繁中', q.zhTW)}
                        ${langRow('EN', q.en)}
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-4 shrink-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 shrink-0"></span>
                            <span class="text-xs font-semibold text-gray-600">回答「是」時</span>
                            ${behaviorBadge(q.yes)}
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="inline-block w-2 h-2 rounded-full bg-rose-500 shrink-0"></span>
                            <span class="text-xs font-semibold text-gray-600">回答「否」時</span>
                            ${behaviorBadge(q.no)}
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function langRow(label, text) {
            return `
                <div class="flex gap-3">
                    <span class="shrink-0 w-12 text-center text-[11px] font-bold text-gray-500 bg-gray-100 rounded px-1.5 py-0.5 h-fit">${label}</span>
                    <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line flex-1">${text || '<span class="text-gray-300">（未填寫）</span>'}</p>
                </div>`;
        }

        /* ============ 新增 / 編輯彈窗 ============ */
        function openAddModal() {
            editingIndex = null;
            document.getElementById('q-modal-title').innerText = '新增問題';
            document.getElementById('modal-zhcn').value = '';
            document.getElementById('modal-zhtw').value = '';
            document.getElementById('modal-en').value = '';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('modal-yes').innerHTML = behaviorOptionsHtml('No.1');
            document.getElementById('modal-no').innerHTML = behaviorOptionsHtml('No.1');
            showModal();
        }

        function openEditModal(i) {
            const q = questions[i];
            if (!q) return;
            editingIndex = i;
            document.getElementById('q-modal-title').innerText = `編輯問題${numToCN(i + 1)}`;
            document.getElementById('modal-zhcn').value = q.zhCN;
            document.getElementById('modal-zhtw').value = q.zhTW;
            document.getElementById('modal-en').value = q.en;
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('modal-yes').innerHTML = behaviorOptionsHtml(q.yes);
            document.getElementById('modal-no').innerHTML = behaviorOptionsHtml(q.no);
            showModal();
        }

        function saveQuestion() {
            const zhCN = document.getElementById('modal-zhcn').value.trim();
            const zhTW = document.getElementById('modal-zhtw').value.trim();
            const en = document.getElementById('modal-en').value.trim();
            const yes = document.getElementById('modal-yes').value;
            const no = document.getElementById('modal-no').value;

            if (!zhCN || !zhTW || !en) {
                document.getElementById('modal-error').classList.remove('hidden');
                return;
            }

            if (editingIndex === null) {
                questions.push({ zhCN, zhTW, en, yes, no });
                showToast('success', '已新增問題');
            } else {
                questions[editingIndex] = { zhCN, zhTW, en, yes, no };
                showToast('success', `已更新「問題${numToCN(editingIndex + 1)}」`);
            }
            closeModal();
            renderQuestions();
        }

        function deleteQuestion(i) {
            if (!confirm(`確定要刪除「問題${numToCN(i + 1)}」嗎？此動作無法復原。`)) return;
            questions.splice(i, 1);
            showToast('error', '已刪除問題');
            renderQuestions();
        }

        /* ============ 彈窗顯示 / 隱藏 ============ */
        function showModal() {
            const modal = document.getElementById('q-modal');
            const panel = modal.querySelector('.transform');
            modal.classList.remove('hidden');
            setTimeout(() => { panel.classList.add('modal-enter-active'); panel.classList.remove('modal-enter'); }, 10);
        }
        function closeModal() {
            const modal = document.getElementById('q-modal');
            const panel = modal.querySelector('.transform');
            panel.classList.remove('modal-enter-active');
            panel.classList.add('modal-enter');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        /* ============ Toast ============ */
        function showToast(type, text) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = text;
            if (type === 'success') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20";
                toastIcon.className = "fa-solid fa-circle-check text-emerald-400 text-base";
            } else if (type === 'error') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-rose-500/20";
                toastIcon.className = "fa-solid fa-circle-xmark text-rose-400 text-base";
            } else {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20";
                toastIcon.className = "fa-solid fa-circle-info text-blue-400 text-base";
            }
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.transform = 'translateY(5rem)';
                toast.style.opacity = '0';
            }, 2600);
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
