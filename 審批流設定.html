<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>審批流設定</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 供瀏覽器即時編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 自定義捲軸樣式 (僅針對表格區域) */
    .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
        width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1; 
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d1d5db; 
        border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #9ca3af; 
    }
  </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- 圖示 SVG 元件 ---
    const IconBase = ({ size = 24, strokeWidth = 2, children, className = '', ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"></polyline></IconBase>;
    const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconBase>;
    const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;

    // --- 假資料 ---
    const initialTemplateData = [
      { name: '採購申請審批流', type: '採購申請', priority: 100, steps: 3, status: '啟用' },
      { name: '費用報銷審批流', type: '費用報銷', priority: 100, steps: 3, status: '啟用' },
      { name: '出差申請審批流', type: '出差申請', priority: 100, steps: 3, status: '啟用' },
      { name: 'OA 資產申請審批流', type: 'OA 資產申請', priority: 100, steps: 3, status: '啟用' },
      { name: '資訊需求申請審批流', type: '資訊需求申請', priority: 100, steps: 3, status: '啟用' },
      { name: '人力需求申請審批流', type: '人力需求申請', priority: 100, steps: 3, status: '啟用' },
      { name: '薪資申請審批流', type: '薪資申請', priority: 100, steps: 3, status: '啟用' },
    ];

    const roleData = [
      { code: 'applicant_direct_manager', name: '申請人直屬主管', parseType: '組織動態解析', description: '從員工組織歸屬中取得直屬主管，動態解析，無需設定群組' },
      { code: 'department_manager', name: '部門主管', parseType: '組織動態解析', description: '從部門資料解析部門主管，動態解析，無需設定群組' },
      { code: 'lead', name: '負責人', parseType: '審批對應解析', description: '依分組類型從審批對應解析對應負責人 (需同時選擇分組)' },
      { code: 'hr', name: '人事專員', parseType: '審批對應解析', description: '依分組類型從審批對應解析對應人事專員' },
      { code: 'hr_manager', name: '人事主管', parseType: '審批對應解析', description: '依分組類型從審批對應解析對應人事主管' },
      { code: 'finance', name: '財務人員', parseType: '審批對應解析', description: '依分組類型從審批對應解析對應財務人員' },
      { code: 'finance_manager', name: '財務主管', parseType: '審批對應解析', description: '依分組類型從審批對應解析對應財務主管' },
      { code: 'ceo', name: '執行長', parseType: '審批對應解析', description: '特殊層級，從審批對應解析，需在帳號管理設定 scopeType=special' },
      { code: 'chairman', name: '董事長', parseType: '審批對應解析', description: '特殊層級，從審批對應解析，需在帳號管理設定 scopeType=special' },
    ];

    // --- 主程式元件 ---
    const App = () => {
      const tabs = ['審批模板', '審批角色'];
      const [activeTab, setActiveTab] = useState('審批模板');
      
      // 模板列表狀態
      const [templates, setTemplates] = useState(initialTemplateData);

      // 新增用的狀態
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isTemplateEnabled, setIsTemplateEnabled] = useState(false);
      const [selectedFormType, setSelectedFormType] = useState('');

      // 編輯用的狀態
      const [editingTemplate, setEditingTemplate] = useState(null);
      const [isEditTemplateEnabled, setIsEditTemplateEnabled] = useState(true);
      const [editSelectedFormType, setEditSelectedFormType] = useState('');

      // 步驟設定用的狀態
      const [isStepModalOpen, setIsStepModalOpen] = useState(false);
      const [currentStepTemplate, setCurrentStepTemplate] = useState(null);
      const [stepsData, setStepsData] = useState([]);

      // 拖曳排序用的狀態
      const [draggedItemIndex, setDraggedItemIndex] = useState(null);
      const [dragOverItemIndex, setDragOverItemIndex] = useState(null);

      // 開啟編輯彈窗並預填資料
      const openEditModal = (row) => {
        setEditingTemplate(row);
        setIsEditTemplateEnabled(row.status === '啟用');
        setEditSelectedFormType(''); // 下拉預設值，藉由 placeholder 顯示目前 row.type
      };

      // 開啟步驟設定彈窗並載入假資料
      const openStepModal = (row) => {
        setCurrentStepTemplate(row);
        // 載入符合截圖的初始資料
        setStepsData([
          { id: 1, name: '直屬主管審核', signMethod: '串簽', allowAddSigner: false, approvers: ['申請人直屬主管'] },
          { id: 2, name: '部門主管審核', signMethod: '串簽', allowAddSigner: false, approvers: ['部門主管'] },
          { id: 3, name: '項目負責人確認', signMethod: '串簽', allowAddSigner: false, approvers: [''] }
        ]);
        setIsStepModalOpen(true);
      };

      // --- 拖曳排序處理函式 ---
      const handleDragStart = (e, index) => {
        setDraggedItemIndex(index);
        e.dataTransfer.effectAllowed = "move";
        // Firefox 相容性需要 setData
        e.dataTransfer.setData("text/html", e.target.parentNode);
      };

      const handleDragEnter = (e, index) => {
        e.preventDefault();
        setDragOverItemIndex(index);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
      };

      const handleDrop = (e, index) => {
        e.preventDefault();
        if (draggedItemIndex === null || draggedItemIndex === index) return;

        const newSteps = [...stepsData];
        const draggedItem = newSteps[draggedItemIndex];
        // 移除被拖曳的項目
        newSteps.splice(draggedItemIndex, 1);
        // 插入到目標位置
        newSteps.splice(index, 0, draggedItem);

        setStepsData(newSteps);
        setDraggedItemIndex(null);
        setDragOverItemIndex(null);
      };

      const handleDragEnd = () => {
        setDraggedItemIndex(null);
        setDragOverItemIndex(null);
      };

      // --- 刪除模板 ---
      const handleDeleteTemplate = (index) => {
        if (window.confirm('確定要刪除此模板嗎？')) {
          const newTemplates = [...templates];
          newTemplates.splice(index, 1);
          setTemplates(newTemplates);
        }
      };

      // --- 更新簽署方式 ---
      const updateSignMethod = (index, method) => {
        const newSteps = [...stepsData];
        newSteps[index].signMethod = method;
        setStepsData(newSteps);
      };

      // --- 更新允許加簽 ---
      const toggleAllowAddSigner = (index) => {
        const newSteps = [...stepsData];
        newSteps[index].allowAddSigner = !newSteps[index].allowAddSigner;
        setStepsData(newSteps);
      };

      // --- 審批人設定操作 ---
      const addApprover = (stepIndex) => {
        const newSteps = [...stepsData];
        newSteps[stepIndex].approvers.push('');
        setStepsData(newSteps);
      };

      const removeApprover = (stepIndex, approverIndex) => {
        const newSteps = [...stepsData];
        newSteps[stepIndex].approvers.splice(approverIndex, 1);
        setStepsData(newSteps);
      };

      const updateApprover = (stepIndex, approverIndex, value) => {
        const newSteps = [...stepsData];
        newSteps[stepIndex].approvers[approverIndex] = value;
        setStepsData(newSteps);
      };

      return (
        <div className="min-h-screen bg-[#F5F6F8] font-sans text-gray-800 flex flex-col p-6">
          
          {/* 大標題 */}
          <div className="mb-6">
            <h1 className="ui-page-title">審批流設定</h1>
          </div>

          {/* 白色主卡片 */}
          <main className="ui-card overflow-hidden w-full max-w-[1400px]">
            
            {/* 頁籤區塊 */}
            <div className="flex items-center border-b border-gray-200 px-6 pt-4 gap-8">
              {tabs.map(tab => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`pb-3 text-sm font-medium transition-colors relative ${
                    activeTab === tab ? 'text-[#4A90E2]' : 'text-gray-500 hover:text-gray-800'
                  }`}
                >
                  {tab}
                  {activeTab === tab && (
                    <div className="absolute bottom-0 left-0 w-full h-[3px] bg-[#4A90E2] rounded-t-sm"></div>
                  )}
                </button>
              ))}
            </div>

            {/* 內容區塊 */}
            <div className="p-6 space-y-5">
              
              {activeTab === '審批模板' && (
                <>
                  {/* 頂部工具列 */}
                  <div className="flex items-center gap-3">
                    {/* 篩選下拉選單 */}
                    <div className="w-48">
                      <select className="ui-select">
                        <option value="" disabled selected hidden>表單類型篩選</option>
                        <option value="AA">資產調撥申請 (AA)</option>
                        <option value="AM">資產維修申請 (AM)</option>
                        <option value="AR">資產減少申請 (AR)</option>
                        <option value="ASSETS">新增資產申請 (ASSETS)</option>
                        <option value="PTA">差旅申請單 (PTA)</option>
                        <option value="PU">請購申請 (PU)</option>
                        <option value="SA">其他申請 (SA)</option>
                        <option value="B_FEE">一般費用 (B)</option>
                        <option value="C_FEE">費用報銷單 (C)</option>
                        <option value="B_HR">人力成本及猎头费 (B)</option>
                        <option value="C_HR">人力成本及猎头费 (C)</option>
                        <option value="B_COMM">佣金返点 (B)</option>
                        <option value="C_COMM">佣金返点 (C)</option>
                        <option value="B_BAD">其他壞帳審批 (B)</option>
                        <option value="C_BAD">其他壞帳審批 (C)</option>
                        <option value="B_REG">區域備用金（仅限资金部使用） (B)</option>
                        <option value="C_REG">區域備用金（仅限资金部使用） (C)</option>
                        <option value="B_WEL">员工福利及團建費 (B)</option>
                        <option value="C_WEL">员工福利及團建費 (C)</option>
                        <option value="B_SUB">子表單B（申請費用） (B)</option>
                        <option value="C_SUB">子表單C（報銷費用） (C)</option>
                        <option value="B_TRIP">差旅報銷線 (B)</option>
                        <option value="C_TRIP">差旅報銷線 (C)</option>
                        <option value="B_AR">應收壞帳 (B)</option>
                        <option value="C_AR">應收壞帳 (C)</option>
                        <option value="B_PRIV">私帳 (B)</option>
                        <option value="C_PRIV">私帳 (C)</option>
                        <option value="B_PRIV_PROJ">私帳項目審批線 (B)</option>
                        <option value="C_PRIV_PROJ">私帳項目審批線 (C)</option>
                        <option value="B_PERF">績效審批線 (B)</option>
                        <option value="C_PERF">績效審批線 (C)</option>
                        <option value="BU">商務公告(BU)</option>
                        <option value="IC">內部合同審批單 (IC)</option>
                        <option value="PMO">PMO項目立項申請 (PMO)</option>
                        <option value="PMOA">PMO項目變更 (PMOA)</option>
                        <option value="PMOS">PMO項目終止 (PMOS)</option>
                        <option value="HR_CHANGE">員工一般人事異動</option>
                        <option value="HR_HIRE">錄用審批單</option>
                        <option value="HR_REQ">招聘需求單</option>
                        <option value="HR_SALARY">薪資、職級異動單</option>
                      </select>
                    </div>

                    {/* 新增按鈕 */}
                    <button
                      onClick={() => setIsAddModalOpen(true)}
                      className="ui-btn ui-btn-primary"
                    >
                      <Plus size={15} strokeWidth={2.5} /> 新增模板
                    </button>
                  </div>

                  {/* 資料表格 */}
                  <div className="border border-gray-200 rounded overflow-x-auto custom-scrollbar">
                    <table className="ui-table text-left whitespace-nowrap min-w-[1000px]">
                      <thead>
                        <tr>
                          <th className="w-[35%]">模板名稱</th>
                          <th className="w-[25%]">表單類型</th>
                          <th className="text-center w-[10%]">優先序</th>
                          <th className="text-center w-[10%]">步驟數</th>
                          <th className="text-center w-[10%]">狀態</th>
                          <th className="text-center w-[15%]">操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        {templates.map((row, idx) => (
                          <tr key={idx}>
                            <td>{row.name}</td>
                            <td>{row.type}</td>
                            <td className="text-center">{row.priority}</td>
                            <td className="text-center">{row.steps}</td>
                            <td className="text-center">
                              <span className="ui-badge ui-badge-success">
                                {row.status}
                              </span>
                            </td>
                            <td className="text-center">
                              <div className="flex items-center justify-center gap-2">
                                <button onClick={() => openEditModal(row)} className="ui-btn ui-btn-secondary ui-btn-sm">編輯</button>
                                <button onClick={() => openStepModal(row)} className="ui-btn ui-btn-secondary ui-btn-sm">步驟設定</button>
                                <button onClick={() => handleDeleteTemplate(idx)} className="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50">刪除</button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}

              {activeTab === '審批角色' && (
                <div className="border border-gray-200 rounded overflow-x-auto custom-scrollbar">
                  <table className="ui-table text-left whitespace-nowrap min-w-[1000px]">
                    <thead>
                      <tr>
                        <th className="w-[20%]">角色代碼</th>
                        <th className="w-[15%]">角色名稱</th>
                        <th className="w-[15%]">解析方式</th>
                        <th className="w-[50%]">說明</th>
                      </tr>
                    </thead>
                    <tbody>
                      {roleData.map((row, idx) => (
                        <tr key={idx}>
                          <td className="text-gray-600 font-medium">{row.code}</td>
                          <td>{row.name}</td>
                          <td>
                            {row.parseType === '組織動態解析' ? (
                              <span className="ui-badge ui-badge-success">
                                {row.parseType}
                              </span>
                            ) : (
                              <span className="ui-badge ui-badge-info">
                                {row.parseType}
                              </span>
                            )}
                          </td>
                          <td className="whitespace-normal leading-relaxed text-gray-600">{row.description}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

            </div>
          </main>

          {/* 新增審批模板彈窗 */}
          {isAddModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4" onClick={() => setIsAddModalOpen(false)}>
              <div
                className="bg-white rounded-lg shadow-xl w-full max-w-[550px] flex flex-col overflow-hidden text-left"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8 pb-6 space-y-6">
                  {/* Header */}
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="text-[20px] font-medium text-gray-800">新增審批模板</h2>
                    <button onClick={() => setIsAddModalOpen(false)} className="text-gray-400 hover:text-gray-600 transition-colors">
                      <X size={20} />
                    </button>
                  </div>

                  {/* Body / Form Fields */}
                  <div className="space-y-4">
                    {/* 模板名稱 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0"><span className="text-red-500 mr-1">*</span>模板名稱</div>
                      <input type="text" className="ui-input flex-1" />
                    </div>

                    {/* 表單類型 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0"><span className="text-red-500 mr-1">*</span>表單類型</div>
                      <div className="flex-1">
                        <select
                          value={selectedFormType}
                          onChange={(e) => setSelectedFormType(e.target.value)}
                          className={`ui-select ${selectedFormType === '' ? 'text-gray-400' : 'text-gray-800'}`}
                        >
                          <option value="" disabled hidden>請選擇</option>
                          <option value="AA">資產調撥申請 (AA)</option>
                          <option value="AM">資產維修申請 (AM)</option>
                          <option value="AR">資產減少申請 (AR)</option>
                          <option value="ASSETS">新增資產申請 (ASSETS)</option>
                          <option value="PTA">差旅申請單 (PTA)</option>
                          <option value="PU">請購申請 (PU)</option>
                          <option value="SA">其他申請 (SA)</option>
                          <option value="B_FEE">一般費用 (B)</option>
                          <option value="C_FEE">費用報銷單 (C)</option>
                          <option value="B_HR">人力成本及猎头费 (B)</option>
                          <option value="C_HR">人力成本及猎头费 (C)</option>
                          <option value="B_COMM">佣金返点 (B)</option>
                          <option value="C_COMM">佣金返点 (C)</option>
                          <option value="B_BAD">其他壞帳審批 (B)</option>
                          <option value="C_BAD">其他壞帳審批 (C)</option>
                          <option value="B_REG">區域備用金（仅限资金部使用） (B)</option>
                          <option value="C_REG">區域備用金（仅限资金部使用） (C)</option>
                          <option value="B_WEL">员工福利及團建費 (B)</option>
                          <option value="C_WEL">员工福利及團建費 (C)</option>
                          <option value="B_SUB">子表單B（申請費用） (B)</option>
                          <option value="C_SUB">子表單C（報銷費用） (C)</option>
                          <option value="B_TRIP">差旅報銷線 (B)</option>
                          <option value="C_TRIP">差旅報銷線 (C)</option>
                          <option value="B_AR">應收壞帳 (B)</option>
                          <option value="C_AR">應收壞帳 (C)</option>
                          <option value="B_PRIV">私帳 (B)</option>
                          <option value="C_PRIV">私帳 (C)</option>
                          <option value="B_PRIV_PROJ">私帳項目審批線 (B)</option>
                          <option value="C_PRIV_PROJ">私帳項目審批線 (C)</option>
                          <option value="B_PERF">績效審批線 (B)</option>
                          <option value="C_PERF">績效審批線 (C)</option>
                          <option value="BU">商務公告(BU)</option>
                          <option value="IC">內部合同審批單 (IC)</option>
                          <option value="PMO">PMO項目立項申請 (PMO)</option>
                          <option value="PMOA">PMO項目變更 (PMOA)</option>
                          <option value="PMOS">PMO項目終止 (PMOS)</option>
                          <option value="HR_CHANGE">員工一般人事異動</option>
                          <option value="HR_HIRE">錄用審批單</option>
                          <option value="HR_REQ">招聘需求單</option>
                          <option value="HR_SALARY">薪資、職級異動單</option>
                        </select>
                      </div>
                    </div>

                    {/* 優先序 */}
                    <div className="flex items-start gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0 mt-2">優先序</div>
                      <div className="flex-1 flex flex-col gap-1.5">
                        <div className="flex items-center border border-gray-300 rounded overflow-hidden">
                          <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                          <input type="text" value="100" className="flex-1 text-center text-[14px] outline-none text-gray-700" readOnly />
                          <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                        </div>
                        <span className="text-[13px] text-gray-500">數字越小越優先</span>
                      </div>
                    </div>

                    {/* 金額下限 */}
                    <div className="flex items-center gap-4 pt-1">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">金額下限</div>
                      <div className="flex-1 flex items-center border border-gray-300 rounded overflow-hidden">
                        <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                        <input type="text" placeholder="不限" className="flex-1 text-center text-[14px] outline-none text-gray-400" readOnly />
                        <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                      </div>
                    </div>

                    {/* 金額上限 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">金額上限</div>
                      <div className="flex-1 flex items-center border border-gray-300 rounded overflow-hidden">
                        <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                        <input type="text" placeholder="不限" className="flex-1 text-center text-[14px] outline-none text-gray-400" readOnly />
                        <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                      </div>
                    </div>

                    {/* 狀態 */}
                    <div className="flex items-center gap-4 pt-2">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">狀態</div>
                      <div className="flex items-center pl-1">
                        <button 
                          onClick={() => setIsTemplateEnabled(!isTemplateEnabled)}
                          className={`relative inline-flex h-6 w-[42px] items-center rounded-full transition-colors focus:outline-none ${isTemplateEnabled ? 'bg-[#4A90E2]' : 'bg-gray-300'}`}
                        >
                          <span className={`inline-block h-[18px] w-[18px] transform rounded-full bg-white transition-transform ${isTemplateEnabled ? 'translate-x-[21px]' : 'translate-x-0.5'}`} />
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Footer */}
                  <div className="flex justify-end gap-3 pt-6 mt-2">
                    <button onClick={() => setIsAddModalOpen(false)} className="ui-btn ui-btn-secondary">取消</button>
                    <button className="ui-btn ui-btn-primary">確定</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 編輯審批模板彈窗 */}
          {editingTemplate && (
            <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4" onClick={() => setEditingTemplate(null)}>
              <div
                className="bg-white rounded-lg shadow-xl w-full max-w-[550px] flex flex-col overflow-hidden text-left"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8 pb-6 space-y-6">
                  {/* Header */}
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="text-[20px] font-medium text-gray-800">編輯審批模板</h2>
                    <button onClick={() => setEditingTemplate(null)} className="text-gray-400 hover:text-gray-600 transition-colors">
                      <X size={20} />
                    </button>
                  </div>

                  {/* Body / Form Fields */}
                  <div className="space-y-4">
                    {/* 模板名稱 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0"><span className="text-red-500 mr-1">*</span>模板名稱</div>
                      <input type="text" defaultValue={editingTemplate.name} className="ui-input flex-1" />
                    </div>

                    {/* 表單類型 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0"><span className="text-red-500 mr-1">*</span>表單類型</div>
                      <div className="flex-1">
                        <select
                          value={editSelectedFormType}
                          onChange={(e) => setEditSelectedFormType(e.target.value)}
                          className={`ui-select ${editSelectedFormType === '' ? 'text-gray-400' : 'text-gray-800'}`}
                        >
                          <option value="" disabled hidden>{editingTemplate.type}</option>
                          <option value="AA">資產調撥申請 (AA)</option>
                          <option value="AM">資產維修申請 (AM)</option>
                          <option value="AR">資產減少申請 (AR)</option>
                          <option value="ASSETS">新增資產申請 (ASSETS)</option>
                          <option value="PTA">差旅申請單 (PTA)</option>
                          <option value="PU">請購申請 (PU)</option>
                          <option value="SA">其他申請 (SA)</option>
                          <option value="B_FEE">一般費用 (B)</option>
                          <option value="C_FEE">費用報銷單 (C)</option>
                          <option value="B_HR">人力成本及猎头费 (B)</option>
                          <option value="C_HR">人力成本及猎头费 (C)</option>
                          <option value="B_COMM">佣金返点 (B)</option>
                          <option value="C_COMM">佣金返点 (C)</option>
                          <option value="B_BAD">其他壞帳審批 (B)</option>
                          <option value="C_BAD">其他壞帳審批 (C)</option>
                          <option value="B_REG">區域備用金（仅限资金部使用） (B)</option>
                          <option value="C_REG">區域備用金（仅限资金部使用） (C)</option>
                          <option value="B_WEL">员工福利及團建費 (B)</option>
                          <option value="C_WEL">员工福利及團建費 (C)</option>
                          <option value="B_SUB">子表單B（申請費用） (B)</option>
                          <option value="C_SUB">子表單C（報銷費用） (C)</option>
                          <option value="B_TRIP">差旅報銷線 (B)</option>
                          <option value="C_TRIP">差旅報銷線 (C)</option>
                          <option value="B_AR">應收壞帳 (B)</option>
                          <option value="C_AR">應收壞帳 (C)</option>
                          <option value="B_PRIV">私帳 (B)</option>
                          <option value="C_PRIV">私帳 (C)</option>
                          <option value="B_PRIV_PROJ">私帳項目審批線 (B)</option>
                          <option value="C_PRIV_PROJ">私帳項目審批線 (C)</option>
                          <option value="B_PERF">績效審批線 (B)</option>
                          <option value="C_PERF">績效審批線 (C)</option>
                          <option value="BU">商務公告(BU)</option>
                          <option value="IC">內部合同審批單 (IC)</option>
                          <option value="PMO">PMO項目立項申請 (PMO)</option>
                          <option value="PMOA">PMO項目變更 (PMOA)</option>
                          <option value="PMOS">PMO項目終止 (PMOS)</option>
                          <option value="HR_CHANGE">員工一般人事異動</option>
                          <option value="HR_HIRE">錄用審批單</option>
                          <option value="HR_REQ">招聘需求單</option>
                          <option value="HR_SALARY">薪資、職級異動單</option>
                        </select>
                      </div>
                    </div>

                    {/* 優先序 */}
                    <div className="flex items-start gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0 mt-2">優先序</div>
                      <div className="flex-1 flex flex-col gap-1.5">
                        <div className="flex items-center border border-gray-300 rounded overflow-hidden">
                          <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                          <input type="text" defaultValue={editingTemplate.priority} className="flex-1 text-center text-[14px] outline-none text-gray-700" readOnly />
                          <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                        </div>
                        <span className="text-[13px] text-gray-500">數字越小越優先</span>
                      </div>
                    </div>

                    {/* 金額下限 */}
                    <div className="flex items-center gap-4 pt-1">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">金額下限</div>
                      <div className="flex-1 flex items-center border border-gray-300 rounded overflow-hidden">
                        <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                        <input type="text" placeholder="不限" className="flex-1 text-center text-[14px] outline-none text-gray-400" readOnly />
                        <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                      </div>
                    </div>

                    {/* 金額上限 */}
                    <div className="flex items-center gap-4">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">金額上限</div>
                      <div className="flex-1 flex items-center border border-gray-300 rounded overflow-hidden">
                        <button className="px-4 py-2 border-r border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><span className="text-lg leading-none">−</span></button>
                        <input type="text" placeholder="不限" className="flex-1 text-center text-[14px] outline-none text-gray-400" readOnly />
                        <button className="px-4 py-2 border-l border-gray-300 text-gray-500 hover:bg-gray-50 transition-colors"><Plus size={16} /></button>
                      </div>
                    </div>

                    {/* 狀態 */}
                    <div className="flex items-center gap-4 pt-2">
                      <div className="w-[70px] text-right text-[14px] text-gray-700 shrink-0">狀態</div>
                      <div className="flex items-center pl-1">
                        <button 
                          onClick={() => setIsEditTemplateEnabled(!isEditTemplateEnabled)}
                          className={`relative inline-flex h-6 w-[42px] items-center rounded-full transition-colors focus:outline-none ${isEditTemplateEnabled ? 'bg-[#4A90E2]' : 'bg-gray-300'}`}
                        >
                          <span className={`inline-block h-[18px] w-[18px] transform rounded-full bg-white transition-transform ${isEditTemplateEnabled ? 'translate-x-[21px]' : 'translate-x-0.5'}`} />
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Footer */}
                  <div className="flex justify-end gap-3 pt-6 mt-2">
                    <button onClick={() => setEditingTemplate(null)} className="ui-btn ui-btn-secondary">取消</button>
                    <button className="ui-btn ui-btn-primary">確定</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 步驟設定彈窗 */}
          {isStepModalOpen && currentStepTemplate && (
            <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4" onClick={() => setIsStepModalOpen(false)}>
              <div
                className="bg-white rounded-lg shadow-xl w-full max-w-[850px] max-h-[90vh] flex flex-col overflow-hidden text-left"
                onClick={e => e.stopPropagation()}
              >
                {/* Header */}
                <div className="px-6 py-4 flex items-center justify-between bg-white shrink-0">
                  <h2 className="text-[20px] font-medium text-gray-800">步驟設定 — {currentStepTemplate.name}</h2>
                  <button onClick={() => setIsStepModalOpen(false)} className="text-gray-400 hover:text-gray-600 transition-colors">
                    <X size={22} />
                  </button>
                </div>

                {/* Body */}
                <div className="p-6 pt-5 bg-[#F5F6F8] flex-1 overflow-y-auto">
                  
                  {/* Top Action Bar */}
                  <div className="flex items-center gap-4 mb-4">
                    <button className="ui-btn ui-btn-primary">
                      <Plus size={15} strokeWidth={2.5} /> 新增步驟
                    </button>
                    <span className="text-gray-600 text-[14px]">共 {stepsData.length} 個步驟</span>
                  </div>

                  {/* Steps List */}
                  <div className="space-y-4">
                    {stepsData.map((step, index) => (
                      <div 
                        key={step.id} 
                        draggable
                        onDragStart={(e) => handleDragStart(e, index)}
                        onDragEnter={(e) => handleDragEnter(e, index)}
                        onDragOver={handleDragOver}
                        onDrop={(e) => handleDrop(e, index)}
                        onDragEnd={handleDragEnd}
                        className={`bg-white border rounded-lg p-6 flex flex-col relative shadow-sm cursor-grab active:cursor-grabbing transition-all duration-200 ${
                          draggedItemIndex === index ? 'opacity-40 border-dashed border-[#4A90E2] scale-[0.98]' : 
                          dragOverItemIndex === index ? 'border-dashed border-2 border-[#4A90E2] bg-[#F0F7FF]' : 'border-gray-200'
                        }`}
                      >
                        
                        {/* Upper Section */}
                        <div className="flex flex-col gap-5">
                          {/* Row 1: Step Title & Actions */}
                          <div className="flex items-center gap-4">
                            <span className="text-[#3949AB] font-bold text-[15px] shrink-0 w-[80px] text-left">步驟 {index + 1}</span>
                            <input
                              type="text"
                              defaultValue={step.name}
                              className="ui-input flex-1 cursor-text"
                              onClick={(e) => e.stopPropagation()}
                              onMouseDown={(e) => e.stopPropagation()}
                            />
                            <div className="flex items-center shrink-0 pl-2">
                              <button className="text-[#E53935] hover:text-red-700 text-[14px] font-bold transition-colors">刪除</button>
                            </div>
                          </div>

                          {/* Row 2: Sign Method */}
                          <div className="flex items-center gap-4">
                            <span className="text-gray-800 font-bold text-[14px] shrink-0 w-[80px] text-left">簽署方式</span>
                            <div className="flex border border-gray-200 rounded overflow-hidden text-[13px] shadow-sm">
                              {['串簽', '並簽', '會簽', '抄送'].map((method, mIdx) => (
                                <button
                                  key={method}
                                  onClick={() => updateSignMethod(index, method)}
                                  className={`px-5 py-1.5 font-medium transition-colors ${
                                    step.signMethod === method
                                      ? 'bg-[#4A90E2] text-white'
                                      : 'bg-white text-gray-700 hover:bg-gray-50'
                                  } ${mIdx > 0 ? 'border-l border-gray-200' : ''}`}
                                >
                                  {method}
                                </button>
                              ))}
                            </div>
                            <div className="flex items-center gap-3 ml-6">
                              <span className="text-gray-700 text-[14px]">允許加簽</span>
                              <button 
                                onClick={() => toggleAllowAddSigner(index)}
                                className={`relative inline-flex h-5 w-[38px] items-center rounded-full transition-colors focus:outline-none ${step.allowAddSigner ? 'bg-[#4A90E2]' : 'bg-gray-300'}`}
                              >
                                <span className={`inline-block h-[14px] w-[14px] transform rounded-full bg-white transition-transform ${step.allowAddSigner ? 'translate-x-[21px]' : 'translate-x-[3px]'}`} />
                              </button>
                            </div>
                          </div>
                        </div>

                        {/* Divider */}
                        <hr className="border-gray-100 my-5" />

                        {/* Lower Section: Approvers Setting */}
                        <div className="flex flex-col gap-4">
                          <div className="flex items-center justify-between">
                            <span className="text-[14px] font-bold text-gray-800 shrink-0 w-[80px] text-left">審批人設定</span>
                            <button 
                              onClick={() => addApprover(index)}
                              className="text-[#4A90E2] hover:text-blue-700 text-[14px] font-medium flex items-center gap-1 transition-colors"
                            >
                              <Plus size={15} strokeWidth={2} /> 新增審批人
                            </button>
                          </div>
                          
                          <div className="flex flex-col gap-3">
                            {step.approvers.map((approver, aIdx) => (
                              <div key={aIdx} className="flex items-center gap-4 border border-gray-200 rounded-md p-2.5 bg-white shadow-sm">
                                <span className="text-gray-400 text-[14px] w-8 text-center shrink-0">{aIdx + 1}</span>
                                <div className="w-full max-w-[300px]">
                                  <select
                                    value={approver}
                                    onChange={(e) => updateApprover(index, aIdx, e.target.value)}
                                    className="ui-select"
                                  >
                                    <option value="" disabled hidden>請選擇</option>
                                    {roleData.map(r => (
                                      <option key={r.code} value={r.name}>{r.name}</option>
                                    ))}
                                  </select>
                                </div>
                                <button 
                                  onClick={() => removeApprover(index, aIdx)}
                                  className="text-[#D93025] hover:text-red-700 text-[14px] font-bold transition-colors ml-auto pr-4"
                                >
                                  移除
                                </button>
                              </div>
                            ))}
                          </div>
                        </div>

                      </div>
                    ))}
                  </div>

                </div>

                {/* Footer */}
                <div className="px-6 py-4 border-t border-gray-200 flex justify-end gap-3 bg-white shrink-0">
                  <button onClick={() => setIsStepModalOpen(false)} className="ui-btn ui-btn-secondary">取消</button>
                  <button onClick={() => setIsStepModalOpen(false)} className="ui-btn ui-btn-primary">儲存步驟</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
