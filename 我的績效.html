<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的績效</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 用於圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 設定 Tailwind 自訂主題，參考附圖的風格 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2', // 參考附圖左側標題的紫色
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB', // 背景淺灰色
                        card: '#FFFFFF',
                        text: {
                            main: '#1F2937',
                            muted: '#6B7280',
                            light: '#9CA3AF'
                        },
                        status: {
                            draft: '#F3F4F6',
                            pending: '#FEF3C7',
                            completed: '#D1FAE5',
                            text: {
                                draft: '#4B5563',
                                pending: '#D97706',
                                completed: '#059669'
                            }
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            font-family: theme('fontFamily.sans');
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <div class="flex items-center gap-3">
                <h1 class="ui-page-title">我的績效</h1>
            </div>
            
            <!-- 操作按鈕區 -->
            <div class="flex gap-4">
                <button class="ui-btn ui-btn-secondary">
                    <i class="fa-solid fa-file-import text-gray-500"></i>
                    選擇表格模板
                </button>
                <button class="ui-btn ui-btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    創建一般績效表
                </button>
            </div>
        </header>

        <!-- 績效列表區塊 (卡片樣式) -->
        <section class="ui-card p-6">

            <!-- 列表工具列 (搜尋、篩選) -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-lg font-semibold text-gray-800">績效紀錄</h2>
                <div class="flex gap-3 w-full sm:w-auto">
                    <div class="ui-search w-full sm:w-64">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="搜尋年份、類型..." class="ui-input ui-search-input">
                    </div>
                    <button class="ui-btn ui-btn-secondary">
                        <i class="fa-solid fa-filter"></i>
                    </button>
                </div>
            </div>

            <!-- 表格容器 -->
            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table text-left whitespace-nowrap">
                    <thead>
                        <tr>
                            <th scope="col">年份</th>
                            <th scope="col">類型</th>
                            <th scope="col">期間</th>
                            <th scope="col" class="text-center">員工評分</th>
                            <th scope="col" class="text-center">主管評分</th>
                            <th scope="col" class="text-center">星級</th>
                            <th scope="col" class="text-center">狀態</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 假資料列 1 -->
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="font-medium text-gray-900">2026</td>
                            <td>
                                <span class="px-2.5 py-1 rounded-md bg-blue-50 text-blue-600 text-xs font-medium">年度考核</span>
                            </td>
                            <td class="text-gray-600">2026/01/01 - 2026/12/31</td>
                            <td class="text-center text-gray-900">-</td>
                            <td class="text-center text-gray-900">-</td>
                            <td class="text-center">-</td>
                            <td class="text-center">
                                <span class="ui-badge ui-badge-gray">
                                    草稿
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen"></i> 編輯</button>
                            </td>
                        </tr>

                        <!-- 假資料列 2 -->
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="font-medium text-gray-900">2025</td>
                            <td>
                                <span class="px-2.5 py-1 rounded-md bg-purple-50 text-purple-600 text-xs font-medium">試用期考核</span>
                            </td>
                            <td class="text-gray-600">2025/10/01 - 2025/12/31</td>
                            <td class="text-center text-gray-900">88</td>
                            <td class="text-center text-gray-900">-</td>
                            <td class="text-center">-</td>
                            <td class="text-center">
                                <span class="ui-badge ui-badge-warning">
                                    主管審核中
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-eye"></i> 檢視</button>
                            </td>
                        </tr>

                        <!-- 假資料列 3 -->
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="font-medium text-gray-900">2025</td>
                            <td>
                                <span class="px-2.5 py-1 rounded-md bg-blue-50 text-blue-600 text-xs font-medium">半年度考核</span>
                            </td>
                            <td class="text-gray-600">2025/01/01 - 2025/06/30</td>
                            <td class="text-center text-gray-900">92</td>
                            <td class="text-center font-medium text-gray-900">95</td>
                            <td class="text-center">
                                <div class="flex justify-center text-yellow-400 text-xs">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star-half-stroke"></i>
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="ui-badge ui-badge-success">
                                    已完成
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-eye"></i> 檢視</button>
                            </td>
                        </tr>
                         <!-- 假資料列 4 -->
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="font-medium text-gray-900">2024</td>
                            <td>
                                <span class="px-2.5 py-1 rounded-md bg-blue-50 text-blue-600 text-xs font-medium">年度考核</span>
                            </td>
                            <td class="text-gray-600">2024/01/01 - 2024/12/31</td>
                            <td class="text-center text-gray-900">85</td>
                            <td class="text-center font-medium text-gray-900">88</td>
                            <td class="text-center">
                                <div class="flex justify-center text-yellow-400 text-xs">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="ui-badge ui-badge-success">
                                    已完成
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-eye"></i> 檢視</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分頁區塊 -->
            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span class="text-sm text-gray-500">顯示第 1 到 4 筆，共 4 筆資料</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn" disabled>上一頁</button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn" disabled>下一頁</button>
                </div>
            </div>

        </section>
        
        <!-- 快速資訊小工具區 (可選，增加頁面豐富度，類似附圖上方的數字卡片概念) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
            <div class="ui-card p-5 flex items-center gap-4">
                <div class="w-12 h-12 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 text-xl">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">平均主管評分</p>
                    <p class="text-2xl font-bold text-gray-800">91.5</p>
                </div>
            </div>
            <div class="ui-card p-5 flex items-center gap-4">
                <div class="w-12 h-12 rounded-lg bg-green-50 flex items-center justify-center text-green-600 text-xl">
                    <i class="fa-solid fa-check-circle"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">已完成考核</p>
                    <p class="text-2xl font-bold text-gray-800">2 <span class="text-sm font-normal text-gray-400">次</span></p>
                </div>
            </div>
            <div class="ui-card p-5 flex items-center gap-4">
                <div class="w-12 h-12 rounded-lg bg-yellow-50 flex items-center justify-center text-yellow-600 text-xl">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">待處理項目</p>
                    <p class="text-2xl font-bold text-gray-800">1 <span class="text-sm font-normal text-gray-400">件</span></p>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
