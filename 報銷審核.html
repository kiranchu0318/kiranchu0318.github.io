<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報銷審核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC', background: '#F8F9FB', card: '#FFFFFF',
                    text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' } },
                fontFamily: { sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                boxShadow: { 'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)', 'modal': '0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04)' }
            } }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="mx-auto w-full max-w-[1400px] space-y-6">

        <header class="ui-page-header">
            <h1 class="ui-page-title">報銷審核</h1>
            <button onclick="mockExport()" class="ui-btn ui-btn-secondary"><i class="fa-solid fa-download"></i> 匯出報表</button>
        </header>

        <!-- 篩選台 -->
        <div class="ui-card p-5 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">搜尋（單號/申請人/項目）</label>
                    <div class="ui-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="f-search" oninput="render()" placeholder="輸入關鍵字..." class="ui-input ui-search-input">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">工作狀態</label>
                    <select id="f-work" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="待執行">待執行</option>
                        <option value="執行中">執行中</option>
                        <option value="執行完成">執行完成</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">申請日期區間</label>
                    <div class="flex items-center gap-1.5">
                        <input type="date" id="f-start" onchange="render()" class="ui-input flex-1 min-w-0">
                        <span class="text-gray-400 text-xs shrink-0">至</span>
                        <input type="date" id="f-end" onchange="render()" class="ui-input flex-1 min-w-0">
                    </div>
                </div>
            </div>
            <div class="flex justify-end pt-1">
                <button onclick="resetFilters()" class="text-xs text-primary font-semibold hover:underline flex items-center gap-1.5"><i class="fa-solid fa-arrows-rotate"></i> 重設篩選條件</button>
            </div>
        </div>

        <!-- 列表 -->
        <section class="ui-card p-4 sm:p-6">
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">報銷審核列表</h2>
                <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100 custom-scrollbar">
                <table class="ui-table text-center">
                    <thead>
                        <tr>
                            <th scope="col" class="text-left">單號</th>
                            <th scope="col">申請人</th>
                            <th scope="col">部門</th>
                            <th scope="col" class="text-left">報銷項目</th>
                            <th scope="col" class="text-right">金額</th>
                            <th scope="col">申請日期</th>
                            <th scope="col">工作狀態</th>
                            <th scope="col">工作流進度</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

            <div id="no-data" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-receipt text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的報銷簽核單</p>
                <button onclick="resetFilters()" class="text-xs text-primary font-semibold hover:underline">清除篩選條件</button>
            </div>

            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>
    </div>

    <!-- 詳情彈窗 -->
    <div id="detail-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-2xl flex flex-col max-h-[88vh] overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0">
                <h3 id="d-title" class="text-base font-bold text-gray-900">費用報銷單</h3>
                <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 overflow-y-auto custom-scrollbar space-y-6">
                <div>
                    <h4 class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2 mb-3">表單資訊</h4>
                    <div id="d-info" class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3 text-sm"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2 mb-3">審批進度</h4>
                    <div id="d-approvals" class="space-y-2"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2 mb-3 flex items-center gap-2">工作流進度 <span class="text-[11px] font-normal text-text-light">（審批通過後執行）</span></h4>
                    <div id="d-workflow" class="space-y-2"></div>
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100 shrink-0">
                <button onclick="closeDetail()" class="ui-btn ui-btn-secondary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        // 費用報銷（含工作流）簽核單。實務上由「簽核」建立後同步至此；此為原型示意資料。
        const docs = [
            { docNo: 'C-20260605-002', applicant: '101372', dept: 'RD', title: '一般費用報銷（差旅交通）', amount: 'TWD 2,000', date: '2026-06-05', signStatus: '待簽核',
              approvals: [{ role: '部門主管', status: '待審批' }, { role: '財務人員', status: '待審批' }],
              workflow: [{ task: '發票／單據查核', owner: '財務人員', status: '待處理' }, { task: '付款排程', owner: '財務人員', status: '待處理' }, { task: '撥款', owner: '出納', status: '待處理' }] },
            { docNo: 'C-20260603-019', applicant: 'KKKKK', dept: '財務', title: '客戶招待費報銷', amount: 'TWD 8,600', date: '2026-06-03', signStatus: '簽核中',
              approvals: [{ role: '部門主管', status: '已核准' }, { role: '財務主管', status: '審批中' }],
              workflow: [{ task: '發票／單據查核', owner: '財務人員', status: '處理中' }, { task: '付款排程', owner: '財務人員', status: '待處理' }, { task: '撥款', owner: '出納', status: '待處理' }] },
            { docNo: 'C-20260530-011', applicant: 'Bertha W', dept: 'MKT', title: '行銷活動雜支報銷', amount: 'TWD 15,400', date: '2026-05-30', signStatus: '簽核完成',
              approvals: [{ role: '部門主管', status: '已核准' }, { role: '財務主管', status: '已核准' }],
              workflow: [{ task: '發票／單據查核', owner: '財務人員', status: '已完成' }, { task: '付款排程', owner: '財務人員', status: '已完成' }, { task: '撥款', owner: '出納', status: '處理中' }] },
            { docNo: 'C-20260527-006', applicant: 'Derrick', dept: 'IA1', title: '證照考試費用報銷', amount: 'TWD 4,500', date: '2026-05-27', signStatus: '簽核完成',
              approvals: [{ role: '部門主管', status: '已核准' }, { role: '財務人員', status: '已核准' }],
              workflow: [{ task: '發票／單據查核', owner: '財務人員', status: '已完成' }, { task: '付款排程', owner: '財務人員', status: '已完成' }, { task: '撥款', owner: '出納', status: '已完成' }] },
            { docNo: 'C-20260521-018', applicant: 'Liz G', dept: 'RD', title: '超額餐費報銷（已駁回）', amount: 'TWD 3,200', date: '2026-05-21', signStatus: '駁回',
              approvals: [{ role: '部門主管', status: '駁回' }],
              workflow: [{ task: '發票／單據查核', owner: '財務人員', status: '待處理' }] }
        ];

        function signBadge(s) {
            const map = { '待簽核': 'ui-badge-info', '簽核中': 'ui-badge-warning', '簽核完成': 'ui-badge-success', '駁回': 'ui-badge-danger' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'} mx-auto">${s}</span>`;
        }
        function stepBadge(s) {
            const map = { '待處理': 'ui-badge-gray', '待審批': 'ui-badge-gray', '處理中': 'ui-badge-warning', '審批中': 'ui-badge-warning', '已完成': 'ui-badge-success', '已核准': 'ui-badge-success', '駁回': 'ui-badge-danger' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'}">${s}</span>`;
        }
        // 工作狀態：全完成→執行完成；有進行/完成→執行中；否則待執行
        function workStatus(d) {
            const st = d.workflow.map(w => w.status);
            if (st.length && st.every(s => s === '已完成')) return '執行完成';
            if (st.some(s => s === '處理中' || s === '已完成')) return '執行中';
            return '待執行';
        }
        function workBadge(s) {
            const map = { '待執行': 'ui-badge-gray', '執行中': 'ui-badge-warning', '執行完成': 'ui-badge-success' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'} mx-auto">${s}</span>`;
        }
        function flowProgressHtml(d) {
            const done = d.workflow.filter(w => w.status === '已完成').length;
            const total = d.workflow.length;
            const status = workStatus(d);
            const color = status === '執行完成' ? 'bg-emerald-500' : status === '執行中' ? 'bg-amber-500' : 'bg-gray-300';
            const pct = total ? Math.round(done / total * 100) : 0;
            return `<div class="flex items-center gap-2 justify-center">
                        <div class="w-20 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full ${color}" style="width:${pct}%"></div></div>
                        <span class="text-xs text-gray-600 whitespace-nowrap">${done}/${total}</span>
                    </div>`;
        }

        function render() {
            const kw = document.getElementById('f-search').value.trim().toLowerCase();
            const work = document.getElementById('f-work').value;
            const start = document.getElementById('f-start').value;
            const end = document.getElementById('f-end').value;

            const rows = docs.map((d, i) => ({ d, i })).filter(({ d }) =>
                (!kw || d.docNo.toLowerCase().includes(kw) || d.applicant.toLowerCase().includes(kw) || d.title.toLowerCase().includes(kw)) &&
                (work === 'all' || workStatus(d) === work) &&
                (!start || d.date >= start) && (!end || d.date <= end));

            const tbody = document.getElementById('tbody');
            const noData = document.getElementById('no-data');
            tbody.innerHTML = '';

            if (rows.length === 0) {
                tbody.parentElement.classList.add('hidden');
                noData.classList.remove('hidden');
                document.getElementById('count-badge').innerText = '0 筆資料';
                document.getElementById('pagination-info').innerText = '顯示第 0 到 0 筆，共 0 筆記錄';
                return;
            }
            tbody.parentElement.classList.remove('hidden');
            noData.classList.add('hidden');

            rows.forEach(({ d, i }) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50/70 transition-colors';
                tr.innerHTML = `
                    <td class="text-left font-mono font-semibold text-gray-600">${d.docNo}</td>
                    <td class="text-gray-700">${d.applicant}</td>
                    <td><span class="px-2 py-0.5 bg-gray-100 rounded text-xs font-semibold text-gray-700">${d.dept}</span></td>
                    <td class="text-left text-gray-800">${d.title}</td>
                    <td class="text-right font-mono text-gray-700">${d.amount}</td>
                    <td class="text-gray-600">${d.date}</td>
                    <td>${workBadge(workStatus(d))}</td>
                    <td>${flowProgressHtml(d)}</td>
                    <td>
                        <button onclick="openDetail(${i})" class="ui-btn ui-btn-secondary ui-btn-sm mx-auto"><i class="fa-solid fa-circle-info"></i> 詳情</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('count-badge').innerText = `${rows.length} 筆資料`;
            document.getElementById('pagination-info').innerText = `顯示第 1 到 ${rows.length} 筆，共 ${rows.length} 筆記錄`;
        }

        function resetFilters() {
            document.getElementById('f-search').value = '';
            document.getElementById('f-work').value = 'all';
            document.getElementById('f-start').value = '';
            document.getElementById('f-end').value = '';
            render();
        }

        function openDetail(i) {
            const d = docs[i];
            document.getElementById('d-title').innerText = `費用報銷單 — ${d.docNo}`;
            document.getElementById('d-info').innerHTML = `
                <div><span class="text-text-muted">申請人：</span><span class="font-medium text-gray-800">${d.applicant}</span></div>
                <div><span class="text-text-muted">部門：</span><span class="font-medium text-gray-800">${d.dept}</span></div>
                <div class="sm:col-span-2"><span class="text-text-muted">報銷項目：</span><span class="font-medium text-gray-800">${d.title}</span></div>
                <div><span class="text-text-muted">金額：</span><span class="font-medium text-gray-800 font-mono">${d.amount}</span></div>
                <div><span class="text-text-muted">申請日期：</span><span class="font-medium text-gray-800">${d.date}</span></div>
                <div><span class="text-text-muted">簽核狀態：</span>${signBadge(d.signStatus).replace(' mx-auto', '')}</div>`;

            document.getElementById('d-approvals').innerHTML = d.approvals.map((a, idx) => `
                <div class="flex items-center gap-3 p-2.5 border border-gray-100 rounded-lg">
                    <span class="w-6 h-6 rounded-full bg-blue-50 text-primary text-xs font-bold flex items-center justify-center shrink-0">${idx + 1}</span>
                    <span class="text-sm text-gray-800 flex-1">${a.role}</span>
                    ${stepBadge(a.status)}
                </div>`).join('');

            document.getElementById('d-workflow').innerHTML = d.workflow.map((w, idx) => `
                <div class="flex items-center gap-3 p-2.5 border border-gray-100 rounded-lg bg-[#F0FBFA]/50">
                    <span class="w-6 h-6 rounded-full bg-[#D7F5F2] text-[#0E7C77] text-xs font-bold flex items-center justify-center shrink-0">${idx + 1}</span>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm text-gray-800">${w.task}</div>
                        <div class="text-xs text-text-muted">負責人：${w.owner}</div>
                    </div>
                    ${stepBadge(w.status)}
                </div>`).join('');

            document.getElementById('detail-modal').classList.remove('hidden');
        }
        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

        function mockExport() { showToast('success', '報銷審核報表已開始匯出'); }

        function showToast(type, text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            const icon = document.getElementById('toast-icon');
            if (type === 'success') { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20"; icon.className = "fa-solid fa-circle-check text-emerald-400 text-base"; }
            else { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20"; icon.className = "fa-solid fa-circle-info text-blue-400 text-base"; }
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            clearTimeout(window.__t); window.__t = setTimeout(() => { toast.style.transform = 'translateY(5rem)'; toast.style.opacity = '0'; }, 2400);
        }

        document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
        window.onload = render;
    </script>
</body>
</html>
