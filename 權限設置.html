                    <button onclick="openRoleCreate()" class="ui-btn ui-btn-primary ui-btn-sm">

                            <button onclick="openMembersModal()" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-users"></i> 檢視成員</button>

                                </table>

                        </div>

                            <div class="flex items-center justify-between gap-2 mb-3">

                        <button onclick="resetPerms()" class="ui-btn ui-btn-secondary">還原</button>
                        <button onclick="savePerms()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-check"></i> 儲存權限</button>
                    </div>
                </div>
            </section>
        </div>
        </div>

    <!-- ============ 新增 / 編輯 帳號 彈窗 ============ -->
    <div id="role-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">

                <button onclick="closeRoleModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">帳號角色名稱 <span class="text-rose-500">*</span></label>

            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100">

        // 可提交的申請單（依類別）
        const APPROVAL_FORMS = [
            { key: 'biz',      name: '商務' },
            { key: 'contract', name: '合同' },
            { key: 'finance',  name: '財務' },
            { key: 'admin',    name: '行政' },
            { key: 'pmo',      name: 'PMO' },
            { key: 'hr',       name: 'HR' }
        ];
        const ALL_FORM_KEYS = APPROVAL_FORMS.map(f => f.key);
        const STD_ACTIONS = ['檢視', '編輯'];

        // 依 spec（頁面key→已勾選項目）建立頁面資料權限（未列出的頁面為空陣列）
        function buildData(spec) {
            const d = {};
            DATA_PAGES.forEach(p => d[p.key] = (spec[p.key] || []).slice());
            return d;
        }
        // 全部頁面套用相同的標準動作
        function buildDataAll(actions) {
            const d = {};
            DATA_PAGES.forEach(p => d[p.key] = actions.slice());
            return d;
        }
        // 全部頁面：標準動作 + 各頁特殊操作（完整權限）
        function buildDataFull() {
            const d = {};
            DATA_PAGES.forEach(p => d[p.key] = (p.actions || STD_ACTIONS).concat(p.ops || []).concat(p.specialOps || []));
            return d;
        }
        // 依分類（group→動作）批次建立；未列分類套用 def
        function buildDataByGroup(groupMap, def) {
            const d = {};
            DATA_PAGES.forEach(p => d[p.key] = (groupMap[p.group] || def || []).slice());
            return d;
        }

        // 帳號角色資料庫
        let roles = [
            { name: '系統管理員', desc: '擁有系統所有頁面、操作與功能權限', members: 2,
              perms: { data: buildDataFull(), approve: [] } },
            { name: '人資主管', desc: '人事管理相關頁面具完整權限，其餘頁面僅可檢視', members: 5,
              perms: { data: buildDataByGroup({ '人事管理': STD_ACTIONS }, ['檢視']), approve: [] } },
            { name: '財務主管', desc: '財務管理相關頁面具完整權限，其餘頁面僅可檢視', members: 4,
              perms: { data: buildDataByGroup({ '財務管理': STD_ACTIONS }, ['檢視']), approve: [] } },
            { name: '稽核人員', desc: '可檢視全系統頁面（唯讀，不可編輯）', members: 3,
              perms: { data: buildDataAll(['檢視']), approve: [] } }
        ];

        // 綁定各帳號角色的員工名單（示意）
        const ROLE_MEMBERS = {
            '系統管理員': [
                { empno: '100001', name: 'Tony',         dept: 'RD', region: 'T1-T2' },
                { empno: '50030',  name: 'Ellie Nelson', dept: 'HR', region: 'T1' }
            ],
            '人資主管': [
                { empno: '50024', name: 'Mia Scott',   dept: 'HR', region: 'T1' },
                { empno: '50018', name: 'Nora Evans',  dept: 'HR', region: 'T2' },
                { empno: '50011', name: 'Liam Brooks', dept: 'HR', region: 'U' },
                { empno: '50007', name: 'Zoe Parker',  dept: 'HR', region: 'T1-T2' },
                { empno: '50003', name: 'Owen Reed',   dept: 'HR', region: 'J' }
            ],
            '財務主管': [
                { empno: '50023', name: 'Jack Morris',  dept: 'FIN', region: 'T1' },
                { empno: '50019', name: 'Ava Bennett',  dept: 'FIN', region: 'S' },
                { empno: '50015', name: 'Ethan Ward',   dept: 'FIN', region: 'T2' },
                { empno: '50009', name: 'Chloe Foster', dept: 'FIN', region: 'U' }
            ],
            '稽核人員': [
                { empno: '50027', name: 'Oscar Wright', dept: 'RD',  region: 'T1-T2' },
                { empno: '50012', name: 'Ivy Newton',   dept: 'IA1', region: 'J' },
                { empno: '50005', name: 'Max Fisher',   dept: 'IA1', region: 'S' }
            ]
        };
        // 取得綁定該帳號角色的員工名單（新建角色預設為空）
        function roleMembers(name) { return ROLE_MEMBERS[name] || []; }

        let selectedIndex = -1;    // 目前選取的帳號角色
        let editIndex = -1;        // 帳號角色彈窗模式：-1=新增；>=0=編輯
        let permDraft = { data: {}, approve: new Set() };

        // 已授權項目總數 = 各頁面動作數 + 可審批申請單數
        function grantedCount(role) {
            let n = 0;
            DATA_PAGES.forEach(p => n += (role.perms.data[p.key] || []).length);
            n += (role.perms.approve || []).length;
            return n;
        }

        /* ============ 左側帳號角色選單 ============ */
        function renderRoleList() {
            const wrap = document.getElementById('role-list');
            const kw = document.getElementById('search-input').value.trim().toLowerCase();
            const rows = roles.map((r, i) => ({ r, i }))
                .filter(({ r }) => !kw || r.name.toLowerCase().includes(kw) || (r.desc || '').toLowerCase().includes(kw));

            if (rows.length === 0) {
                wrap.innerHTML = '<p class="text-sm text-text-muted text-center py-10">查無符合的帳號角色</p>';
                return;
            }

            const onCls = 'w-full text-left px-3 py-2.5 rounded-lg border border-primary/40 bg-primary-light transition-colors';
            const offCls = 'w-full text-left px-3 py-2.5 rounded-lg border border-transparent hover:bg-gray-50 transition-colors';
            wrap.innerHTML = rows.map(({ r, i }) => {
                const sel = i === selectedIndex;
                return `
                    <button onclick="selectRole(${i})" class="${sel ? onCls : offCls}">
                        <div class="flex items-center justify-between gap-2">
                            <span class="font-semibold truncate ${sel ? 'text-primary' : 'text-gray-800'}">${r.name}</span>
                        </div>
                        <div class="text-xs text-text-muted mt-0.5 truncate">${roleMembers(r.name).length} 位成員 · ${grantedCount(r)} 項權限</div>
                    </button>`;
            }).join('');
        }

        function selectRole(i) {
            selectedIndex = i;
            loadDraftFromRole();
            renderRoleList();
            renderRightPanel();
        }

        function loadDraftFromRole() {
            const role = roles[selectedIndex];
            permDraft = { data: {}, approve: new Set((role && role.perms.approve) || []) };
            DATA_PAGES.forEach(p => permDraft.data[p.key] = new Set((role && role.perms.data[p.key]) || []));
        }

        /* ============ 右側權限面板 ============ */
        function renderRightPanel() {
            const empty = document.getElementById('perm-empty');
            const panel = document.getElementById('perm-panel');
            if (selectedIndex < 0 || !roles[selectedIndex]) {
                empty.classList.remove('hidden');
                panel.classList.add('hidden');
                return;
            }
            empty.classList.add('hidden');
            panel.classList.remove('hidden');

            const r = roles[selectedIndex];
            document.getElementById('rp-name').innerText = r.name;
            document.getElementById('rp-members').innerText = roleMembers(r.name).length;
            document.getElementById('rp-granted').innerText = grantedCount(r);

            renderPermSections();
        }

        function renderPermSections() {
            // 頁面資料權限（依分類分組）
            const tbody = document.getElementById('data-perm-tbody');
            let html = '';
            let lastGroup = null;
            DATA_PAGES.forEach(p => {
                if (p.group !== lastGroup) {
                    lastGroup = p.group;
                    html += `<tr><td colspan="4" class="text-left bg-primary-light text-primary text-sm font-bold py-2.5 border-y border-primary/15"><i class="fa-solid fa-folder-open mr-2"></i>${p.group}</td></tr>`;
                }
                const cells = DATA_ACTIONS.map(a =>
                    (p.actions || DATA_ACTIONS).includes(a)
                        ? `<td class="text-center"><input type="checkbox" class="perm-check" ${permDraft.data[p.key].has(a) ? 'checked' : ''} onchange="togglePerm('${p.key}','${a}',this.checked)"></td>`
                        : `<td class="text-center text-gray-200">—</td>`
                ).join('');
                // 特殊操作：勾選才會於該頁顯示並可使用
                const ops = p.ops || [];
                const specialOps = p.specialOps || [];
                const opCheckbox = op =>
                    `<label class="inline-flex items-center gap-1.5 cursor-pointer">`
                    + `<input type="checkbox" class="perm-check" ${permDraft.data[p.key].has(op) ? 'checked' : ''} onchange="togglePerm('${p.key}','${op}',this.checked)">`
                    + `<span class="text-sm text-gray-600">${op}</span></label>`;
                let opsCell;
                if (ops.length || specialOps.length) {
                    opsCell = '';
                    if (specialOps.length) {
                        // 檢視範圍：獨立一行置頂，與其他特殊操作以分隔線區隔
                        opsCell += `<div class="flex flex-wrap items-center gap-x-6 gap-y-2">`
                            + `<span class="inline-flex items-center gap-1 text-xs font-bold text-amber-600 mr-1"><i class="fa-solid fa-eye text-[10px]"></i>檢視範圍</span>`
                            + specialOps.map(opCheckbox).join('') + `</div>`;
                    }
                    if (ops.length) {
                        opsCell += `<div class="${specialOps.length ? 'mt-2.5 pt-2.5 border-t border-dashed border-gray-300' : ''} grid grid-cols-4 gap-x-6 gap-y-2">` + ops.map(opCheckbox).join('') + `</div>`;
                    }
                } else {
                    opsCell = `<span class="text-gray-300 text-xs">—</span>`;
                }
                html += `<tr class="hover:bg-gray-50/70 transition-colors"><td class="text-left font-medium text-gray-700 pl-8"><i class="fa-regular fa-file-lines text-gray-300 text-xs mr-2"></i>${p.name}</td>${cells}<td class="text-left">${opsCell}</td></tr>`;
            });
            tbody.innerHTML = html;

            // 可審批的申請單
            const al = document.getElementById('approve-list');
            al.innerHTML = APPROVAL_FORMS.map(f => `
                <label class="flex items-center gap-2.5 p-2.5 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="perm-check" ${permDraft.approve.has(f.key) ? 'checked' : ''} onchange="toggleApprove('${f.key}',this.checked)">
                    <span class="text-sm text-gray-700">${f.name}</span>
                </label>`).join('');
        }

        function togglePerm(pageKey, action, checked) {
            if (checked) permDraft.data[pageKey].add(action); else permDraft.data[pageKey].delete(action);
        }
        function toggleApprove(formKey, checked) {
            if (checked) permDraft.approve.add(formKey); else permDraft.approve.delete(formKey);
        }

        function setAllPerms(on) {
            DATA_PAGES.forEach(p => permDraft.data[p.key] = on ? new Set((p.actions || STD_ACTIONS).concat(p.ops || []).concat(p.specialOps || [])) : new Set());
            renderPermSections();
        }
        function setAllApprove(on) {
            permDraft.approve = on ? new Set(ALL_FORM_KEYS) : new Set();
            renderPermSections();
        }

        function resetPerms() {
            loadDraftFromRole();
            renderPermSections();
            showToast('info', '已還原為儲存前的權限');
        }

        function savePerms() {
            const role = roles[selectedIndex];
            const data = {};
            DATA_PAGES.forEach(p => data[p.key] = (p.actions || STD_ACTIONS).concat(p.ops || []).concat(p.specialOps || []).filter(a => permDraft.data[p.key].has(a)));
            role.perms = { data, approve: ALL_FORM_KEYS.filter(k => permDraft.approve.has(k)) };
            renderRoleList();
            renderRightPanel();
            showToast('success', `已更新「${role.name}」的權限設定`);
        }

        /* ============ 檢視成員（綁定此帳號角色的員工名單，含工號搜尋與分頁）============ */
        const MEMBERS_PAGE_SIZE = 10;
        let membersFull = [];      // 目前角色的完整員工名單
        let membersPage = 1;       // 目前頁碼

        function openMembersModal() {
            if (selectedIndex < 0 || !roles[selectedIndex]) return;
            const r = roles[selectedIndex];
            membersFull = roleMembers(r.name);
            document.getElementById('members-role-name').innerText = r.name;
            document.getElementById('members-search').value = '';
            renderMembers(1);
            document.getElementById('members-modal').classList.remove('hidden');
        }

        // 依工號關鍵字篩選並分頁渲染
        function renderMembers(page) {
            const kw = document.getElementById('members-search').value.trim().toLowerCase();
            const filtered = membersFull.filter(m => !kw || m.empno.toLowerCase().includes(kw));
            const total = filtered.length;
            const totalPages = Math.max(1, Math.ceil(total / MEMBERS_PAGE_SIZE));
            membersPage = Math.min(Math.max(1, page || 1), totalPages);
            const start = (membersPage - 1) * MEMBERS_PAGE_SIZE;
            const rows = filtered.slice(start, start + MEMBERS_PAGE_SIZE);

            document.getElementById('members-count').innerText = `共 ${total} 位`;

            const tbody = document.getElementById('members-tbody');
            const empty = document.getElementById('members-empty');
            if (total === 0) {
                tbody.innerHTML = '';
                tbody.parentElement.classList.add('hidden');
                empty.classList.remove('hidden');
                document.getElementById('members-empty-text').innerText =
                    kw ? `查無工號含「${document.getElementById('members-search').value.trim()}」的員工` : '目前沒有員工綁定此帳號角色';
            } else {
                tbody.parentElement.classList.remove('hidden');
                empty.classList.add('hidden');
                tbody.innerHTML = rows.map(m => `
                    <tr class="hover:bg-gray-50/70 transition-colors">
                        <td class="text-center"><span class="px-2 py-0.5 bg-gray-100 rounded text-xs font-semibold text-gray-700">${m.dept}</span></td>
                        <td class="text-left font-mono text-gray-600">${m.empno}</td>
                        <td class="text-left font-medium text-gray-800">${m.name}</td>
                        <td class="text-center"><span class="px-2 py-0.5 bg-teal-50 text-teal-600 rounded text-xs font-semibold">${m.region || '—'}</span></td>
                    </tr>`).join('');
            }

            document.getElementById('members-pg-info').innerText =
                total ? `顯示第 ${start + 1} 到 ${start + rows.length} 筆，共 ${total} 筆` : '共 0 筆';
            document.getElementById('members-pg-label').innerText = `第 ${membersPage} / ${totalPages} 頁`;
            document.getElementById('members-prev').disabled = membersPage <= 1;
            document.getElementById('members-next').disabled = membersPage >= totalPages;
        }

        function membersPrev() { renderMembers(membersPage - 1); }
        function membersNext() { renderMembers(membersPage + 1); }
        function closeMembersModal() { document.getElementById('members-modal').classList.add('hidden'); }
        // 點背景關閉檢視成員彈窗
        document.getElementById('members-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeMembersModal(); });

        /* ============ 帳號角色操作（右側） ============ */
        function deleteCurrent() {
            const r = roles[selectedIndex];
            if (!confirm(`確定要刪除帳號角色「${r.name}」嗎？此動作無法復原。`)) return;
            const name = r.name;
            roles.splice(selectedIndex, 1);
            selectedIndex = roles.length ? 0 : -1;
            if (selectedIndex >= 0) loadDraftFromRole();
            renderRoleList();
            renderRightPanel();
            showToast('info', `已刪除帳號角色「${name}」`);
        }

        /* ============ 新增 / 編輯 帳號 彈窗 ============ */
        function openRoleCreate() {
            editIndex = -1;
            document.getElementById('role-modal-title').innerText = '新增帳號角色';
            document.getElementById('role-name').value = '';
            document.getElementById('role-modal').classList.remove('hidden');
        }

        function openRoleEditCurrent() {
            editIndex = selectedIndex;
            const r = roles[selectedIndex];
            document.getElementById('role-modal-title').innerText = '編輯帳號角色';
            document.getElementById('role-name').value = r.name;
            document.getElementById('role-modal').classList.remove('hidden');
        }

        function closeRoleModal() { document.getElementById('role-modal').classList.add('hidden'); }

        function saveRole() {
            const name = document.getElementById('role-name').value.trim();
            if (!name) { showToast('error', '請填寫帳號角色名稱'); return; }
            const dup = roles.some((r, idx) => r.name === name && idx !== editIndex);
            if (dup) { showToast('error', `帳號角色「${name}」已存在`); return; }

            if (editIndex === -1) {
                roles.push({ name, desc: '', members: 0, perms: { data: buildData({}), approve: [] } });
                selectedIndex = roles.length - 1;
                loadDraftFromRole();
                showToast('success', `已新增帳號角色「${name}」`);
            } else {
                roles[editIndex] = { ...roles[editIndex], name };
                showToast('success', `已更新帳號角色「${name}」`);
            }
            closeRoleModal();
            document.getElementById('search-input').value = '';
            renderRoleList();
            renderRightPanel();
        }

        /* ============ Toast 提示控制 ============ */
        function showToast(type, text) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = text;
            if (type === 'success') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20";
                toastIcon.className = "fa-solid fa-circle-check text-emerald-400 text-base";
            } else if (type === 'error') {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-rose-500/20";
                toastIcon.className = "fa-solid fa-circle-xmark text-rose-400 text-base";
            } else {
                toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20";
                toastIcon.className = "fa-solid fa-circle-info text-blue-400 text-base";
            }
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.transform = 'translateY(5rem)';
                toast.style.opacity = '0';
            }, 2600);
        }

        // 點背景關閉帳號角色彈窗
        document.getElementById('role-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRoleModal(); });

        // 主分頁切換（帳號權限 / 權限設置）
        function switchMainTab(tab) {
            const onCls = 'px-4 py-2.5 text-sm font-semibold text-primary border-b-2 border-primary -mb-px transition-colors';
            const offCls = 'px-4 py-2.5 text-sm font-medium text-gray-500 border-b-2 border-transparent -mb-px hover:text-gray-700 transition-colors';
            document.getElementById('main-tab-account').classList.toggle('hidden', tab !== 'account');
            document.getElementById('main-tab-perm').classList.toggle('hidden', tab !== 'perm');
            document.getElementById('mtab-account').className = tab === 'account' ? onCls : offCls;
            document.getElementById('mtab-perm').className = tab === 'perm' ? onCls : offCls;
        }

        // 帳號權限分頁：每位員工依「權限設置」的權限隨機配給一項
        function assignAccountPerms() {
            const names = roles.map(r => r.name);
            if (!names.length) return;
            document.querySelectorAll('.acct-perm').forEach(td => {
                const name = names[Math.floor(Math.random() * names.length)];
                td.innerHTML = `<span class="ui-badge ui-badge-info">${name}</span>`;
            });
        }

        // 初始化：預設選取第一個帳號
        window.onload = function () {
            if (roles.length) { selectedIndex = 0; loadDraftFromRole(); }
            renderRoleList();
            renderRightPanel();
            assignAccountPerms();
        };
    </script>
</body>
</html>
