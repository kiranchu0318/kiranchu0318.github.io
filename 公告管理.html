<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4A90E2',
                        'primary-light': '#EAF2FC',
                        bgMain: '#f4f7fc',
                    }
                }
            }
        }
    </script>
    <style>
        /* 隱藏捲軸但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class=" text-gray-800 p-4 md:p-8 min-h-screen flex justify-center">

    <div class="w-full max-w-[1400px] mx-auto">

        <!-- 頂部標題與操作區 -->
        <div class="flex justify-between items-center mb-6 px-1">
            <h1 class="ui-page-title">公告管理</h1>

            <!-- 新增公告按鈕 -->
            <button onclick="openModal()" class="ui-btn ui-btn-primary">
                <i class="fa-solid fa-plus"></i>
                新增公告
            </button>
        </div>

        <!-- 主要內容區 -->
        <div class="ui-card p-2 sm:p-8">

            <!-- 公告表格 -->
            <div class="overflow-x-auto">
                <table class="ui-table text-left min-w-[800px]">
                    <thead>
                        <tr>
                            <th class="w-32">分類</th>
                            <th>標題</th>
                            <th class="w-48">發佈人</th>
                            <th class="w-36">時間</th>
                            <th class="text-right w-24">瀏覽數</th>
                            <th class="text-center w-40">操作</th>
                        </tr>
                    </thead>
                    <tbody id="announcementTableBody">
                        <!-- 由 JavaScript 動態渲染，使後台新增功能可交互運作 -->
                    </tbody>
                </table>
            </div>

            <!-- 分頁控制 -->
            <div class="flex items-center justify-between mt-6 px-4">
                <p id="paginationInfo" class="text-sm text-gray-500">顯示 1 至 4 筆，共 4 筆</p>
                <div class="flex gap-1">
                    <button class="ui-page-btn" disabled><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn">2</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>

        </div>
    </div>

    <!-- 新增公告互動視窗 (Modal) - 參考附圖重構為高密度專業版面 -->
    <div id="addModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white rounded-2xl w-full max-w-4xl mx-4 overflow-hidden shadow-2xl transform scale-95 transition-transform duration-200" id="modalContent">

            <!-- 視窗標題 -->
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-1 h-5 bg-primary rounded-full"></span>
                    新增公告
                </h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- 視窗內容 (完全重現附圖配置與欄位) -->
            <div class="p-6 space-y-4">

                <!-- 控制區：地區、選擇地區、必須確認、重置 -->
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <!-- 地區選單按鈕 -->
                        <div class="relative">
                            <button class="bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition shadow-sm">
                                地區 <i class="fa-solid fa-caret-down text-xs"></i>
                            </button>
                        </div>

                        <!-- 選擇地區按鈕 -->
                        <button class="bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                            選擇地區
                        </button>

                        <!-- 必須確認 複選框 (Custom Style) -->
                        <label class="flex items-center gap-2 cursor-pointer select-none ml-2">
                            <div class="relative">
                                <input type="checkbox" id="mustConfirm" class="sr-only" checked onchange="toggleConfirmCheckbox(this)">
                                <div id="checkboxWrapper" class="w-5 h-5 bg-blue-600 rounded flex items-center justify-center text-white text-xs border border-blue-600 transition">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                            </div>
                            <span class="text-sm font-semibold text-gray-700">必須已讀</span>
                        </label>
                    </div>

                    <!-- 重置按鈕 -->
                    <button onclick="resetForm()" class="ui-btn ui-btn-primary">
                        重置
                    </button>
                </div>

                <!-- 標題輸入框 (附圖風格：綠色框 + 綠色打勾確認圖示) -->
                <div class="relative">
                    <input type="text" id="announcementTitle" class="w-full border-2 border-emerald-500 rounded-lg pl-4 pr-10 py-2.5 focus:outline-none text-gray-800 font-medium placeholder-emerald-600/50 bg-white" placeholder="請輸入標題" value="test">
                    <div class="absolute inset-y-0 right-3 flex items-center text-emerald-600 text-lg">
                        <i class="fa-solid fa-check"></i>
                    </div>
                </div>

                <!-- 富文本編輯器模擬區 (還原附圖控制列與文字區域) -->
                <div class="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">
                    <!-- 工具列 -->
                    <div class="bg-gray-50/80 px-4 py-2.5 border-b border-gray-200 flex flex-wrap items-center gap-y-2 gap-x-4 text-gray-500 text-sm">
                        <!-- 排版與樣式 -->
                        <div class="flex items-center gap-3">
                            <button type="button" class="font-bold text-gray-800 hover:text-black transition" title="標題標籤">H</button>
                            <button type="button" class="hover:text-black transition" title="粗體"><i class="fa-solid fa-bold"></i></button>
                            <button type="button" class="hover:text-black transition" title="斜體"><i class="fa-solid fa-italic"></i></button>
                            <button type="button" class="hover:text-black transition" title="刪除線"><i class="fa-solid fa-strikethrough"></i></button>
                        </div>
                        <div class="h-4 w-px bg-gray-300"></div>
                        <!-- 水平線與引言 -->
                        <div class="flex items-center gap-3">
                            <button type="button" class="hover:text-black transition" title="水平分割線"><i class="fa-solid fa-minus"></i></button>
                            <button type="button" class="hover:text-black transition" title="引用區塊"><i class="fa-solid fa-quote-left"></i></button>
                        </div>
                        <div class="h-4 w-px bg-gray-300"></div>
                        <!-- 清單與對齊 -->
                        <div class="flex items-center gap-3">
                            <button type="button" class="hover:text-black transition" title="無序清單"><i class="fa-solid fa-list-ul"></i></button>
                            <button type="button" class="hover:text-black transition" title="有序清單"><i class="fa-solid fa-list-ol"></i></button>
                            <button type="button" class="hover:text-black transition" title="任務清單"><i class="fa-regular fa-square-check"></i></button>
                            <button type="button" class="hover:text-black transition animate-pulse" title="減少縮排"><i class="fa-solid fa-outdent"></i></button>
                            <button type="button" class="hover:text-black transition" title="增加縮排"><i class="fa-solid fa-indent"></i></button>
                        </div>
                        <div class="h-4 w-px bg-gray-300"></div>
                        <!-- 媒體與表格 -->
                        <div class="flex items-center gap-3">
                            <button type="button" class="hover:text-black transition" title="插入表格"><i class="fa-solid fa-table"></i></button>
                            <button type="button" class="hover:text-black transition" title="插入圖片"><i class="fa-regular fa-image"></i></button>
                            <button type="button" class="hover:text-black transition" title="插入超連結"><i class="fa-solid fa-link"></i></button>
                        </div>
                        <div class="h-4 w-px bg-gray-300"></div>
                        <!-- 代碼與清除 -->
                        <div class="flex items-center gap-3">
                            <button type="button" class="hover:text-black transition" title="程式碼區塊"><i class="fa-solid fa-code"></i></button>
                            <button type="button" class="font-bold text-xs hover:text-black transition" title="清除格式">CB</button>
                        </div>
                    </div>

                    <!-- 編輯區 -->
                    <textarea id="announcementContent" class="w-full px-4 py-3 min-h-[180px] focus:outline-none resize-none text-gray-700 placeholder-gray-400 text-sm" placeholder="輸入公告內容...">test</textarea>
                </div>

                <!-- 底部上傳附件與動作區 (完全復刻底排設計) -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-2">
                    <!-- 附件上傳控制件 (實作原生功能) -->
                    <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-white max-w-sm w-full shadow-sm">
                        <button type="button" onclick="triggerFileInput()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 border-r border-gray-300 text-sm font-medium transition cursor-pointer shrink-0">
                            選擇檔案
                        </button>
                        <span id="fileNameDisplay" class="px-3 text-sm text-gray-500 bg-white grow whitespace-nowrap truncate">
                            未選擇任何檔案
                        </span>
                        <!-- 隱藏的實際 File Input -->
                        <input type="file" id="announcementFile" class="hidden" onchange="handleFileChange(this)">
                    </div>

                    <!-- 送出按鈕組 -->
                    <div class="flex items-center gap-3 justify-end">
                        <button onclick="submitForm()" class="ui-btn ui-btn-primary">
                            發布
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 公告內容檢視視窗 (Detail Modal) -->
    <div id="detailModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity">
        <div id="detailModalContent" class="bg-white rounded-2xl w-full max-w-3xl mx-4 overflow-hidden shadow-2xl transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">

            <!-- 標題列：左側公告資訊、右上方 編輯 / 刪除 / 關閉 -->
            <div class="p-5 border-b border-gray-100 flex justify-between items-start gap-4 bg-gray-50/50">
                <div class="min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                        <span id="detailCategory" class="ui-badge ui-badge-gray"></span>
                        <span id="detailId" class="text-xs text-gray-400 font-mono"></span>
                    </div>
                    <h2 id="detailTitle" class="text-xl font-bold text-gray-800 break-words leading-snug"></h2>
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2.5 text-sm text-gray-500">
                        <span class="flex items-center gap-1.5"><i class="fa-regular fa-user text-gray-400"></i> <span id="detailAuthor"></span></span>
                        <span class="flex items-center gap-1.5"><i class="fa-regular fa-calendar text-gray-400"></i> <span id="detailDate"></span></span>
                        <span class="flex items-center gap-1.5"><i class="fa-regular fa-eye text-gray-400"></i> <span id="detailViews"></span> 次瀏覽</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="editFromDetail()" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen-to-square"></i> 編輯</button>
                    <button onclick="deleteFromDetail()" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                    <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 transition ml-1 p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
            </div>

            <!-- 公告內容 -->
            <div class="p-6 overflow-y-auto">
                <div id="detailContent" class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <!-- 提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3.5 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastText">公告已成功發佈！</span>
    </div>

    <script>
        // 初始化模擬資料庫 (增加系統的互動完整度，讓新增真正能在列表生效)
        let announcements = [
            { id: 1003, category: '全體', title: '端午節連續假期連線維護與伺服器暫停服務通知', author: 'dev', date: '2026-06-02', views: 1245,
              content: '親愛的同仁您好：\n\n配合端午節連續假期，資訊部門將於 2026/06/08 22:00 至 2026/06/09 06:00 進行伺服器與網路設備例行維護。\n\n維護期間，內部 OA 系統、差勤系統及檔案伺服器將暫停服務，造成不便敬請見諒。如有緊急需求，請聯繫資訊部值班人員（分機 5168）。\n\n資訊部 敬上' },
            { id: 1002, category: '地區', title: '2026 年度員工健康檢查填報與預約事宜', author: 'HR_Admin', date: '2026-05-28', views: 842,
              content: '2026 年度員工健康檢查即日起開放預約，請所有正職同仁於 2026/06/20 前完成線上填報與時段預約。\n\n本次健檢與「康健診所」合作，提供基礎與進階兩種方案，費用由公司全額補助。詳細項目與院所地址請參閱附件。\n\n如有疑問請洽人資部 HR_Admin。' },
            { id: 1001, category: '全體', title: '第三季核心技術分享會（福爾摩沙會議室）', author: 'dev', date: '2026-05-15', views: 2108,
              content: '第三季核心技術分享會將於 2026/07/05（五）下午 14:00 在福爾摩沙會議室舉行。\n\n本次主題涵蓋微服務架構實戰、前端效能優化與 AI 輔助開發工具導入經驗。歡迎各部門同仁踴躍報名參加，現場備有茶點。\n\n名額有限，報名從速。' },
            { id: 1000, category: '地區', title: '辦公室冷氣設備定期保養通知', author: 'Admin', date: '2026-05-01', views: 3052,
              content: '為維持辦公環境品質，總務將於 2026/05/10（六）對全棟冷氣設備進行定期保養與濾網清潔。\n\n保養期間部分樓層冷氣將輪流暫停，預計每區段約 1 小時。造成不便敬請見諒，感謝配合。\n\n總務組 敬上' }
        ];

        let currentDetailId = null;  // 目前檢視中的公告 id
        let editingId = null;        // 編輯中的公告 id（null 表示為新增）

        // 依分類回傳對應 badge 樣式
        function categoryClassOf(category) {
            if (category === '全體') return 'ui-badge ui-badge-info';
            if (category === '地區') return 'ui-badge ui-badge-success';
            return 'ui-badge ui-badge-gray';
        }

        // 頁面載入時進行動態列表渲染
        window.onload = function() {
            renderTable();
        }

        // 動態渲染表格
        function renderTable() {
            const tbody = document.getElementById('announcementTableBody');
            tbody.innerHTML = '';

            const filteredData = announcements;

            filteredData.forEach(item => {
                const categoryClass = categoryClassOf(item.category);

                const tr = document.createElement('tr');
                tr.className = "group";
                tr.innerHTML = `
                    <td>
                        <span class="${categoryClass}">${item.category}</span>
                    </td>
                    <td class="font-medium text-gray-800 hover:text-primary hover:underline cursor-pointer transition-colors" onclick="openDetail(${item.id})" title="點擊查看公告內容">
                        ${item.title}
                    </td>
                    <td>${item.author}</td>
                    <td>${item.date}</td>
                    <td class="text-right">${item.views.toLocaleString()}</td>
                    <td>
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="openDetail(${item.id})" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-eye"></i> 檢視</button>
                            <button onclick="openEdit(${item.id})" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen-to-square"></i> 編輯</button>
                            <button onclick="deleteAnnouncement(${item.id})" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 下架</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // 更新分頁與筆數資訊
            document.getElementById('paginationInfo').innerText = `顯示 1 至 ${filteredData.length} 筆，共 ${filteredData.length} 筆`;
        }

        // 開啟 Modal 彈窗（新增模式）
        function openModal() {
            editingId = null; // 新增模式
            document.querySelector('#modalContent h2').innerHTML =
                '<span class="w-1 h-5 bg-primary rounded-full"></span> 新增公告';
            resetForm();

            const modal = document.getElementById('addModal');
            const modalContent = document.getElementById('modalContent');

            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        /* ============ 公告內容檢視 / 編輯 / 刪除 ============ */

        // 點擊標題 → 開啟內容檢視彈窗
        function openDetail(id) {
            const item = announcements.find(a => a.id === id);
            if (!item) return;
            currentDetailId = id;

            const catEl = document.getElementById('detailCategory');
            catEl.className = categoryClassOf(item.category);
            catEl.innerText = item.category;
            document.getElementById('detailId').innerText = '#' + item.id;
            document.getElementById('detailTitle').innerText = item.title;
            document.getElementById('detailAuthor').innerText = item.author;
            document.getElementById('detailDate').innerText = item.date;
            document.getElementById('detailViews').innerText = item.views.toLocaleString();
            document.getElementById('detailContent').innerText = item.content || '（此公告尚無詳細內容）';

            const modal = document.getElementById('detailModal');
            const mc = document.getElementById('detailModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                mc.classList.remove('scale-95');
                mc.classList.add('scale-100');
            }, 10);
        }

        function closeDetail() {
            const modal = document.getElementById('detailModal');
            const mc = document.getElementById('detailModalContent');
            mc.classList.remove('scale-100');
            mc.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 200);
        }

        // 由檢視彈窗點「編輯」→ 帶入資料開啟編輯彈窗
        function editFromDetail() {
            const id = currentDetailId;
            closeDetail();
            setTimeout(() => openEdit(id), 200);
        }

        // 開啟編輯彈窗並帶入既有資料
        function openEdit(id) {
            const item = announcements.find(a => a.id === id);
            if (!item) return;
            editingId = id;

            document.querySelector('#modalContent h2').innerHTML =
                '<span class="w-1 h-5 bg-primary rounded-full"></span> 編輯公告與內容';
            document.getElementById('announcementTitle').value = item.title;
            document.getElementById('announcementContent').value = item.content || '';
            document.getElementById('fileNameDisplay').innerText = '未選擇任何檔案';
            document.getElementById('announcementFile').value = '';

            const modal = document.getElementById('addModal');
            const modalContent = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // 由列表「下架」
        function deleteAnnouncement(id) {
            const item = announcements.find(a => a.id === id);
            if (!item) return;
            if (!confirm(`確定要下架公告「${item.title}」嗎？下架後將不再顯示於公告列表。`)) return;
            announcements = announcements.filter(a => a.id !== id);
            renderTable();
            showToast('公告已下架', true);
        }

        // 由檢視彈窗點「刪除」
        function deleteFromDetail() {
            const item = announcements.find(a => a.id === currentDetailId);
            if (!item) return;
            if (!confirm(`確定要下架公告「${item.title}」嗎？下架後將不再顯示於公告列表。`)) return;
            announcements = announcements.filter(a => a.id !== currentDetailId);
            closeDetail();
            renderTable();
            showToast('公告已下架', true);
        }

        // 關閉 Modal 彈窗
        function closeModal() {
            const modal = document.getElementById('addModal');
            const modalContent = document.getElementById('modalContent');

            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        // 必須確認 Custom Checkbox 勾選狀態視覺轉換
        function toggleConfirmCheckbox(checkbox) {
            const wrapper = document.getElementById('checkboxWrapper');
            if (checkbox.checked) {
                wrapper.className = "w-5 h-5 bg-blue-600 rounded flex items-center justify-center text-white text-xs border border-blue-600 transition";
                wrapper.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else {
                wrapper.className = "w-5 h-5 bg-white rounded flex items-center justify-center text-transparent text-xs border border-gray-300 transition";
                wrapper.innerHTML = '';
            }
        }

        // 重置按鈕行為
        function resetForm() {
            document.getElementById('announcementTitle').value = '';
            document.getElementById('announcementContent').value = '';
            document.getElementById('fileNameDisplay').innerText = '未選擇任何檔案';
            document.getElementById('announcementFile').value = '';

            const checkbox = document.getElementById('mustConfirm');
            checkbox.checked = false;
            toggleConfirmCheckbox(checkbox);
        }

        // 啟動實體檔案選擇器
        function triggerFileInput() {
            document.getElementById('announcementFile').click();
        }

        // 當檔案選取改變時更新介面檔名
        function handleFileChange(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                display.innerText = input.files[0].name;
            } else {
                display.innerText = '未選擇任何檔案';
            }
        }

        // 表單送出邏輯：送出即發布
        function submitForm() {
            const title = document.getElementById('announcementTitle').value.trim();
            const content = document.getElementById('announcementContent').value.trim();

            // 由於輸入控制項已被移除，我們設定預設安全資料
            const category = "全體";
            const date = new Date().toISOString().split('T')[0];

            if (!title) {
                showToast('請填寫公告標題！', false);
                return;
            }

            // 編輯模式：更新既有公告（保留分類、發佈人、日期、瀏覽數）
            if (editingId !== null) {
                const item = announcements.find(a => a.id === editingId);
                if (item) {
                    item.title = title;
                    item.content = content;
                }
                editingId = null;
                closeModal();
                renderTable();
                showToast('公告已更新！', true);
                resetForm();
                return;
            }

            // 動態創建公告編號
            const nextId = announcements.length > 0 ? Math.max(...announcements.map(item => item.id)) + 1 : 1000;

            // 新增至資料集頂部，送出當下即發布
            announcements.unshift({
                id: nextId,
                category: category,
                title: title,
                author: 'dev',
                date: date,
                views: 0,
                content: content
            });

            closeModal();
            renderTable();
            showToast('公告已發布！', true);

            // 清空表單
            resetForm();
        }

        // 觸發自訂 Toast 氣泡提示
        function showToast(message, isSuccess) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.innerText = message;

            const icon = toast.querySelector('i');
            if (isSuccess) {
                icon.className = "fa-solid fa-circle-check text-emerald-400";
            } else {
                icon.className = "fa-solid fa-circle-exclamation text-amber-400";
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 點擊 Modal 外部背景關閉視窗
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 點擊內容檢視彈窗外部背景關閉
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetail();
            }
        });

        // Esc 關閉檢視彈窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !document.getElementById('detailModal').classList.contains('hidden')) {
                closeDetail();
            }
        });
    </script>
</body>
</html>
