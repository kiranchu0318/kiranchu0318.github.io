<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出勤紀錄</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 設定 Tailwind 自訂主題 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB',
                        card: '#FFFFFF',
                        text: {
                            main: '#1F2937',
                            muted: '#6B7280',
                            light: '#9CA3AF'
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                        'modal': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.background');
            font-family: theme('fontFamily.sans');
        }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Modal 動畫過渡 */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 200ms ease-out, transform 200ms ease-out; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <!-- 主容器 -->
    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <div class="flex items-center gap-3">
                <h1 class="ui-page-title">出勤紀錄</h1>
            </div>
        </header>

        <!-- 篩選台 (個人視角：無需員工搜尋，僅需時間/狀態) -->
        <div class="ui-card p-5 space-y-4">
            <div class="flex flex-wrap items-center gap-3">
                <button onclick="quickRange('week')" id="btn-week" class="ui-btn ui-btn-primary ui-btn-sm">本週</button>
                <button onclick="quickRange('month')" id="btn-month" class="ui-btn ui-btn-secondary ui-btn-sm">本月</button>

                <div class="hidden sm:block w-px h-6 bg-gray-200 mx-1"></div>

                <!-- 出勤狀態 -->
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-text-muted">出勤狀態</span>
                    <select id="att-status" onchange="applyFilters()" class="ui-select min-w-[120px]">
                        <option value="all">全部狀態</option>
                        <option value="正常">正常</option>
                        <option value="遲到">遲到</option>
                        <option value="早退">早退</option>
                        <option value="缺卡">缺卡</option>
                    </select>
                </div>

                <!-- 時間搜尋欄位 -->
                <div class="flex items-center gap-2">
                    <input type="date" id="date-start" onchange="applyFilters()" class="ui-input cursor-pointer">
                    <span class="text-gray-400 text-[13px] font-medium">至</span>
                    <input type="date" id="date-end" onchange="applyFilters()" class="ui-input cursor-pointer">
                    <button onclick="applyFilters()" class="ui-btn ui-btn-primary ui-btn-sm"><i class="fa-solid fa-magnifying-glass"></i> 查詢</button>
                    <button onclick="resetFilters()" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-arrows-rotate"></i> 重置</button>
                </div>
            </div>
        </div>

        <!-- 打卡記錄區塊 (卡片樣式) -->
        <section class="ui-card p-4 sm:p-6">

            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <div class="flex items-center gap-2">
                    <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">打卡記錄</h2>
                    <span id="record-count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
                </div>
                <div class="text-xs text-text-muted flex items-center gap-2">
                    <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500"></span> 已審核
                    <span class="inline-block w-2.5 h-2.5 rounded-full bg-rose-500 ml-1"></span> 未審核
                </div>
            </div>

            <!-- 表格容器 -->
            <div class="overflow-x-auto rounded-lg border border-gray-100 custom-scrollbar">
                <table class="ui-table text-center whitespace-nowrap">
                    <thead>
                        <tr>
                            <th scope="col">日期</th>
                            <th scope="col">上下班時間</th>
                            <th scope="col" class="min-w-[120px]">外出時間</th>
                            <th scope="col" class="min-w-[180px]">打卡地點</th>
                            <th scope="col" class="min-w-[140px]">出勤狀況</th>
                            <th scope="col" class="w-28">狀態</th>
                            <th scope="col" class="w-24">操作</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-tbody"><!-- 動態由 JavaScript 渲染 --></tbody>
                </table>
            </div>

            <div id="no-data-view" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-magnifying-glass text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的出勤紀錄</p>
                <button onclick="resetFilters()" class="text-xs text-primary font-semibold hover:underline">清除篩選條件</button>
            </div>

            <!-- 分頁區塊 -->
            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>

    </div>

    <!-- ========================================== -->
    <!-- 彈出視窗：新增補卡申請 (點擊缺卡列的「補卡」開啟，背景維持出勤紀錄列表) -->
    <!-- ========================================== -->
    <div id="makeup-apply-modal" class="fixed inset-0 z-50 hidden" aria-labelledby="makeup-apply-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity" onclick="closeMakeupApply()"></div>
        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <div id="makeupApplyPanel" class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-modal transition-all sm:my-8 w-full max-w-2xl modal-enter">

                    <!-- 標題區 -->
                    <div class="bg-white px-4 sm:px-6 py-4 sm:py-5 border-b border-gray-100 flex justify-between items-center sticky top-0 z-20">
                        <h3 class="text-lg font-bold text-gray-900" id="makeup-apply-title">新增補卡申請</h3>
                        <button onclick="closeMakeupApply()" class="text-gray-400 hover:text-gray-600 transition-colors p-2 rounded-full hover:bg-gray-100">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>

                    <!-- 表單內容 -->
                    <div class="px-4 sm:px-6 py-6 space-y-6 max-h-[calc(100vh-140px)] overflow-y-auto">
                        <!-- 兩欄式：補卡日期與補卡時間 -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">補卡日期 <span class="text-red-500">*</span></label>
                                <input type="date" id="makeup-apply-date" class="ui-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">實際打卡時間 <span class="text-red-500">*</span></label>
                                <input type="time" class="ui-input">
                            </div>
                        </div>

                        <!-- 兩欄式：打卡節點與補卡原因 -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">時段 <span class="text-red-500">*</span></label>
                                <select class="ui-select">
                                    <option value="" disabled selected>請選擇時段</option>
                                    <option value="clock_in">上班打卡</option>
                                    <option value="clock_out">下班打卡</option>
                                    <option value="both">上下班皆漏打</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">補卡原因 <span class="text-red-500">*</span></label>
                                <select class="ui-select">
                                    <option value="" disabled selected>請選擇補卡原因</option>
                                    <option value="forgot">忘記打卡</option>
                                    <option value="system">系統異常</option>
                                    <option value="business">公出/出差</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                        </div>

                        <!-- 種類說明 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">種類 <span class="text-red-500">*</span></label>
                            <textarea rows="3" placeholder="請詳細說明補卡原因（例如：因參與公出會議無法回辦公室打卡）..." class="ui-input resize-none"></textarea>
                        </div>

                        <!-- 證明文件上傳 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">證明文件（選填）</label>
                            <input type="file" class="block w-full text-sm text-gray-500 border border-gray-200 rounded-lg cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-l-lg file:border-0 file:text-sm file:font-medium file:bg-primary-light file:text-primary hover:file:bg-blue-100 transition-all">
                            <p class="mt-2 text-xs text-gray-500 leading-relaxed">※ 若為系統異常或公出，可上傳相關截圖或證明。支援 jpg, png, pdf 等格式。</p>
                        </div>
                    </div>

                    <!-- 底部按鈕區 -->
                    <div class="bg-gray-50 px-4 sm:px-6 py-4 flex flex-col-reverse sm:flex-row justify-end gap-3 rounded-b-xl border-t border-gray-100 sticky bottom-0 z-20">
                        <button type="button" onclick="closeMakeupApply()" class="ui-btn ui-btn-secondary w-full sm:w-auto">取消</button>
                        <button type="button" onclick="closeMakeupApply()" class="ui-btn ui-btn-primary w-full sm:w-auto">提交申請</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 彈出視窗：申請單檢視 (點擊出勤狀況單號開啟，比照簽核.html) -->
    <!-- ========================================== -->
    <div id="leavedoc-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm" onclick="closeLeaveDocModal()"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="bg-[#F0F2F5] rounded-xl shadow-2xl w-full max-w-[1100px] h-[90vh] flex flex-col overflow-hidden text-left">

                <!-- 標題列 -->
                <div class="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200 flex-shrink-0">
                    <span id="ld-title" class="font-bold text-gray-800 text-base">請假申請單 (A)</span>
                    <button onclick="closeLeaveDocModal()" class="bg-[#3F51B5] hover:bg-blue-800 text-white w-7 h-7 flex items-center justify-center rounded transition-colors">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>

                <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
                    <!-- 左側：表單內容 + 固定底部 -->
                    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
                        <div class="flex-1 overflow-y-auto p-6 space-y-6">

                            <!-- 基本資訊 -->
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                                <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">基本資訊</div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">文件編號</label>
                                        <input id="ld-docno" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 font-mono cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">申請日期</label>
                                        <input id="ld-appdate" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">申請人</label>
                                        <input id="ld-name" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800">
                                    </div>
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">工號</label>
                                        <input id="ld-empno" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">項目</label>
                                        <input id="ld-project" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="block text-gray-700 text-xs mb-1.5 font-medium">部門</label>
                                        <input id="ld-dept" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                                    </div>
                                </div>
                            </div>

                            <!-- 申請資訊 -->
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                                <div id="ld-section" class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">請假資訊</div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <div>
                                        <label id="ld-l1" class="block text-gray-700 text-xs mb-1.5 font-medium">單據類型</label>
                                        <input id="ld-type" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800">
                                    </div>
                                    <div>
                                        <label id="ld-l2" class="block text-gray-700 text-xs mb-1.5 font-medium">開始時間</label>
                                        <input id="ld-start" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800">
                                    </div>
                                    <div>
                                        <label id="ld-l3" class="block text-gray-700 text-xs mb-1.5 font-medium">結束時間</label>
                                        <input id="ld-end" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800">
                                    </div>
                                    <div>
                                        <label id="ld-l4" class="block text-gray-700 text-xs mb-1.5 font-medium">請假時數（小時／最小單位 0.5）</label>
                                        <input id="ld-hours" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800">
                                    </div>
                                </div>
                                <div>
                                    <label id="ld-l-reason" class="block text-gray-700 text-xs mb-1.5 font-medium">申請事由</label>
                                    <textarea id="ld-reason" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 h-20 resize-none cursor-not-allowed"></textarea>
                                </div>
                            </div>

                            <!-- 審批信息 -->
                            <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                                <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 px-6 py-3">審批信息</div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm whitespace-nowrap">
                                        <thead class="bg-[#F8F9FA] text-gray-500 text-xs">
                                            <tr>
                                                <th class="px-4 py-3 text-center">序號</th>
                                                <th class="px-4 py-3 text-center">狀態</th>
                                                <th class="px-4 py-3 text-center">條件</th>
                                                <th class="px-4 py-3 text-left">職稱</th>
                                                <th class="px-4 py-3 text-left">姓名</th>
                                                <th class="px-4 py-3 text-left">工號</th>
                                                <th class="px-4 py-3 text-left">審批日期</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-100">
                                            <tr>
                                                <td class="px-4 py-3 text-center font-bold text-gray-800">1</td>
                                                <td class="px-4 py-3 text-center"><span class="ui-badge ui-badge-success">已通過</span></td>
                                                <td class="px-4 py-3 text-center text-gray-500">串聯</td>
                                                <td class="px-4 py-3 text-gray-800">直屬主管</td>
                                                <td class="px-4 py-3 text-gray-800">-</td>
                                                <td class="px-4 py-3 text-gray-600 font-mono">-</td>
                                                <td class="px-4 py-3 text-gray-400">-</td>
                                            </tr>
                                            <tr>
                                                <td class="px-4 py-3 text-center font-bold text-gray-800">2</td>
                                                <td class="px-4 py-3 text-center"><span class="ui-badge ui-badge-warning">待審批</span></td>
                                                <td class="px-4 py-3 text-center text-gray-500">串聯</td>
                                                <td class="px-4 py-3 text-gray-800">人資審核</td>
                                                <td class="px-4 py-3 text-gray-800">-</td>
                                                <td class="px-4 py-3 text-gray-600 font-mono">-</td>
                                                <td class="px-4 py-3 text-gray-400">-</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>

                        <!-- 固定底部按鈕 (員工檢視，僅關閉) -->
                        <div class="bg-[#F8F9FA] border-t border-gray-200 px-6 py-4 flex justify-center gap-3 flex-shrink-0 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
                            <button onclick="closeLeaveDocModal()" class="ui-btn ui-btn-secondary">關閉</button>
                        </div>
                    </div>

                    <!-- 右側：審批線預覽 -->
                    <div class="w-full lg:w-[320px] bg-white border-t lg:border-t-0 lg:border-l border-gray-200 overflow-y-auto flex flex-col flex-shrink-0">
                        <div class="bg-[#0097A7] text-white px-4 py-3.5 font-bold text-sm tracking-wide">審批線預覽</div>
                        <div class="p-1 flex-1 overflow-y-auto">
                            <table class="w-full table-fixed text-xs text-center border-collapse">
                                <thead>
                                    <tr class="border-b border-gray-200 bg-gray-50 text-gray-500 font-bold">
                                        <th class="px-2 py-2 w-10 border-r border-gray-200">序號</th>
                                        <th class="px-2 py-2 border-r border-gray-200">職稱</th>
                                        <th class="px-2 py-2 w-12">簽名</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 font-semibold text-gray-700">
                                    <tr class="border-b border-gray-200">
                                        <td class="px-2 py-3 border-r border-gray-200 font-bold text-center text-gray-800">1</td>
                                        <td class="px-2 py-3 border-r border-gray-200 text-gray-500">直屬主管</td>
                                        <td class="px-2 py-3 text-center text-gray-400">-</td>
                                    </tr>
                                    <tr class="border-b border-gray-200">
                                        <td class="px-2 py-3 border-r border-gray-200 font-bold text-center text-gray-800">2</td>
                                        <td class="px-2 py-3 border-r border-gray-200 text-gray-500">人資審核</td>
                                        <td class="px-2 py-3 text-center text-gray-400">-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 初始化與渲染腳本 -->
    <script>
        // 目前登入員工（個人視角）
        const me = { id: "101334", name: "Alexander", dept: "RD", item: "GT" };

        // 個人出勤資料：日期、上/下班打卡、地點、方式、上/下班節點狀態（正常/遲到/早退/未打卡/進行中）
        let myAttendance = [
            { date: "2026-06-02", ci: "08:52", co: "--:--", loc: "台北總部辦公室", method: "WIFI", ciState: "正常", coState: "進行中" },
            { date: "2026-06-01", ci: "08:58", co: "18:05", loc: "台北總部辦公室", method: "WIFI", ciState: "正常", coState: "正常" },
            { date: "2026-05-29", ci: "09:05", co: "18:10", loc: "台北總部辦公室", method: "GPS",  ciState: "遲到", coState: "正常" },
            { date: "2026-05-28", ci: "08:45", co: "--:--", loc: "台北總部辦公室", method: "WIFI", ciState: "正常", coState: "未打卡", coMakeup: false },
            { date: "2026-05-26", ci: "08:50", co: "--:--", loc: "台北總部辦公室", method: "WIFI", ciState: "正常", coState: "未打卡" },
            { date: "2026-05-25", ci: "09:30", co: "17:30", loc: "信義門市",       method: "GPS",  ciState: "遲到", coState: "早退" }
        ];

        // 個人外出紀錄（與人資端「外出時間」欄資訊同步；同日多筆各自一列）
        const myOutings = [
            { date: "2026-06-01", outTime: "14:00", backTime: "16:30", reason: "拜訪客戶討論專案需求。", status: "已返回" },
            { date: "2026-05-29", outTime: "10:15", backTime: "", reason: "外出至供應商現場驗收。", status: "外出中" },
            { date: "2026-05-25", outTime: "13:40", backTime: "15:10", reason: "至客戶端進行系統部署。", status: "已返回" }
        ];

        // 外出時間欄：找出當日的所有外出紀錄，格式「外出時間-返回時間」，多筆各自一列；無則顯示 -
        function outingTimesCell(date) {
            const list = myOutings.filter(o => o.date === date);
            if (list.length === 0) return '<span class="text-gray-300">-</span>';
            return list.map(o => `<div class="font-mono text-gray-700 whitespace-nowrap">${o.outTime}-${o.backTime || '進行中'}</div>`).join('');
        }

        // 個人補卡單（出勤狀況欄會以單號呈現；完成=綠，其餘=紅/未審核）
        let myMakeupDocs = [
            { makeupDate: "2026-05-28", period: "下班打卡", time: "18:05", reason: "忘記打卡", appDate: "2026-05-29", desc: "下班忘記打卡，申請補卡。", status: "審批中" }
        ];
        // 個人請假 / 銷假單
        let myLeaveDocs = [
            { date: "2026-05-29", type: "請假", docNo: "假-20260529-022", status: "審批中" },
            { date: "2026-05-25", type: "請假", docNo: "假-20260525-009", status: "完成" }
        ];

        // 由上/下班節點推導出勤異常標籤（遲到 / 早退 / 缺卡），可同時並存
        function attStatusLabels(r) {
            const labels = [];
            if (r.ciState === '遲到') labels.push('遲到');
            if (r.coState === '早退') labels.push('早退');
            if (r.ciState === '未打卡' || r.coState === '未打卡') labels.push('缺卡');
            return [...new Set(labels)];
        }

        // 整體狀態徽章：正常 / 遲到 / 早退 / 缺卡（可並存）
        function statusBadgeHtml(r) {
            const uniq = attStatusLabels(r);
            if (uniq.length === 0) {
                return `<span class="ui-badge ui-badge-success"><i class="fa-solid fa-circle-check text-[10px]"></i>正常</span>`;
            }
            const cls = { '遲到': 'ui-badge-warning', '早退': 'ui-badge-warning', '缺卡': 'ui-badge-danger' };
            const icon = { '遲到': 'fa-clock', '早退': 'fa-person-walking-arrow-right', '缺卡': 'fa-circle-xmark' };
            return `<div class="flex flex-col items-center gap-1">` +
                uniq.map(l => `<span class="ui-badge ${cls[l]}"><i class="fa-solid ${icon[l]} text-[10px]"></i>${l}</span>`).join('') +
                `</div>`;
        }

        // 打卡時間呈現（補卡者加註）
        function fmtPunch(t, makeup) {
            if (t === '--:--') return t;
            return `${t}${makeup ? ' <span class="text-[10px] text-primary">(補)</span>' : ''}`;
        }

        // 出勤狀況欄：彙整當日的補卡 / 請假 / 銷假單號；綠=審核完成、紅=尚未審核完成，可點擊檢視
        function attendanceDocsCell(date) {
            const docs = [];
            myMakeupDocs.forEach(m => {
                if (m.makeupDate === date) docs.push({ no: `補-${date.replaceAll('-', '')}-${me.id.slice(-3)}`, done: m.status === '完成', label: '補卡' });
            });
            myLeaveDocs.forEach(l => {
                if (l.date === date) docs.push({ no: l.docNo, done: l.status === '完成', label: l.type });
            });
            if (docs.length === 0) return '<span class="text-gray-300">-</span>';
            return docs.map(d => `<button type="button" onclick="openLeaveDocModal('${date}','${d.no}','${d.label}')" class="font-mono font-semibold whitespace-nowrap hover:underline cursor-pointer ${d.done ? 'text-emerald-600' : 'text-red-500'}" title="${d.label}：${d.done ? '已審批' : '未審批'}（點擊檢視申請單）">${d.no}</button>`).join('<br>');
        }

        // 操作欄：當日有缺卡且尚未提出補卡 → 顯示「補卡」按鈕
        function actionCell(r) {
            const hasMissing = r.ciState === '未打卡' || r.coState === '未打卡';
            const hasMakeup = myMakeupDocs.some(m => m.makeupDate === r.date);
            if (hasMissing && !hasMakeup) {
                return `<button onclick="openMakeupApply('${r.date}')" class="ui-btn ui-btn-secondary ui-btn-sm">補卡</button>`;
            }
            return '<span class="text-gray-300">-</span>';
        }

        function renderTable(data) {
            const tbody = document.getElementById('attendance-tbody');
            const noDataView = document.getElementById('no-data-view');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.parentElement.classList.add('hidden');
                noDataView.classList.remove('hidden');
                document.getElementById('record-count-badge').innerText = `0 筆資料`;
                document.getElementById('pagination-info').innerText = `共 0 筆記錄`;
                return;
            }

            tbody.parentElement.classList.remove('hidden');
            noDataView.classList.add('hidden');

            data.forEach((r) => {
                const coClass = (r.co === '--:--' && r.coState === '未打卡') ? 'text-red-500 font-medium' : (r.co === '--:--' ? 'text-gray-400' : '');
                const timeCell = `
                    <div class="text-gray-700"><span class="text-[10px] text-gray-400 mr-1">上</span>${fmtPunch(r.ci, r.ciMakeup)}</div>
                    <div class="mt-0.5 ${coClass}"><span class="text-[10px] text-gray-400 mr-1">下</span>${fmtPunch(r.co, r.coMakeup)}</div>`;

                const locText = `${r.loc}（${r.method}）`;
                const outLine = r.co === '--:--'
                    ? `<div class="flex items-center gap-1 mt-0.5"><span class="text-[10px] text-gray-400 shrink-0">下</span><span class="text-gray-300">—</span></div>`
                    : `<div class="flex items-center gap-1 max-w-[200px] mt-0.5" title="下班打卡地點：${locText}"><span class="text-[10px] text-gray-400 shrink-0">下</span><span class="truncate min-w-0">${r.loc}</span><span class="text-gray-400 text-xs shrink-0">(${r.method})</span></div>`;
                const locCell = `
                    <div class="flex items-center gap-1 max-w-[200px]" title="上班打卡地點：${locText}"><span class="text-[10px] text-gray-400 shrink-0">上</span><span class="truncate min-w-0">${r.loc}</span><span class="text-gray-400 text-xs shrink-0">(${r.method})</span></div>
                    ${outLine}`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/70 transition-colors";
                tr.innerHTML = `
                    <td class="text-primary font-bold">${r.date}</td>
                    <td class="text-left">${timeCell}</td>
                    <td class="text-left">${outingTimesCell(r.date)}</td>
                    <td class="text-left">${locCell}</td>
                    <td class="text-left">${attendanceDocsCell(r.date)}</td>
                    <td>${statusBadgeHtml(r)}</td>
                    <td>${actionCell(r)}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('record-count-badge').innerText = `${data.length} 筆資料`;
            document.getElementById('pagination-info').innerText = `共 ${data.length} 筆記錄`;
        }

        // 篩選：出勤狀態 + 日期區間
        function applyFilters() {
            const status = document.getElementById('att-status').value;
            const start = document.getElementById('date-start').value;
            const end = document.getElementById('date-end').value;
            const filtered = myAttendance.filter(r => {
                const labels = attStatusLabels(r);
                const statusOk = status === 'all'
                    ? true
                    : (status === '正常' ? labels.length === 0 : labels.includes(status));
                const dateOk = (!start || r.date >= start) && (!end || r.date <= end);
                return statusOk && dateOk;
            });
            renderTable(filtered);
        }

        function resetFilters() {
            document.getElementById('att-status').value = 'all';
            document.getElementById('date-start').value = '';
            document.getElementById('date-end').value = '';
            setQuickActive(null);
            renderTable(myAttendance);
        }

        // 本週 / 本月 快速區間（示意）
        function setQuickActive(which) {
            const w = document.getElementById('btn-week');
            const m = document.getElementById('btn-month');
            [w, m].forEach(b => { b.classList.remove('ui-btn-primary'); b.classList.add('ui-btn-secondary'); });
            if (which === 'week') { w.classList.add('ui-btn-primary'); w.classList.remove('ui-btn-secondary'); }
            if (which === 'month') { m.classList.add('ui-btn-primary'); m.classList.remove('ui-btn-secondary'); }
        }
        function quickRange(which) {
            setQuickActive(which);
            applyFilters();
        }

        // 通用：填入並開啟「申請單」彈窗
        function fillSignDocModal(cfg) {
            document.getElementById('ld-title').textContent = cfg.title;
            document.getElementById('ld-section').textContent = cfg.section;
            document.getElementById('ld-docno').value = cfg.docNo || '-';
            document.getElementById('ld-appdate').value = cfg.appDate || '-';
            document.getElementById('ld-name').value = cfg.name || '-';
            document.getElementById('ld-empno').value = cfg.empNo || '-';
            document.getElementById('ld-project').value = cfg.project || 'GT';
            document.getElementById('ld-dept').value = cfg.dept || '-';
            const ids = ['ld-type', 'ld-start', 'ld-end', 'ld-hours'];
            const labelIds = ['ld-l1', 'ld-l2', 'ld-l3', 'ld-l4'];
            cfg.fields.forEach((f, i) => {
                document.getElementById(labelIds[i]).textContent = f.label;
                document.getElementById(ids[i]).value = (f.value === undefined || f.value === null || f.value === '') ? '-' : f.value;
            });
            document.getElementById('ld-l-reason').textContent = cfg.reasonLabel || '申請事由';
            document.getElementById('ld-reason').value = cfg.reason || '';
            document.getElementById('leavedoc-modal').classList.remove('hidden');
        }
        function closeLeaveDocModal() {
            document.getElementById('leavedoc-modal').classList.add('hidden');
        }

        // 點擊出勤狀況單號 → 開啟對應申請單彈窗
        function openLeaveDocModal(date, no, label) {
            if (label === '補卡') {
                const m = myMakeupDocs.find(x => x.makeupDate === date) || {};
                fillSignDocModal({
                    title: '補卡申請單 (T)', section: '補卡資訊',
                    docNo: no, appDate: m.appDate || date, name: me.name, empNo: me.id, project: me.item, dept: me.dept,
                    fields: [
                        { label: '種類', value: m.reason },
                        { label: '時段', value: m.period },
                        { label: '補打卡時間', value: m.time },
                        { label: '提交日期', value: m.appDate },
                    ],
                    reasonLabel: '補卡說明',
                    reason: m.desc || ''
                });
            } else {
                fillSignDocModal({
                    title: `${label}申請單 (A)`, section: `${label}資訊`,
                    docNo: no, appDate: date, name: me.name, empNo: me.id, project: me.item, dept: me.dept,
                    fields: [
                        { label: '單據類型', value: label },
                        { label: '開始時間', value: `${date} 09:00` },
                        { label: '結束時間', value: `${date} 18:00` },
                        { label: '請假時數（小時／最小單位 0.5）', value: '8.0 小時' },
                    ],
                    reasonLabel: '申請事由',
                    reason: '依個人需求提出申請，相關證明文件如附件。'
                });
            }
        }

        // 新增補卡申請彈窗（背景維持出勤紀錄列表，不跳轉頁面）
        const makeupApplyModal = document.getElementById('makeup-apply-modal');
        const makeupApplyPanel = document.getElementById('makeupApplyPanel');
        function openMakeupApply(date) {
            const dateInput = document.getElementById('makeup-apply-date');
            if (dateInput) dateInput.value = date || '';
            makeupApplyModal.classList.remove('hidden');
            setTimeout(() => makeupApplyPanel.classList.add('modal-enter-active'), 10);
            document.body.style.overflow = 'hidden';
        }
        function closeMakeupApply() {
            makeupApplyPanel.classList.remove('modal-enter-active');
            setTimeout(() => {
                makeupApplyModal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 200);
        }
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !makeupApplyModal.classList.contains('hidden')) closeMakeupApply();
        });

        // 初始化
        renderTable(myAttendance);
        lucide.createIcons();
    </script>
</body>
</html>
