<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時審核線編輯 - 系統管理</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 用於圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 設定 Tailwind 自訂主題 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2', // 主色調：紫色
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB', // 背景淺灰色
                        card: '#FFFFFF',
                        text: {
                            main: '#1F2937',
                            muted: '#6B7280',
                            light: '#9CA3AF'
                        },
                        status: {
                            manager: '#DBEAFE',   // 主管類別
                            staff: '#D1FAE5',     // 一般類別
                            text: {
                                manager: '#2563EB',
                                staff: '#059669'
                            }
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            font-family: theme('fontFamily.sans');
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <div class="flex items-center gap-3">
                <h1 class="ui-page-title">即時審核線編輯</h1>
            </div>
            
            <!-- 操作按鈕區 -->
            <div class="flex gap-4">
                <button onclick="openModal()" class="ui-btn ui-btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    新增資料
                </button>
            </div>
        </header>

        <!-- 列表區塊 (卡片樣式) -->
        <section class="ui-card p-6">
            
            <!-- 列表工具列 (查詢條件：工號、姓名、職務名稱) -->
            <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 border-b border-gray-100 pb-6">
                
                <!-- 篩選條件群組 -->
                <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                    <!-- 工號查詢 -->
                    <div class="ui-search w-full lg:w-40">
                        <i class="fa-regular fa-id-badge"></i>
                        <input type="text" placeholder="工號" class="ui-input ui-search-input">
                    </div>

                    <!-- 姓名查詢 -->
                    <div class="ui-search w-full lg:w-40">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="姓名" class="ui-input ui-search-input">
                    </div>

                    <!-- 職務名稱查詢 -->
                    <div class="ui-search w-full lg:w-48">
                        <i class="fa-solid fa-briefcase"></i>
                        <input type="text" placeholder="職務名稱" class="ui-input ui-search-input">
                    </div>

                    <button class="ui-btn ui-btn-secondary">
                        查詢
                    </button>
                </div>
            </div>

            <!-- 表格容器 -->
            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table whitespace-nowrap">
                    <thead>
                        <tr>
                            <th scope="col">
                                <div class="flex items-center gap-2 cursor-pointer hover:text-gray-700">
                                    工號 <i class="fa-solid fa-arrow-down-1-9 text-xs text-gray-400"></i>
                                </div>
                            </th>
                            <th scope="col">姓名</th>
                            <th scope="col">職務代碼</th>
                            <th scope="col">職務類型</th>
                            <th scope="col">職務名稱</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                        <!-- 資料列 1 -->
                        <tr>
                            <td class="font-semibold">EMP001</td>
                            <td class="font-medium">王大明</td>
                            <td>MGR-01</td>
                            <td>
                                <span class="ui-badge ui-badge-info">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>管理職
                                </span>
                            </td>
                            <td>部門經理</td>
                            <td class="text-center">
                                <div class="flex items-center justify-center gap-2">
                                    <button onclick="deleteRow(this)" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50" title="刪除"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                                </div>
                            </td>
                        </tr>

                        <!-- 資料列 2 -->
                        <tr>
                            <td class="font-semibold">EMP002</td>
                            <td class="font-medium">林小美</td>
                            <td>HR-02</td>
                            <td>
                                <span class="ui-badge ui-badge-success">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>幕僚職
                                </span>
                            </td>
                            <td>資深人資專員</td>
                            <td class="text-center">
                                <div class="flex items-center justify-center gap-2">
                                    <button onclick="deleteRow(this)" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50" title="刪除"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                                </div>
                            </td>
                        </tr>

                        <!-- 資料列 3 -->
                        <tr>
                            <td class="font-semibold">EMP003</td>
                            <td class="font-medium">陳建國</td>
                            <td>ENG-05</td>
                            <td>
                                <span class="ui-badge ui-badge-success">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>一般職
                                </span>
                            </td>
                            <td>系統工程師</td>
                            <td class="text-center">
                                <div class="flex items-center justify-center gap-2">
                                    <button onclick="deleteRow(this)" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50" title="刪除"><i class="fa-solid fa-trash-can"></i> 刪除</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分頁區塊 -->
            <div class="flex flex-col sm:flex-row items-center justify-between mt-6 pt-4 border-t border-gray-100 gap-4">
                <span class="text-sm text-gray-500">顯示第 1 到 3 筆，共 3 筆資料</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn" disabled>上一頁</button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn">下一頁</button>
                </div>
            </div>

        </section>

    </div>

    <!-- 新增/編輯彈窗 (Modal) -->
    <div id="dataModal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- 背景遮罩 -->
        <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity opacity-0" id="modalBackdrop" onclick="closeModal()"></div>

        <!-- 彈窗內容容器 -->
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-6">
                
                <!-- 彈窗主體 -->
                <div id="modalPanel" class="relative transform overflow-hidden rounded-xl bg-gray-50 text-left shadow-2xl transition-all w-full max-w-5xl opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95 flex flex-col">
                    
                    <!-- 標題區塊 -->
                    <div class="sticky top-0 z-20 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                        <h2 class="text-lg font-bold text-gray-800" id="modal-title">新增</h2>
                        <button type="button" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded p-1 transition-colors" onclick="closeModal()">
                            <i class="fa-solid fa-xmark text-xl w-6 h-6 flex items-center justify-center"></i>
                        </button>
                    </div>

                    <!-- 彈窗表單內容 (左右分欄) -->
                    <div class="p-6 bg-white flex-1">
                        <div class="flex flex-col md:flex-row gap-6 min-h-[450px]">
                            
                            <!-- 左側：成員列表 -->
                            <div class="w-full md:w-1/3 flex flex-col border border-gray-200 rounded">
                                <div class="px-4 py-3 border-b border-gray-200 bg-[#f8f9fa]">
                                    <h3 class="text-blue-600 font-bold text-sm tracking-wide">成員</h3>
                                </div>
                                <div class="p-3 flex-1 flex flex-col gap-2 overflow-y-auto">
                                    <input type="text" placeholder="請輸入關鍵詞" class="ui-input mb-1">
                                    
                                    <div class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors">1 (1)</div>
                                    <div class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors">100003 (aaaaaa )</div>
                                    <div class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors">100004 (bbbbbb )</div>
                                    <div class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors">100005 (cccccccc )</div>
                                </div>
                            </div>

                            <!-- 右側：已選成員清單 -->
                            <div class="w-full md:w-2/3 flex flex-col border border-gray-200 rounded">
                                <div class="px-4 py-3 border-b border-gray-200 bg-[#f8f9fa]">
                                    <h3 class="text-blue-600 font-bold text-sm tracking-wide">即時審核線編輯成員</h3>
                                </div>
                                <div class="p-0 flex-1 overflow-x-auto">
                                    <table class="ui-table text-center">
                                        <thead>
                                            <tr>
                                                <th class="text-center w-[180px]">職務代碼*</th>
                                                <th class="text-center">職務名稱</th>
                                                <th class="text-center">職務類型</th>
                                                <th class="text-center">工號</th>
                                                <th class="w-12"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>
                                                    <button class="bg-[#16a34a] text-white px-3 py-1.5 rounded text-sm w-full flex items-center justify-between font-medium hover:bg-green-700 transition-colors">
                                                        ALL-DOM <i class="fa-solid fa-caret-down text-xs"></i>
                                                    </button>
                                                </td>
                                                <td>域名管理</td>
                                                <td>special</td>
                                                <td>100003</td>
                                                <td class="text-center">
                                                    <button class="w-6 h-6 inline-flex items-center justify-center bg-primary text-white rounded shadow-sm hover:bg-primary/90 transition-colors">
                                                        <i class="fa-solid fa-xmark text-[10px]"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 彈窗底部按鈕 -->
                    <div class="bg-white border-t border-gray-200 px-6 py-4 flex justify-end gap-3 rounded-b-xl">
                        <button type="button" class="ui-btn ui-btn-primary" onclick="closeModal()">
                            保存
                        </button>
                        <button type="button" class="ui-btn ui-btn-secondary" onclick="closeModal()">
                            取消
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 腳本控制彈窗動畫與刪除功能 -->
    <script>
        // 打開彈窗的漸變動畫邏輯
        function openModal() {
            const modal = document.getElementById('dataModal');
            const backdrop = document.getElementById('modalBackdrop');
            const modalPanel = document.getElementById('modalPanel');
            
            modal.classList.remove('hidden');
            void modal.offsetWidth; // 強制瀏覽器重繪
            
            backdrop.classList.remove('opacity-0');
            backdrop.classList.add('opacity-100');
            
            modalPanel.classList.remove('opacity-0', 'translate-y-4', 'sm:translate-y-0', 'sm:scale-95');
            modalPanel.classList.add('opacity-100', 'translate-y-0', 'sm:scale-100');
        }

        // 關閉彈窗的漸變動畫邏輯
        function closeModal() {
            const modal = document.getElementById('dataModal');
            const backdrop = document.getElementById('modalBackdrop');
            const modalPanel = document.getElementById('modalPanel');
            
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0');
            
            modalPanel.classList.remove('opacity-100', 'translate-y-0', 'sm:scale-100');
            modalPanel.classList.add('opacity-0', 'translate-y-4', 'sm:translate-y-0', 'sm:scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // 刪除表格列邏輯 (僅做前端視覺展示用)
        function deleteRow(btn) {
            // 使用自訂的 Modal 而不是原生的 confirm()
            // 這裡為了方便展示，暫時使用 confirm()，如果您需要客製化的確認視窗，可以再加入一個新的 Modal
            if(confirm("確定要刪除這筆資料嗎？")) {
                const row = btn.closest('tr');
                row.style.transition = "opacity 0.3s ease";
                row.style.opacity = "0";
                setTimeout(() => {
                    row.remove();
                }, 300);
            }
        }
    </script>

</body>
</html>
