<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的申請</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 供瀏覽器即時編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link rel="stylesheet" href="shared-ui.css">
  <style>
    .approve-editor:empty:before { content: attr(data-placeholder); color:#9CA3AF; pointer-events:none; }
  </style>
</head>
<body class="">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示 SVG 元件 ---
    const IconBase = ({ size = 24, strokeWidth = 2, children, className = '', ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Calendar = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
    const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>;
    const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"></polyline></IconBase>;
    const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;
    const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconBase>;

    // --- 自訂日期選取器 (DatePicker) 元件 ---
    const DatePickerDropdown = ({ isOpen, onToggle, value, onChange, placeholder }) => {
      const [viewDate, setViewDate] = useState(value ? new Date(value) : new Date());

      useEffect(() => {
        if (isOpen && value) {
          setViewDate(new Date(value));
        }
      }, [isOpen, value]);

      const formatDate = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };

      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const days = [];
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

      return (
        <div className="relative">
          <div
            onClick={onToggle}
            className={`flex items-center bg-white border rounded px-3 py-1.5 shadow-sm cursor-pointer transition-colors ${
              isOpen ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
            }`}
          >
            <Calendar size={15} className="text-gray-400 mr-2 flex-shrink-0" />
            <input
              type="text"
              className="w-24 outline-none text-sm text-gray-700 cursor-pointer bg-transparent pointer-events-none"
              placeholder={placeholder}
              value={value}
              readOnly
            />
          </div>
          
          {isOpen && (
            <div className="absolute top-full mt-1 left-0 bg-white border border-gray-200 rounded shadow-lg z-50 p-4 w-[280px]" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="rotate-90" />
                </button>
                <span className="text-[15px] font-semibold text-gray-800">{year}年 {month + 1}月</span>
                <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1 hover:bg-gray-100 rounded text-gray-500 transition-colors">
                  <ChevronDown size={18} className="-rotate-90" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-2 font-medium">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-sm">
                {days.map((d, i) => {
                  const dateStr = d ? formatDate(d) : '';
                  const isSelected = value === dateStr;
                  const isToday = d && formatDate(d) === formatDate(new Date());
                  
                  return (
                    <div
                      key={i}
                      onClick={() => {
                        if (d) {
                          onChange(isSelected ? '' : dateStr);
                          if (!isSelected) onToggle();
                        }
                      }}
                      className={`
                        py-1 rounded transition-colors
                        ${!d ? 'pointer-events-none' : 'cursor-pointer'}
                        ${isSelected ? 'bg-[#4A90E2] text-white font-medium shadow-sm' : 
                          d ? 'hover:bg-gray-100 text-gray-700' : ''}
                        ${!isSelected && isToday ? 'text-[#4A90E2] font-bold' : ''}
                      `}
                    >
                      {d ? d.getDate() : ''}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- 主程式元件 ---
    const App = () => {
      // 頁籤狀態
      const tabs = ['申請中', '臨時保存', '模板保存'];
      const [activeTab, setActiveTab] = useState('申請中');

      // 費用詳情彈窗控制狀態
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalRow, setModalRow] = useState(null); // 記住點擊編號的列，供彈窗判斷
      const [showOpinions, setShowOpinions] = useState(false);
      const [withdrawConfirmItem, setWithdrawConfirmItem] = useState(null);

      // --- 查詢資料 ---
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [openDropdown, setOpenDropdown] = useState(null);

      // 電子表單：篩選器設定 (以申請人狀態為主)
      const filterConfigs = [
        { id: 'status', label: '狀態', type: 'multi', options: ['草稿', '待簽核', '簽核完成', '撤回', '駁回', '待補件'] },
        { id: 'oa', label: 'OA 類型', type: 'multi', options: ['商務', '合同', '財務', '行政', 'PMO'] },
        { id: 'project', label: '項目', type: 'multi', options: ['GT'] },
        { id: 'location', label: '地點', type: 'multi', options: ['T1', 'T2', 'THQ', 'T3', 'T4'] },
        { id: 'docType', label: '單據類型', type: 'multi', options: ['新增資產申請 (ASSETS)', '費用申請單 (B)', '商務公告(BU)', '費用報銷單 (C)', '內部合同審批單 (IC)'] },
      ];

      // 請假/補卡申請：專屬篩選器設定
      const ltFilterConfigs = [
        { id: 'ltStatus', label: '狀態', type: 'multi', options: ['待簽核', '簽核完成', '駁回', '撤回'] },
        { id: 'ltProject', label: '項目', type: 'multi', options: ['GT'] },
      ];

      // 統一狀態管理
      const [selectedFilters, setSelectedFilters] = useState({
        status: ['待簽核'], // 預設選中
        oa: [], project: [], location: [], docType: [],
        ltStatus: [], ltProject: []
      });

      const toggleFilterOption = (filterId, option) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (Array.isArray(currentSelected)) {
            if (currentSelected.includes(option)) {
              return { ...prev, [filterId]: currentSelected.filter(item => item !== option) };
            } else {
              return { ...prev, [filterId]: [...currentSelected, option] };
            }
          } else {
            return { ...prev, [filterId]: option };
          }
        });
      };

      const toggleSelectAll = (filterId, options) => {
        setSelectedFilters(prev => {
          const currentSelected = prev[filterId];
          if (currentSelected.length === options.length) {
            return { ...prev, [filterId]: [] }; 
          } else {
            return { ...prev, [filterId]: [...options] }; 
          }
        });
      };

      const removeFilterOption = (filterId, option, e) => {
        e.stopPropagation();
        toggleFilterOption(filterId, option);
      };

      // 共用：篩選列渲染函數
      const renderFilterBar = (configs) => (
        <div className="bg-[#F8F9FB] p-3 rounded border border-gray-200 flex flex-wrap gap-4 items-center">
          {configs.map((filter) => (
            <div key={filter.id} className={`flex items-center gap-2 flex-1 min-w-[180px] ${filter.id === 'docType' || filter.id === 'status' || filter.id === 'ltStatus' ? 'md:col-span-2 lg:min-w-[280px]' : ''}`}>
              <span className="whitespace-nowrap text-xs text-gray-600 font-medium w-16 text-right">{filter.label}</span>
              <div className="relative flex-1">
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setOpenDropdown(openDropdown === filter.id ? null : filter.id);
                  }}
                  className={`w-full flex items-center justify-between bg-white border rounded px-2.5 py-1.5 text-[13px] transition-colors shadow-sm min-h-[32px] ${
                    openDropdown === filter.id ? 'border-[#4A90E2] ring-1 ring-[#4A90E2]' : 'border-gray-300 hover:border-[#4A90E2]'
                  }`}
                >
                  <div className="flex-1 flex flex-wrap gap-1 items-center overflow-hidden">
                    {filter.type === 'single' ? (
                      <span className="text-gray-700 truncate">{selectedFilters[filter.id]}</span>
                    ) : selectedFilters[filter.id].length > 0 ? (
                      selectedFilters[filter.id].map(opt => (
                        <span key={opt} className="inline-flex items-center gap-1 bg-[#F0F2F5] text-gray-700 px-1.5 py-0.5 rounded-sm text-[11px] border border-gray-200 max-w-full">
                          <span className="truncate">{opt}</span>
                          <div 
                            onClick={(e) => removeFilterOption(filter.id, opt, e)} 
                            className="hover:text-red-500 hover:bg-gray-200 rounded-full p-0.5 transition-colors cursor-pointer flex-shrink-0"
                          >
                            <X size={10} strokeWidth={2} />
                          </div>
                        </span>
                      ))
                    ) : (
                      <span className="text-gray-700">全部</span>
                    )}
                  </div>
                  <ChevronDown size={14} className={`text-gray-400 transition-transform flex-shrink-0 ml-1.5 ${openDropdown === filter.id ? 'rotate-180' : ''}`} />
                </button>

                {/* 下拉選單內容 */}
                {openDropdown === filter.id && (
                  <div 
                    className={`absolute top-full mt-1 left-0 w-full min-w-[200px] bg-white border border-gray-200 rounded shadow-lg z-50 py-1 ${filter.id === 'docType' || filter.id === 'status' || filter.id === 'ltStatus' ? 'md:w-[350px]' : ''}`}
                    onClick={(e) => e.stopPropagation()}
                  >
                    {filter.type === 'single' ? (
                      <div className="max-h-60 overflow-y-auto">
                        {filter.options.map(opt => (
                          <div 
                            key={opt} 
                            onClick={() => {
                              toggleFilterOption(filter.id, opt);
                              setOpenDropdown(null);
                            }}
                            className={`px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-[13px] transition-colors ${selectedFilters[filter.id] === opt ? 'text-[#4A90E2] bg-[#F5F7FA] font-medium' : 'text-gray-700'}`}
                          >
                            {opt}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="flex flex-col">
                        <div 
                          onClick={() => toggleSelectAll(filter.id, filter.options)}
                          className="px-3 py-1.5 text-[13px] text-[#4CAF50] font-medium cursor-pointer hover:bg-gray-50 transition-colors"
                        >
                          Select All
                        </div>
                        <div className="h-px bg-gray-100 my-1"></div>
                        <div className="max-h-48 overflow-y-auto">
                          {filter.options.map(opt => (
                            <label key={opt} className="flex items-center px-3 py-1.5 hover:bg-gray-50 cursor-pointer gap-2.5">
                              <input 
                                type="checkbox" 
                                checked={selectedFilters[filter.id].includes(opt)}
                                onChange={() => toggleFilterOption(filter.id, opt)}
                                className="w-3.5 h-3.5 rounded border-gray-300 text-[#4A90E2] focus:ring-[#4A90E2]" 
                              />
                              <span className="text-[13px] text-gray-700">{opt}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      );

      // 共用：搜尋與日期列渲染函數
      const renderSearchBar = () => (
        <div className="flex flex-wrap items-center justify-between gap-4 pb-2">
          <div className="flex flex-1 min-w-[200px] max-w-md gap-3">
            <div className="ui-search flex-1">
              <Search size={14} className="text-gray-400" />
              <input
                type="text"
                placeholder="請輸入關鍵字"
                className="ui-input ui-search-input"
              />
            </div>
          </div>
          
          <div className="flex flex-wrap items-center gap-1.5">
            <DatePickerDropdown 
              isOpen={openDropdown === 'startDate'}
              onToggle={(e) => {
                if(e) e.stopPropagation();
                setOpenDropdown(openDropdown === 'startDate' ? null : 'startDate');
              }}
              value={startDate}
              onChange={setStartDate}
              placeholder="開始日期"
            />
            <span className="text-gray-400 text-sm">~</span>
            <DatePickerDropdown 
              isOpen={openDropdown === 'endDate'}
              onToggle={(e) => {
                if(e) e.stopPropagation();
                setOpenDropdown(openDropdown === 'endDate' ? null : 'endDate');
              }}
              value={endDate}
              onChange={setEndDate}
              placeholder="結束日期"
            />

            <button className="ui-btn ui-btn-primary ml-2">
              搜尋
            </button>
            <button
              onClick={() => {
                setStartDate('');
                setEndDate('');
              }}
              className="ui-btn ui-btn-secondary"
            >
              重設
            </button>
            <button className="ui-btn ui-btn-secondary ml-1">
              匯出 Excel
            </button>
          </div>
        </div>
      );

      // 由「申請.html」送出、暫存於 localStorage 的單據（預設簽核完成）
      const storedApps = (() => {
        try {
          return (JSON.parse(localStorage.getItem('hroa_apps') || '[]')).map(r => ({
            oa: r.oa, location: r.location, type: r.type, docNo: r.docNo,
            title: r.title || r.docNo, applicant: r.applicant, amounts: r.amounts || ['—'],
            date: r.date, approver: r.approver || '-', refNo: r.refNo || '-',
            status: r.status || '簽核完成', workStatus: r.workStatus || '未派工', urgent: !!r.urgent
          }));
        } catch (e) { return []; }
      })();

      // 電子表單假資料 (包含不同狀態)
      const allMockData = [
        ...storedApps,
        { oa: '行政', location: 'THQ', type: 'HR', docNo: 'HR-THQ-000007', title: '人員帳號異動申請', applicant: 'Nick', amounts: ['—'], date: '2026-06-13 10:00:00', approver: 'James', refNo: '-', status: '待簽核', kind: 'account' , workStatus: '未派工' },
        { oa: '財務', location: 'THQ', type: 'B',  docNo: 'B-THQ-000003',  title: 'B-THQ-000003',  applicant: 'Nick', amounts: ['TWD 8,000', 'CNY 2137.09'],        date: '2026-05-30 15:36:45', approver: 'James', refNo: '-', status: '待簽核' , workStatus: '未派工' },
        { oa: '合同', location: 'THQ', type: 'IC', docNo: 'IC-THQ-000002', title: 'IC-THQ-000002', applicant: 'Nick', amounts: ['TWD 2,000,000', 'CNY 427407.40'], date: '2026-05-20 15:36:45', approver: 'James', refNo: '-', status: '簽核完成' , workStatus: '已完成' },
        { oa: '行政', location: 'THQ', type: 'PU', docNo: 'PU-THQ-000003', title: 'PU-THQ-000003', applicant: 'Nick', amounts: ['TWD 8,000', 'CNY 2137.09'],        date: '2026-05-12 15:36:45', approver: 'James', refNo: '-', status: '簽核完成' , workStatus: '未派工', urgent: true },
        { oa: '行政', location: 'THQ', type: 'PU', docNo: 'PU-THQ-000002', title: 'PU-THQ-000002', applicant: 'Nick', amounts: ['TWD 2,000,000', 'CNY 427407.40'], date: '2026-04-30 12:36:10', approver: 'James', refNo: '-', status: '簽核完成' , workStatus: '處理中' },
        { oa: '財務', location: 'THQ', type: 'C',  docNo: 'C-THQ-000001',  title: 'C-THQ-000001',  applicant: 'Nick', amounts: ['TWD 2,000', 'CNY 451.47'],          date: '2026-04-26 19:00:45', approver: 'James', refNo: '-', status: '待簽核' , workStatus: '未派工' },
        { oa: '行政', location: 'THQ', type: 'PU', docNo: 'PU-THQ-000001', title: 'PU-THQ-000001', applicant: 'Nick', amounts: ['TWD 2,000', 'CNY 451.47'],          date: '2026-04-25 19:00:45', approver: 'James', refNo: '-', status: '簽核完成' , workStatus: '已完成' },
        // 臨時保存的資料
        { oa: '財務', location: 'THQ', type: 'C', docNo: 'C-THQ-000001', title: 'C-THQ-000001', applicant: 'Nick', amounts: ['TWD 2,000', 'CNY 451.47'], date: '2026-06-26 09:00:00', approver: '-', refNo: '-', status: '草稿' },
        { oa: '行政', location: 'T2', type: 'SA', title: 'T2-用印申請-草稿', applicant: 'Nick', amounts: ['0'], date: '2026-05-27 10:00:00', approver: '-', refNo: '-', status: '草稿' },
        // 模板保存的資料
        { oa: '財務', location: 'T1', type: 'B', title: '出差旅費報銷模板', applicant: 'Nick', amounts: ['0'], date: '2026-05-20 09:00:00', approver: '-', refNo: '-', status: '模板' },
      ];

      // 費用報銷明細「目的（科目）→ 科目（子科目）」階層清單
      const expenseCategories = [
        { id: '5-1000', name: '运营费用', children: [{ id: '5-1000-01', name: 'BU3客服费' }, { id: '5-1000-02', name: '供应商帐单' }, { id: '5-1000-03', name: '其他运营费' }, { id: '5-1000-04', name: '加速费' }, { id: '5-1000-05', name: '域名' }, { id: '5-1000-06', name: '平台充值费' }, { id: '5-1000-07', name: '广告&行销费' }, { id: '5-1000-08', name: '服务器费用' }, { id: '5-1000-09', name: '牌照费' }, { id: '5-1000-10', name: '监控软件' }, { id: '5-1000-11', name: '美术、测试、技术' }, { id: '5-1000-12', name: '运维' }] },
        { id: '6-2100', name: '招待费', children: [{ id: '6-2100-01', name: '招待_住宿' }, { id: '6-2100-02', name: '招待_机票' }, { id: '6-2100-03', name: '招待_送礼' }, { id: '6-2100-04', name: '招待_餐费' }, { id: '6-2100-05', name: '招待_其他' }, { id: '6-2100-06', name: '招待_交通' }] },
        { id: '6-6300', name: '差旅费', children: [{ id: '6-6300-01', name: '差旅_交通费' }, { id: '6-6300-02', name: '差旅_住宿费' }, { id: '6-6300-03', name: '差旅_机票费' }, { id: '6-6300-04', name: '差旅_其他费' }, { id: '6-6300-05', name: '差旅_餐补' }, { id: '6-6300-06', name: '旅游签证费' }] },
        { id: '6-1100', name: '人力成本', children: [{ id: '6-1100-01', name: '13薪' }, { id: '6-1100-02', name: '其他奖金' }, { id: '6-1100-03', name: 'KPI绩效' }, { id: '6-1100-04', name: '员工保险费' }, { id: '6-1100-05', name: '员工税费' }, { id: '6-1100-06', name: '薪资' }] },

                                showOpinions ? 'bg-[#3F51B5]' : 'bg-gray-300'
                              }`}
                            >
                              <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                                showOpinions ? 'translate-x-6' : 'translate-x-1'
                              }`} />
                            </button>
                          </div>
                          )}
                        </div>

                        <div className="p-6 space-y-6">
                          {modalRow?.docNo === 'C-THQ-000001' ? (
                            /* C-THQ-000001：依「進度追蹤C」文件呈現審批節點表格 */
                            <div className="overflow-x-auto border border-gray-100 rounded-lg">
                              <table className="w-full text-left text-xs border-collapse whitespace-nowrap">
                                <thead>
                                  <tr className="border-b border-gray-200 bg-gray-50 text-gray-700 font-bold">
                                    <th className="px-3 py-1.5 text-center w-12">序號</th>
                                    {modalRow?.status !== '草稿' && <th className="px-3 py-1.5 text-center w-20">審批狀態</th>}
                                    <th className="px-3 py-1.5 text-center w-14">條件</th>
                                    <th className="px-3 py-1.5 w-20">級別</th>
                                    <th className="px-3 py-1.5">職稱</th>
                                    <th className="px-3 py-1.5">簽名</th>
                                    <th className="px-3 py-1.5">ID</th>
                                    {modalRow?.status !== '草稿' && <th className="px-3 py-1.5 w-40">審批時間</th>}
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 font-medium">
                                  {progressCSteps.map((s) => (
                                    <tr key={s.seq}>
                                      <td className="px-3 py-1.5 text-center font-bold text-gray-800">{s.seq}</td>
                                      {modalRow?.status !== '草稿' && (
                                        <td className="px-3 py-1.5 text-center">
                                          <span className={`ui-badge ${s.status === '審批中' ? 'ui-badge-info' : 'ui-badge-success'}`}>{s.status}</span>
                                        </td>
                                      )}
                                      <td className="px-3 py-1.5 text-center text-gray-500">{s.cond}</td>
                                      <td className="px-3 py-1.5 text-gray-500">{s.level}</td>
                                      <td className="px-3 py-1.5 text-gray-800">{s.title}</td>
                                      <td className="px-3 py-1.5 text-gray-800">{s.sign}</td>
                                      <td className="px-3 py-1.5 text-gray-600 font-mono">{s.id}</td>
                                      {modalRow?.status !== '草稿' && <td className="px-3 py-1.5 text-gray-400">{s.time || '-'}</td>}
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          ) : (
                          /* 橫向審批進度條（從左到右） */
                          <div className="flex items-start">
                            <div className="flex flex-col items-center text-center w-28">
                              <div className="w-9 h-9 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm font-bold">✓</div>
                              <div className="mt-2 text-xs font-bold text-gray-800 whitespace-nowrap">提交申請</div>
                              <div className="text-[11px] text-gray-400 whitespace-nowrap">Nick</div>
                            </div>
                            <div className="flex-1 h-0.5 bg-emerald-500 mt-[18px] mx-1"></div>
                            <div className="flex flex-col items-center text-center w-28">
                              <div className="w-9 h-9 rounded-full bg-[#4A90E2] text-white flex items-center justify-center text-sm font-bold ring-4 ring-blue-100">2</div>
                              <div className="mt-2 text-xs font-bold text-[#4A90E2] whitespace-nowrap">部門主管</div>
                              <div className="text-[11px] text-gray-400 whitespace-nowrap">James · 審批中</div>
                            </div>
                            <div className="flex-1 h-0.5 bg-gray-200 mt-[18px] mx-1"></div>
                            <div className="flex flex-col items-center text-center w-28">
                              <div className="w-9 h-9 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">3</div>
                              <div className="mt-2 text-xs font-medium text-gray-500 whitespace-nowrap">項目負責人</div>
                              <div className="text-[11px] text-gray-400 whitespace-nowrap">Felix · 待審批</div>
                            </div>
                          </div>
                          )}

                          {/* 審批意見與附件（由上方 toggle 控制顯示） */}
                          {showOpinions && modalRow?.status !== '草稿' && (
                            <div className="space-y-2.5 border-t border-gray-100 pt-4">
                              <div className="text-xs font-semibold text-gray-500">審批意見與附件</div>
                              <div className="flex items-start gap-3">
                                <div className="w-20 shrink-0 text-xs font-bold text-gray-700">提交申請<div className="font-normal text-gray-400 mt-0.5">Nick</div></div>
                                <div className="flex-1 text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-lg p-3">
                                  依人員帳號異動需求提出申請。
                                  <div className="mt-2"><span className="inline-flex items-center gap-1 px-2 py-1 text-xs text-gray-600 bg-white border border-gray-200 rounded">📎 異動申請表.pdf</span></div>
                                </div>
                              </div>
                              <div className="flex items-start gap-3">
                                <div className="w-20 shrink-0 text-xs font-bold text-gray-700">部門主管<div className="font-normal text-gray-400 mt-0.5">James</div></div>
                                <div className="flex-1 text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-lg p-3">已確認異動內容，待資訊安全覆核後續審批。</div>
                              </div>
                              <div className="flex items-start gap-3">
                                <div className="w-20 shrink-0 text-xs font-bold text-gray-700">項目負責人<div className="font-normal text-gray-400 mt-0.5">Felix</div></div>
                                <div className="flex-1 text-sm text-gray-400 italic bg-gray-50 border border-gray-100 rounded-lg p-3">尚未審批</div>
                              </div>
                            </div>
                          )}

                          {/* 抄送（維持原表格顯示方式） */}
                          <div>
                            <div className="text-xs font-semibold text-gray-500 mb-2">抄送</div>
                            <div className="overflow-x-auto border border-gray-100 rounded-lg">
                              {modalRow?.docNo === 'C-THQ-000001' ? (
                                <table className="w-full text-left text-xs border-collapse whitespace-nowrap">
                                  <thead>
                                    <tr className="border-b border-gray-200 bg-gray-50 text-gray-700 font-bold">
                                      <th className="px-3 py-1.5 w-20">級別</th>
                                      <th className="px-3 py-1.5">職稱</th>
                                      <th className="px-3 py-1.5">簽名</th>
                                      <th className="px-3 py-1.5">ID</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-100 font-medium">
                                    {progressCCc.map((c, i) => (
                                      <tr key={i}>
                                        <td className="px-3 py-1.5 text-gray-500">{c.level}</td>
                                        <td className="px-3 py-1.5 text-gray-800">{c.title}</td>
                                        <td className="px-3 py-1.5 text-gray-800">{c.sign}</td>
                                        <td className="px-3 py-1.5 text-gray-600 font-mono">{c.id}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              ) : (
                                <table className="w-full text-left text-xs border-collapse">
                                  <thead>
                                    <tr className="border-b border-gray-200 bg-gray-50 text-gray-700 font-bold">
                                      <th className="px-4 py-1.5">職稱</th>
                                      <th className="px-4 py-1.5">簽名</th>
                                      <th className="px-4 py-1.5 w-40">時間</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-100 font-medium">
                                    <tr>
                                      <td className="px-4 py-1.5 text-gray-800">財務</td>
                                      <td className="px-4 py-1.5 text-gray-800">Stella</td>
                                      <td className="px-4 py-1.5 text-gray-400">-</td>
                                    </tr>
                                    <tr>
                                      <td className="px-4 py-1.5 text-gray-800">內審</td>
                                      <td className="px-4 py-1.5 text-gray-800">Cora</td>
                                      <td className="px-4 py-1.5 text-gray-400">-</td>
                                    </tr>
                                  </tbody>
                                </table>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* 下一步：依單據可選擇開立費用申請單或費用報銷單（PU-THQ-000001 / PU-THQ-000003 顯示） */}
                      {['PU-THQ-000001', 'PU-THQ-000003'].includes(modalRow?.docNo) && (
                        <div className="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-4">
                          <div className="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">下一步</div>
                          <p className="text-sm text-gray-600">此單據已可進行下一步，請選擇要開立的單據類型：</p>
                          <div className="flex flex-wrap gap-3">
                            <button onClick={() => setIsModalOpen(false)} className="ui-btn ui-btn-primary">開立費用申請單 (B)</button>
                            <button onClick={() => setIsModalOpen(false)} className="ui-btn ui-btn-secondary">開立費用報銷單 (C)</button>
                          </div>
                        </div>
                      )}

                    </div>

                    {/* 底部總額顯示區 */}
                    <div className="bg-[#F8F9FA] border-t border-gray-200 px-6 py-4 flex flex-col items-end gap-3 flex-shrink-0 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
                      <div className="flex flex-col items-end text-sm text-gray-800 font-medium space-y-1 w-full">
                        <div className="flex justify-end gap-12 w-full">
                          <span className="text-gray-500 font-semibold text-xs tracking-wide">TOTAL AMOUNT</span>
                          <span className="w-48 text-right font-bold text-gray-800">TWD 1,000,000,000.00</span>
                        </div>
                      </div>
                    </div>

                  </div>

                  {/* 右側：審批流程預覽 */}
                  <div className="w-full lg:w-[350px] bg-white border-t lg:border-t-0 lg:border-l border-gray-200 overflow-y-auto flex flex-col flex-shrink-0">
                    <div className="bg-[#0097A7] text-white px-4 py-3.5 font-bold text-sm tracking-wide">
                      審批流程
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                      {(modalRow?.docNo === 'C-THQ-000001'
                        ? progressCSteps
                        : [{ seq: '1', title: '部門主管' }, { seq: '2', title: '項目負責人' }, { seq: '3', title: '費用會計' }, { seq: '4', title: '財務負責人' }, { seq: '5', title: '資金專員' }]
                      ).map((s, i, arr) => {
                        const isDraft = modalRow?.status === '草稿';
                        const done = !isDraft && s.status === '已審批';
                        const active = !isDraft && s.status === '審批中';
                        return (
                          <div key={i} className="relative flex gap-3 pb-6 last:pb-0">
                            {i < arr.length - 1 && (
                              <span className={`absolute left-[15px] top-8 -bottom-0 w-0.5 ${done ? 'bg-emerald-300' : 'bg-gray-200'}`}></span>
                            )}
                            <div className={`relative z-10 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${done ? 'bg-emerald-500 text-white' : active ? 'bg-[#4A90E2] text-white ring-4 ring-blue-100' : 'bg-gray-200 text-gray-500'}`}>
                              {done ? '✓' : s.seq}
                            </div>
                            <div className="pt-1 min-w-0">
                              <div className="text-sm font-bold text-gray-800 whitespace-nowrap">{s.title}</div>
                              <div className="text-xs text-gray-400 mt-0.5 whitespace-nowrap">
                                {(s.sign && s.sign !== '-') ? s.sign : '—'}
                                {done && <span className="ml-1 text-emerald-600 font-medium">· 已審批</span>}
                                {active && <span className="ml-1 text-[#4A90E2] font-medium">· 審批中</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ================= 撤回確認彈窗 ================= */}
          {withdrawConfirmItem && (
            <div className="fixed inset-0 bg-black bg-opacity-45 z-[60] flex items-center justify-center p-4" onClick={() => setWithdrawConfirmItem(null)}>
              <div 
                className="bg-white rounded-md shadow-xl w-full max-w-[400px] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 text-center"
                onClick={e => e.stopPropagation()}
              >
                <div className="p-8">
                  <div className="text-gray-800 text-sm font-medium mb-8">
                    確定要撤回此申請單嗎？
                  </div>
                  <div className="flex justify-center gap-4">
                    <button
                      onClick={() => setWithdrawConfirmItem(null)}
                      className="ui-btn ui-btn-secondary"
                    >
                      取消
                    </button>
                    <button
                      onClick={() => setWithdrawConfirmItem(null)}
                      className="ui-btn ui-btn-danger"
                    >
                      確定撤回
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
