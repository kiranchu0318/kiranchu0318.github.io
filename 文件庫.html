<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC' } } }
        }
    </script>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <h1 class="ui-page-title">文件庫</h1>
        </header>

        <!-- 分頁 Tab（公司文件在前） -->
        <div class="border-b border-gray-200 flex gap-1">
            <button id="tab-btn-company" onclick="switchTab('company')" class="tab-btn px-4 py-2.5 text-sm font-bold text-primary border-b-2 border-primary -mb-px transition-colors">公司文件</button>
            <button id="tab-btn-personal" onclick="switchTab('personal')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent -mb-px transition-colors">個人文件</button>
        </div>

        <!-- Tab 1：公司文件（依登入人員地區權限顯示） -->
        <div id="tab-company" class="tab-panel">
            <section class="ui-card flex flex-col p-4 sm:p-6 space-y-4">

                <!-- 地區權限提示 -->
                <div class="flex items-start gap-2 bg-[#EAF2FC] border border-blue-100 rounded-lg px-4 py-2.5 text-sm">
                    <i class="fa-solid fa-user-shield text-primary mt-0.5"></i>
                    <div>
                        <span class="text-gray-700">您具備地區權限：</span><span id="my-regions" class="font-bold text-primary"></span>
                        <span class="text-gray-400 text-xs ml-1">（僅顯示您有權限檢視的文件）</span>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3">
                    <div class="ui-search w-full sm:w-80">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="company-search" oninput="renderCompany()" placeholder="搜尋公司文件 / 資料夾..." class="ui-input ui-search-input">
                    </div>
                </div>

                <div class="overflow-x-auto rounded-lg border border-gray-100">
                    <table class="ui-table whitespace-nowrap">
                        <thead>
                            <tr>
                                <th class="text-left">文件名稱</th>
                                <th class="text-center w-40">所屬資料夾</th>
                                <th class="text-center w-24">地區</th>
                                <th class="text-center w-24">大小</th>
                                <th class="text-center w-32">更新日期</th>
                                <th class="text-center w-32">操作</th>
                            </tr>
                        </thead>
                        <tbody id="company-tbody"></tbody>
                    </table>
                </div>

                <div id="company-empty" class="hidden py-16 text-center space-y-3">
                    <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-regular fa-folder-open text-3xl"></i></div>
                    <p class="text-sm text-gray-500 font-medium">目前沒有您有權限檢視的文件</p>
                </div>
            </section>
        </div>

        <!-- Tab 2：個人文件（員工上傳，HR 可於員工管理檢視/下載） -->
        <div id="tab-personal" class="tab-panel hidden">
            <section class="ui-card flex flex-col p-4 sm:p-6 space-y-4">
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3">
                    <div class="ui-search w-full sm:w-80">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="personal-search" oninput="renderPersonal()" placeholder="搜尋個人文件..." class="ui-input ui-search-input">
                    </div>
                    <button onclick="openUpload()" class="ui-btn ui-btn-primary w-full sm:w-auto"><i class="fa-solid fa-upload"></i> 上傳檔案</button>
                </div>
                <div class="overflow-x-auto rounded-lg border border-gray-100">
                    <table class="ui-table whitespace-nowrap">
                        <thead>
                            <tr>
                                <th class="text-left">文件名稱</th>
                                <th class="text-center w-24">大小</th>
                                <th class="text-center w-32">更新日期</th>
                                <th class="text-center w-44">操作</th>
                            </tr>
                        </thead>
                        <tbody id="personal-tbody"></tbody>
                    </table>
                </div>
                <div id="personal-empty" class="hidden py-16 text-center text-sm text-gray-400">尚未上傳個人文件，點「上傳檔案」新增</div>
            </section>
        </div>

        <!-- 上傳個人文件 彈窗 -->
        <div id="upload-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
            <div class="bg-white rounded-2xl shadow-modal w-full max-w-md overflow-hidden">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                    <h3 class="text-base font-bold text-gray-900">上傳個人文件</h3>
                    <button onclick="closeUpload()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="px-6 py-5 space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-text-muted mb-1.5">文件名稱 <span class="text-rose-500">*</span></label>
                        <input type="text" id="up-name" placeholder="例如：在職證明.pdf" class="ui-input">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-text-muted mb-1.5">選擇檔案</label>
                        <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-white">
                            <button type="button" onclick="document.getElementById('up-file').click()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 border-r border-gray-300 text-sm font-medium transition cursor-pointer shrink-0">選擇檔案</button>
                            <span id="up-file-name" class="px-3 text-sm text-gray-500 grow whitespace-nowrap truncate">未選擇任何檔案</span>
                            <input type="file" id="up-file" class="hidden" onchange="onUploadPicked(this)">
                        </div>
                    </div>
                </div>
                <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100">
                    <button onclick="closeUpload()" class="ui-btn ui-btn-secondary">取消</button>
                    <button onclick="saveUpload()" class="ui-btn ui-btn-primary">上傳</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 登入人員具備的地區（可多地區；特例：一人具多地區屬性）
        const MY_REGIONS = ['T1', 'T2'];

        // 與「文件庫管理」共用的預設資料夾（管理員未設定時的後備）
        const DEFAULT_FOLDERS = [
            { id: 1, name: '公司制度與規範', region: '全區', files: [
                { id: 1, name: '員工手冊 2026.pdf', size: '2.4 MB', date: '2026-01-15' },
                { id: 2, name: '差旅報銷規範.pdf', size: '880 KB', date: '2026-03-02' },
                { id: 3, name: '資訊安全政策.pdf', size: '1.1 MB', date: '2026-02-10' }
            ] },
            { id: 2, name: '台灣總部文件', region: 'THQ（台灣總部）', files: [
                { id: 1, name: '組織架構圖.pdf', size: '450 KB', date: '2026-05-12' },
                { id: 2, name: '總部辦公室規範.docx', size: '320 KB', date: '2026-04-05' }
            ] },
            { id: 3, name: 'T1 區營運文件', region: 'T1', files: [
                { id: 1, name: 'T1 區出勤規範.pdf', size: '210 KB', date: '2026-03-18' }
            ] },
            { id: 4, name: 'T2 區營運文件', region: 'T2', files: [
                { id: 1, name: 'T2 區報銷指引.pdf', size: '180 KB', date: '2026-04-22' }
            ] }
        ];

        // 登入人員身分（個人文件依此人員存放，員工管理可依工號讀取）
        const MY_EMP_ID = 'EMP001';
        const MY_EMP_NAME = 'Logan';
        const LS_PERSONAL = 'hroa_personal_docs';

        // 預設個人文件（首次無資料時帶入並保存，讓員工管理端可見示意）
        const DEFAULT_PERSONAL = [
            { name: '勞動契約.pdf', size: '540 KB', date: '2025-09-01' },
            { name: '2026年5月薪資單.pdf', size: '120 KB', date: '2026-06-05' },
            { name: '在職證明.pdf', size: '90 KB', date: '2026-06-10' },
        ];

        function loadAllPersonal() {
            try { return JSON.parse(localStorage.getItem(LS_PERSONAL)) || {}; } catch (e) { return {}; }
        }
        function getMyDocs() {
            const all = loadAllPersonal();
            if (!Array.isArray(all[MY_EMP_ID])) { all[MY_EMP_ID] = DEFAULT_PERSONAL.slice(); savePersonal(all); }
            return all[MY_EMP_ID];
        }
        function savePersonal(all) {
            try { localStorage.setItem(LS_PERSONAL, JSON.stringify(all)); } catch (e) {}
        }
        function persistMyDocs(docs) {
            const all = loadAllPersonal();
            all[MY_EMP_ID] = docs;
            savePersonal(all);
        }
        let personalDocs = getMyDocs();

        function fmtSize(b) {
            return b >= 1048576 ? (b / 1048576).toFixed(1) + ' MB' : b >= 1024 ? (b / 1024).toFixed(0) + ' KB' : b + ' B';
        }

        /* ===== 個人文件：上傳 / 刪除 ===== */
        function openUpload() {
            document.getElementById('up-name').value = '';
            document.getElementById('up-file-name').innerText = '未選擇任何檔案';
            document.getElementById('up-file').value = '';
            document.getElementById('upload-modal').classList.remove('hidden');
        }
        function closeUpload() { document.getElementById('upload-modal').classList.add('hidden'); }
        function onUploadPicked(input) {
            const f = input.files && input.files[0];
            document.getElementById('up-file-name').innerText = f ? f.name : '未選擇任何檔案';
            if (f && !document.getElementById('up-name').value.trim()) document.getElementById('up-name').value = f.name;
        }
        function saveUpload() {
            const name = document.getElementById('up-name').value.trim();
            if (!name) { alert('請輸入文件名稱'); return; }
            const f = document.getElementById('up-file').files[0];
            personalDocs.push({ name, size: f ? fmtSize(f.size) : '—', date: new Date().toISOString().slice(0, 10) });
            persistMyDocs(personalDocs);
            closeUpload();
            renderPersonal();
        }
        function deletePersonal(idx) {
            if (!confirm('確定要刪除「' + personalDocs[idx].name + '」嗎？')) return;
            personalDocs.splice(idx, 1);
            persistMyDocs(personalDocs);
            renderPersonal();
        }

        // 讀取管理員於「文件庫管理」設定的資料夾（localStorage 共用）
        function loadFolders() {
            try {
                const f = JSON.parse(localStorage.getItem('hroa_doc_folders'));
                if (Array.isArray(f) && f.length) return f;
            } catch (e) {}
            return DEFAULT_FOLDERS;
        }

        // 是否可檢視該地區（全區或符合本人任一地區屬性）
        function canAccess(region) {
            return region === '全區' || MY_REGIONS.includes(region);
        }

        // 攤平本人可檢視的所有文件（含所屬資料夾與地區）
        function accessibleDocs() {
            const out = [];
            loadFolders().filter(f => canAccess(f.region)).forEach(f => {
                (f.files || []).forEach(file => out.push({ name: file.name, size: file.size, date: file.date, folder: f.name, region: f.region }));
            });
            return out;
        }

        function regionBadge(region) {
            return region === '全區'
                ? '<span class="ui-badge ui-badge-success">全區</span>'
                : '<span class="ui-badge ui-badge-info">' + region + '</span>';
        }

        function actionsHtml(name) {
            const safe = name.replace(/'/g, "\\'");
            return '<div class="flex items-center justify-center gap-2">' +
                '<button onclick="viewDoc(\'' + safe + '\')" class="ui-btn ui-btn-secondary ui-btn-sm" title="檢視"><i class="fa-regular fa-eye"></i> 檢視</button>' +
                '<button onclick="downloadDoc(\'' + safe + '\')" class="ui-btn ui-btn-primary ui-btn-sm" title="下載"><i class="fa-solid fa-download"></i> 下載</button>' +
                '</div>';
        }

        function renderCompany() {
            const kw = (document.getElementById('company-search').value || '').trim().toLowerCase();
            const docs = accessibleDocs().filter(d => !kw || d.name.toLowerCase().includes(kw) || d.folder.toLowerCase().includes(kw));
            document.getElementById('company-tbody').innerHTML = docs.map(d =>
                '<tr>' +
                '<td class="text-left font-medium text-gray-800"><i class="fa-regular fa-file-lines text-primary mr-2"></i>' + d.name + '</td>' +
                '<td class="text-center text-gray-600"><i class="fa-solid fa-folder text-amber-400 mr-1"></i>' + d.folder + '</td>' +
                '<td class="text-center">' + regionBadge(d.region) + '</td>' +
                '<td class="text-center text-gray-500">' + (d.size || '—') + '</td>' +
                '<td class="text-center text-gray-500">' + (d.date || '') + '</td>' +
                '<td class="text-center">' + actionsHtml(d.name) + '</td>' +
                '</tr>'
            ).join('');
            document.getElementById('company-empty').classList.toggle('hidden', docs.length > 0);
        }

        function renderPersonal() {
            const kw = (document.getElementById('personal-search').value || '').trim().toLowerCase();
            const rows = personalDocs.map((d, i) => ({ d, i })).filter(({ d }) => !kw || d.name.toLowerCase().includes(kw));
            document.getElementById('personal-tbody').innerHTML = rows.map(({ d, i }) => {
                const safe = d.name.replace(/'/g, "\\'");
                return '<tr>' +
                    '<td class="text-left font-medium text-gray-800"><i class="fa-regular fa-file-lines text-primary mr-2"></i>' + d.name + '</td>' +
                    '<td class="text-center text-gray-500">' + (d.size || '—') + '</td>' +
                    '<td class="text-center text-gray-500">' + (d.date || '') + '</td>' +
                    '<td class="text-center"><div class="flex items-center justify-center gap-2">' +
                        '<button onclick="downloadDoc(\'' + safe + '\')" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-download"></i> 下載</button>' +
                        '<button onclick="deletePersonal(' + i + ')" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-trash-can"></i> 刪除</button>' +
                    '</div></td>' +
                    '</tr>';
            }).join('');
            document.getElementById('personal-empty').classList.toggle('hidden', rows.length > 0);
        }

        function switchTab(name) {
            ['company', 'personal'].forEach(t => {
                const panel = document.getElementById('tab-' + t);
                const btn = document.getElementById('tab-btn-' + t);
                const on = t === name;
                if (panel) panel.classList.toggle('hidden', !on);
                if (btn) {
                    btn.classList.toggle('text-primary', on);
                    btn.classList.toggle('font-bold', on);
                    btn.classList.toggle('border-primary', on);
                    btn.classList.toggle('text-gray-500', !on);
                    btn.classList.toggle('font-medium', !on);
                    btn.classList.toggle('border-transparent', !on);
                }
            });
        }

        // 下載（範例：產生示意檔案供下載）
        function downloadDoc(name) {
            const blob = new Blob(['這是文件「' + name + '」的示意內容（範例下載）。'], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
        function viewDoc(name) {
            alert('檢視：' + name);
        }

        document.getElementById('upload-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUpload(); });
        document.getElementById('my-regions').innerText = MY_REGIONS.join('、');
        renderCompany();
        renderPersonal();
    </script>

</body>
</html>
