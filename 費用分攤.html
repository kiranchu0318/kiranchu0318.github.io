<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>費用分攤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC', background: '#F8F9FB', card: '#FFFFFF',
                    text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' } },
                fontFamily: { sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                boxShadow: { 'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)', 'modal': '0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04)' }
            } }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="mx-auto w-full space-y-6">

        <header class="ui-page-header">
            <h1 class="ui-page-title">費用分攤</h1>
            <button onclick="mockExport()" class="ui-btn ui-btn-secondary"><i class="fa-solid fa-download"></i> 匯出報表</button>
        </header>

        <!-- KPI -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="ui-card p-5 border-l-4 border-amber-400 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-text-muted mb-1">本期待分攤總額</p>
                    <p id="kpi-pending" class="text-2xl font-bold text-gray-900 font-mono">—</p>
                </div>
                <div class="w-11 h-11 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center"><i class="fa-solid fa-hourglass-half text-lg"></i></div>
            </div>
            <div class="ui-card p-5 border-l-4 border-emerald-400 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-text-muted mb-1">已分攤金額</p>
                    <p id="kpi-done" class="text-2xl font-bold text-gray-900 font-mono">—</p>
                </div>
                <div class="w-11 h-11 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center"><i class="fa-solid fa-circle-check text-lg"></i></div>
            </div>
            <div class="ui-card p-5 border-l-4 border-primary flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-text-muted mb-1">分攤方案數</p>
                    <p id="kpi-plans" class="text-2xl font-bold text-gray-900 font-mono">—</p>
                </div>
                <div class="w-11 h-11 rounded-xl bg-blue-50 text-primary flex items-center justify-center"><i class="fa-solid fa-diagram-project text-lg"></i></div>
            </div>
            <div class="ui-card p-5 border-l-4 border-violet-400 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-text-muted mb-1">涉及部門數</p>
                    <p id="kpi-depts" class="text-2xl font-bold text-gray-900 font-mono">—</p>
                </div>
                <div class="w-11 h-11 rounded-xl bg-violet-50 text-violet-500 flex items-center justify-center"><i class="fa-solid fa-sitemap text-lg"></i></div>
            </div>
        </div>

        <!-- 篩選台 -->
        <div class="ui-card p-5 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">搜尋（分攤單號/費用項目）</label>
                    <div class="ui-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="f-search" oninput="render()" placeholder="輸入關鍵字..." class="ui-input ui-search-input">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">分攤狀態</label>
                    <select id="f-status" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="待分攤">待分攤</option>
                        <option value="已分攤">已分攤</option>
                        <option value="已過帳">已過帳</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">分攤方式</label>
                    <select id="f-method" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="依比例">依比例</option>
                        <option value="依人數">依人數</option>
                        <option value="依固定金額">依固定金額</option>
                        <option value="依面積">依面積</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">期間</label>
                    <select id="f-period" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="2026-06">2026-06</option>
                        <option value="2026-05">2026-05</option>
                        <option value="2026-04">2026-04</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end items-center gap-2 pt-1"><button onclick="render()" class="ui-btn ui-btn-primary ui-btn-sm"><i class="fa-solid fa-magnifying-glass"></i> 查詢</button><button onclick="resetFilters()" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-arrows-rotate"></i> 重置</button></div>
        </div>

        <!-- 列表 -->
        <section class="ui-card p-4 sm:p-6">
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">費用分攤列表</h2>
                <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100 custom-scrollbar">
                <table class="ui-table text-center">
                    <thead>
                        <tr>
                            <th scope="col" class="text-left">分攤單號</th>
                            <th scope="col" class="text-left">費用項目</th>
                            <th scope="col" class="text-right">總金額</th>
                            <th scope="col">分攤方式</th>
                            <th scope="col">涉及部門/項目數</th>
                            <th scope="col">期間</th>
                            <th scope="col">狀態</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

            <div id="no-data" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-scale-balanced text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的費用分攤單</p>
                <button onclick="resetFilters()" class="text-xs text-primary font-semibold hover:underline">清除篩選條件</button>
            </div>

            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>
    </div>

    <!-- 詳情彈窗 -->
    <div id="detail-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-2xl flex flex-col max-h-[88vh] overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0">
                <h3 id="d-title" class="text-base font-bold text-gray-900">費用分攤單</h3>
                <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-6 py-5 overflow-y-auto custom-scrollbar space-y-6">
                <!-- 費用來源資訊 -->
                <div>
                    <h4 class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2 mb-3">費用來源資訊</h4>
                    <div id="d-info" class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3 text-sm"></div>
                </div>
                <!-- 分攤明細 -->
                <div>
                    <h4 class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2 mb-3 flex items-center gap-2">分攤明細 <span class="text-[11px] font-normal text-text-light">（分攤金額合計需等於總金額）</span></h4>
                    <div class="overflow-x-auto rounded-lg border border-gray-100">
                        <table class="ui-table text-center">
                            <thead>
                                <tr>
                                    <th scope="col" class="text-left">部門 / 項目</th>
                                    <th scope="col" class="text-right">分攤比例（%）</th>
                                    <th scope="col" class="text-right">分攤金額</th>
                                </tr>
                            </thead>
                            <tbody id="d-alloc"></tbody>
                            <tfoot id="d-alloc-foot"></tfoot>
                        </table>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100 shrink-0">
                <button onclick="closeDetail()" class="ui-btn ui-btn-secondary">關閉</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        // 共同費用分攤單。將辦公室租金、水電費等共同費用，依分攤方式攤提至各部門/項目；此為原型示意資料。
        // 每筆分攤明細的金額合計皆等於總金額（比例加總 100%）。
        const docs = [
            { docNo: 'CA-20260601-001', item: '辦公室租金', amount: 600000, method: '依面積', period: '2026-06', status: '待分攤',
              alloc: [{ name: '研發部', ratio: 40, amount: 240000 }, { name: '行銷部', ratio: 25, amount: 150000 }, { name: '財務部', ratio: 15, amount: 90000 }, { name: '人資部', ratio: 12, amount: 72000 }, { name: '內稽部', ratio: 8, amount: 48000 }] },
            { docNo: 'CA-20260601-002', item: '水電費', amount: 180000, method: '依人數', period: '2026-06', status: '待分攤',
              alloc: [{ name: '研發部', ratio: 45, amount: 81000 }, { name: '行銷部', ratio: 20, amount: 36000 }, { name: '財務部', ratio: 15, amount: 27000 }, { name: '人資部', ratio: 12, amount: 21600 }, { name: '內稽部', ratio: 8, amount: 14400 }] },
            { docNo: 'CA-20260601-003', item: '雲端服務費', amount: 320000, method: '依比例', period: '2026-06', status: '已分攤',
              alloc: [{ name: '研發部', ratio: 60, amount: 192000 }, { name: '行銷部', ratio: 25, amount: 80000 }, { name: '財務部', ratio: 10, amount: 32000 }, { name: '人資部', ratio: 5, amount: 16000 }] },
            { docNo: 'CA-20260601-004', item: '清潔費', amount: 90000, method: '依面積', period: '2026-06', status: '已分攤',
              alloc: [{ name: '研發部', ratio: 40, amount: 36000 }, { name: '行銷部', ratio: 25, amount: 22500 }, { name: '財務部', ratio: 15, amount: 13500 }, { name: '人資部', ratio: 12, amount: 10800 }, { name: '內稽部', ratio: 8, amount: 7200 }] },
            { docNo: 'CA-20260501-001', item: '辦公室租金', amount: 600000, method: '依面積', period: '2026-05', status: '已過帳',
              alloc: [{ name: '研發部', ratio: 40, amount: 240000 }, { name: '行銷部', ratio: 25, amount: 150000 }, { name: '財務部', ratio: 15, amount: 90000 }, { name: '人資部', ratio: 12, amount: 72000 }, { name: '內稽部', ratio: 8, amount: 48000 }] },
            { docNo: 'CA-20260501-002', item: '網路專線費', amount: 120000, method: '依固定金額', period: '2026-05', status: '已過帳',
              alloc: [{ name: '研發部', ratio: 50, amount: 60000 }, { name: '行銷部', ratio: 25, amount: 30000 }, { name: '財務部', ratio: 25, amount: 30000 }] },
            { docNo: 'CA-20260501-003', item: '雲端服務費', amount: 300000, method: '依比例', period: '2026-05', status: '已過帳',
              alloc: [{ name: '研發部', ratio: 60, amount: 180000 }, { name: '行銷部', ratio: 25, amount: 75000 }, { name: '財務部', ratio: 10, amount: 30000 }, { name: '人資部', ratio: 5, amount: 15000 }] },
            { docNo: 'CA-20260401-001', item: '員工教育訓練費', amount: 240000, method: '依人數', period: '2026-04', status: '已過帳',
              alloc: [{ name: '研發部', ratio: 45, amount: 108000 }, { name: '行銷部', ratio: 20, amount: 48000 }, { name: '財務部', ratio: 15, amount: 36000 }, { name: '人資部', ratio: 12, amount: 28800 }, { name: '內稽部', ratio: 8, amount: 19200 }] }
        ];

        /* ===== 金額格式 ===== */
        function fmt(n) { return 'NT$ ' + n.toLocaleString('en-US'); }

        /* ===== 徽章 ===== */
        function statusBadge(s) {
            const map = { '待分攤': 'ui-badge-warning', '已分攤': 'ui-badge-success', '已過帳': 'ui-badge-gray' };
            const icon = s === '已過帳' ? '<i class="fa-solid fa-check"></i> ' : '';
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'} mx-auto">${icon}${s}</span>`;
        }
        function methodBadge(m) {
            const map = { '依比例': 'ui-badge-info', '依人數': 'ui-badge-purple', '依固定金額': 'ui-badge-gray', '依面積': 'ui-badge-info' };
            return `<span class="ui-badge ${map[m] || 'ui-badge-gray'} mx-auto">${m}</span>`;
        }

        /* ===== KPI ===== */
        function renderKpi() {
            const pending = docs.filter(d => d.status === '待分攤').reduce((s, d) => s + d.amount, 0);
            const done = docs.filter(d => d.status === '已分攤' || d.status === '已過帳').reduce((s, d) => s + d.amount, 0);
            const depts = new Set();
            docs.forEach(d => d.alloc.forEach(a => depts.add(a.name)));
            document.getElementById('kpi-pending').innerText = fmt(pending);
            document.getElementById('kpi-done').innerText = fmt(done);
            document.getElementById('kpi-plans').innerText = docs.length;
            document.getElementById('kpi-depts').innerText = depts.size;
        }

        /* ===== 列表渲染與篩選 ===== */
        function render() {
            const kw = document.getElementById('f-search').value.trim().toLowerCase();
            const status = document.getElementById('f-status').value;
            const method = document.getElementById('f-method').value;
            const period = document.getElementById('f-period').value;

            const rows = docs.map((d, i) => ({ d, i })).filter(({ d }) =>
                (!kw || d.docNo.toLowerCase().includes(kw) || d.item.toLowerCase().includes(kw)) &&
                (status === 'all' || d.status === status) &&
                (method === 'all' || d.method === method) &&
                (period === 'all' || d.period === period));

            const tbody = document.getElementById('tbody');
            const noData = document.getElementById('no-data');
            tbody.innerHTML = '';

            if (rows.length === 0) {
                tbody.parentElement.classList.add('hidden');
                noData.classList.remove('hidden');
                document.getElementById('count-badge').innerText = '0 筆資料';
                document.getElementById('pagination-info').innerText = '顯示第 0 到 0 筆，共 0 筆記錄';
                return;
            }
            tbody.parentElement.classList.remove('hidden');
            noData.classList.add('hidden');

            rows.forEach(({ d, i }) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50/70 transition-colors';
                tr.innerHTML = `
                    <td class="text-left font-mono font-semibold text-gray-600">${d.docNo}</td>
                    <td class="text-left text-gray-800">${d.item}</td>
                    <td class="text-right font-mono text-gray-700">${fmt(d.amount)}</td>
                    <td>${methodBadge(d.method)}</td>
                    <td class="text-gray-700">${d.alloc.length}</td>
                    <td class="text-gray-600">${d.period}</td>
                    <td>${statusBadge(d.status)}</td>
                    <td>
                        <button onclick="openDetail(${i})" class="ui-btn ui-btn-secondary ui-btn-sm mx-auto"><i class="fa-solid fa-circle-info"></i> 檢視</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('count-badge').innerText = `${rows.length} 筆資料`;
            document.getElementById('pagination-info').innerText = `顯示第 1 到 ${rows.length} 筆，共 ${rows.length} 筆記錄`;
        }

        function resetFilters() {
            document.getElementById('f-search').value = '';
            document.getElementById('f-status').value = 'all';
            document.getElementById('f-method').value = 'all';
            document.getElementById('f-period').value = 'all';
            render();
        }

        /* ===== 詳情 ===== */
        function openDetail(i) {
            const d = docs[i];
            document.getElementById('d-title').innerText = `費用分攤單 — ${d.docNo}`;
            document.getElementById('d-info').innerHTML = `
                <div><span class="text-text-muted">分攤單號：</span><span class="font-medium text-gray-800 font-mono">${d.docNo}</span></div>
                <div><span class="text-text-muted">費用項目：</span><span class="font-medium text-gray-800">${d.item}</span></div>
                <div><span class="text-text-muted">總金額：</span><span class="font-medium text-gray-800 font-mono">${fmt(d.amount)}</span></div>
                <div><span class="text-text-muted">分攤方式：</span>${methodBadge(d.method).replace(' mx-auto', '')}</div>
                <div><span class="text-text-muted">期間：</span><span class="font-medium text-gray-800">${d.period}</span></div>
                <div><span class="text-text-muted">狀態：</span>${statusBadge(d.status).replace(' mx-auto', '')}</div>`;

            document.getElementById('d-alloc').innerHTML = d.alloc.map(a => `
                <tr class="hover:bg-gray-50/70 transition-colors">
                    <td class="text-left text-gray-800">${a.name}</td>
                    <td class="text-right font-mono text-gray-700">${a.ratio}%</td>
                    <td class="text-right font-mono text-gray-700">${fmt(a.amount)}</td>
                </tr>`).join('');

            const sumRatio = d.alloc.reduce((s, a) => s + a.ratio, 0);
            const sumAmount = d.alloc.reduce((s, a) => s + a.amount, 0);
            const balanced = sumAmount === d.amount;
            document.getElementById('d-alloc-foot').innerHTML = `
                <tr class="bg-gray-50 font-bold">
                    <td class="text-left text-gray-900">合計</td>
                    <td class="text-right font-mono text-gray-900">${sumRatio}%</td>
                    <td class="text-right font-mono ${balanced ? 'text-gray-900' : 'text-red-600'}">${fmt(sumAmount)}${balanced ? '' : ' ⚠'}</td>
                </tr>`;

            document.getElementById('detail-modal').classList.remove('hidden');
        }
        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

        function mockExport() { showToast('success', '費用分攤報表已開始匯出'); }

        function showToast(type, text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            const icon = document.getElementById('toast-icon');
            if (type === 'success') { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20"; icon.className = "fa-solid fa-circle-check text-emerald-400 text-base"; }
            else { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20"; icon.className = "fa-solid fa-circle-info text-blue-400 text-base"; }
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            clearTimeout(window.__t); window.__t = setTimeout(() => { toast.style.transform = 'translateY(5rem)'; toast.style.opacity = '0'; }, 2400);
        }

        document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
        window.onload = function () { renderKpi(); render(); };
    </script>
</body>
</html>
