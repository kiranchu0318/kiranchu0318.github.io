<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班申請</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        'primary-light': '#EAF2FC',
                        background: '#F8F9FB',
                        card: '#FFFFFF',
                        text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' }
                    },
                    fontFamily: { sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)',
                        'modal': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 200ms ease-out, transform 200ms ease-out; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>

<body class="ui-page text-text-main antialiased relative">

    <div class="mx-auto w-full space-y-6 md:space-y-8">

        <!-- 頁面標題區塊 -->
        <header class="ui-page-header">
            <div class="flex items-center gap-3">
                <h1 class="ui-page-title">加班申請</h1>
            </div>
            <div class="flex gap-3 w-full sm:w-auto">
                <button onclick="openModal()" class="ui-btn ui-btn-primary w-full sm:w-auto">
                    <i class="fa-solid fa-business-time"></i> 新增加班申請
                </button>
            </div>
        </header>

        <!-- 申請紀錄區塊 -->
        <section class="ui-card p-4 md:p-6">

            <!-- 列表工具列 (篩選條件) -->
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                <div class="flex items-center gap-2">
                    <h2 class="text-lg font-semibold text-gray-800 whitespace-nowrap">加班紀錄</h2>
                    <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆</span>
                </div>
                <div class="flex flex-col sm:flex-row flex-wrap gap-3 w-full lg:w-auto lg:flex-1 lg:justify-end">
                    <div class="relative w-full sm:w-44">
                        <select id="filter-type" onchange="render()" class="ui-select">
                            <option value="">所有加班類型</option>
                            <option>平日加班</option>
                            <option>休息日加班</option>
                            <option>國定假日加班</option>
                        </select>
                    </div>
                    <div class="relative w-full sm:w-40">
                        <select id="filter-status" onchange="render()" class="ui-select">
                            <option value="">所有狀態</option>
                            <option>待簽核</option>
                            <option>簽核完成</option>
                            <option>駁回</option>
                            <option>撤回</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <input type="date" id="filter-start" onchange="render()" class="ui-input cursor-pointer">
                        <span class="text-gray-400 text-sm whitespace-nowrap">至</span>
                        <input type="date" id="filter-end" onchange="render()" class="ui-input cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- 表格 -->
            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table whitespace-nowrap">
                    <thead>
                        <tr>
                            <th scope="col">申請日期</th>
                            <th scope="col">加班日期</th>
                            <th scope="col">加班時段</th>
                            <th scope="col" class="text-center">時數</th>
                            <th scope="col">加班類型</th>
                            <th scope="col">補償方式</th>
                            <th scope="col" class="min-w-[180px]">事由</th>
                            <th scope="col" class="text-center">狀態</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="ot-tbody"></tbody>
                </table>
            </div>

            <div id="no-data-view" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-business-time text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的加班紀錄</p>
            </div>

            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>
    </div>

    <!-- 彈出視窗：新增加班申請 -->
    <div id="ot-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="fixed inset-0 z-10 overflow-y-auto flex items-center justify-center p-4">
            <div id="ot-panel" class="relative bg-white rounded-xl shadow-modal w-full max-w-2xl transform transition-all modal-enter flex flex-col my-8 max-h-[90vh]">
                <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100 shrink-0">
                    <h3 class="font-bold text-lg text-gray-900">新增加班申請</h3>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-primary text-white rounded-md hover:bg-opacity-95 transition-colors shadow-sm"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
                <div class="p-6 space-y-5 overflow-y-auto">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">加班日期 <span class="text-red-500">*</span></label>
                            <input type="date" id="m-date" class="ui-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">加班類型 <span class="text-red-500">*</span></label>
                            <select id="m-type" class="ui-select">
                                <option>平日加班</option>
                                <option>休息日加班</option>
                                <option>國定假日加班</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">開始時間 <span class="text-red-500">*</span></label>
                            <input type="time" id="m-start" onchange="calcHours()" class="ui-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">結束時間 <span class="text-red-500">*</span></label>
                            <input type="time" id="m-end" onchange="calcHours()" class="ui-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">加班時數</label>
                            <input type="text" id="m-hours" disabled class="ui-input bg-[#e9ecef] text-gray-500 cursor-not-allowed" value="0 小時">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">補償方式 <span class="text-red-500">*</span></label>
                            <select id="m-comp" class="ui-select">
                                <option>加班費</option>
                                <option>補休</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">加班事由 <span class="text-red-500">*</span></label>
                        <textarea id="m-reason" rows="3" placeholder="請說明加班原因..." class="ui-input resize-none"></textarea>
                    </div>
                    <p id="m-error" class="hidden text-xs text-rose-500">請完整填寫加班日期、起訖時間與事由（結束時間須晚於開始時間）。</p>
                </div>
                <div class="px-6 py-4 flex justify-end gap-3 border-t border-gray-100 bg-gray-50/50 rounded-b-xl shrink-0">
                    <button onclick="closeModal()" class="ui-btn ui-btn-secondary">取消</button>
                    <button onclick="submitOT()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-paper-plane"></i> 提交申請</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ 加班申請單 檢視彈窗（比照 請假申請單 樣式）============ -->
    <div id="ot-view-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm" onclick="closeOtView()"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="bg-[#F0F2F5] rounded-xl shadow-2xl w-full max-w-[1430px] h-[90vh] flex flex-col overflow-hidden text-left">
                <!-- 標題列 -->
                <div class="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200 flex-shrink-0">
                    <span class="font-bold text-gray-800 text-base">加班申請單</span>
                    <button onclick="closeOtView()" class="bg-[#3F51B5] hover:bg-blue-800 text-white w-8 h-8 flex items-center justify-center rounded transition-colors"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
                <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
                    <!-- 左側 -->
                    <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
                        <div class="flex-1 overflow-y-auto p-6 space-y-6">
                            <!-- 基本資訊 -->
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                                <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">基本資訊</div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">文件編號</label><input id="otv-docno" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-700 cursor-not-allowed font-mono"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">申請時間</label><input id="otv-applytime" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-700 cursor-not-allowed"></div>
                                    <div class="lg:col-start-1"><label class="block text-gray-700 text-xs mb-1.5 font-medium">申請人</label><input id="otv-name" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">工號</label><input id="otv-empno" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-700 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">項目</label><input id="otv-project" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-700 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">部門</label><input id="otv-dept" type="text" disabled class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-700 cursor-not-allowed"></div>
                                </div>
                            </div>
                            <!-- 加班資訊 -->
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                                <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">加班資訊</div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">加班日期</label><input id="otv-date" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">加班時段</label><input id="otv-period" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">加班時數</label><input id="otv-hours" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">加班類型</label><input id="otv-type" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                    <div><label class="block text-gray-700 text-xs mb-1.5 font-medium">補償方式</label><input id="otv-comp" type="text" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-800 cursor-not-allowed"></div>
                                </div>
                                <div>
                                    <label class="block text-gray-700 text-xs mb-1.5 font-medium">加班事由</label>
                                    <textarea id="otv-reason" disabled class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 h-20 resize-none cursor-not-allowed"></textarea>
                                </div>
                                <div>
                                    <label class="block text-gray-700 text-xs mb-1.5 font-medium">附件</label>
                                    <ul class="space-y-1">
                                        <li class="flex items-center gap-2 bg-gray-50 border border-gray-100 rounded px-3 py-1.5 text-xs text-gray-700"><span class="text-gray-400">📎</span><span class="truncate">加班證明.pdf</span></li>
                                    </ul>
                                </div>
                            </div>
                            <!-- 審批進度追蹤 -->
                            <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                                <div class="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200">
                                    <span class="font-bold text-[#1A237E] text-[15px]">審批進度追蹤</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs font-semibold text-[#1A237E]">顯示審批意見與附件</span>
                                        <button id="otv-op-toggle" onclick="otvToggleOpinions()" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none bg-gray-300">
                                            <span id="otv-op-knob" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
                                        </button>
                                    </div>
                                </div>
                                <div class="p-6 space-y-6">
                                    <div class="overflow-x-auto border border-gray-100 rounded-lg">
                                        <table class="w-full text-left text-xs border-collapse whitespace-nowrap">
                                            <thead>
                                                <tr class="border-b border-gray-200 bg-gray-50 text-gray-700 font-bold">
                                                    <th class="px-3 py-1.5 text-center w-12">序號</th>
                                                    <th class="px-3 py-1.5 text-center w-20">審批狀態</th>
                                                    <th class="px-3 py-1.5 text-center w-14">條件</th>
                                                    <th class="px-3 py-1.5">職稱</th>
                                                    <th class="px-3 py-1.5">簽名</th>
                                                    <th class="px-3 py-1.5">ID</th>
                                                    <th class="px-3 py-1.5 w-40">審批時間</th>
                                                </tr>
                                            </thead>
                                            <tbody id="otv-progress-body" class="divide-y divide-gray-100 font-medium"></tbody>
                                        </table>
                                    </div>
                                    <div id="otv-opinions" class="hidden space-y-2.5 border-t border-gray-100 pt-4">
                                        <div class="text-xs font-semibold text-gray-500">審批意見與附件</div>
                                        <div id="otv-opinions-body" class="space-y-2.5"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- 底部按鈕 -->
                        <div class="bg-[#F8F9FA] border-t border-gray-200 px-6 py-4 flex justify-center gap-3 flex-shrink-0 shadow-[0_-2px_8px_rgba(0,0,0,0.04)]">
                            <button onclick="closeOtView()" class="ui-btn ui-btn-secondary">關閉</button>
                        </div>
                    </div>
                    <!-- 右側：審批流程 -->
                    <div class="w-full lg:w-[320px] bg-white border-t lg:border-t-0 lg:border-l border-gray-200 overflow-y-auto flex flex-col flex-shrink-0">
                        <div class="bg-[#0097A7] text-white px-4 py-3.5 font-bold text-sm tracking-wide">審批流程</div>
                        <div id="otv-flow" class="p-4 flex-1 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        // 加班紀錄（申請日期 / 加班日期 / 起訖 / 時數 / 類型 / 補償 / 事由 / 狀態）
        let records = [
            { applyDate: '2026-06-09', date: '2026-06-08', start: '18:30', end: '21:00', hours: 2.5, type: '平日加班', comp: '加班費', reason: '月底系統上線前置驗證與部署。', status: '簽核完成' },
            { applyDate: '2026-06-12', date: '2026-06-14', start: '09:00', end: '13:00', hours: 4, type: '休息日加班', comp: '補休', reason: '配合客戶週末驗收。', status: '待簽核' },
            { applyDate: '2026-05-28', date: '2026-05-27', start: '19:00', end: '20:30', hours: 1.5, type: '平日加班', comp: '加班費', reason: '緊急修復線上問題。', status: '駁回' }
        ];

        function statusBadge(s) {
            if (s === '簽核完成') return '<span class="ui-badge ui-badge-success">簽核完成</span>';
            if (s === '待簽核') return '<span class="ui-badge ui-badge-warning">待簽核</span>';
            if (s === '駁回') return '<span class="ui-badge ui-badge-danger">駁回</span>';
            if (s === '撤回') return '<span class="ui-badge ui-badge-gray">撤回</span>';
            return '<span class="ui-badge ui-badge-gray">' + s + '</span>';
        }
        const fmtHours = h => (Number.isInteger(h) ? h : h.toFixed(1)) + ' 小時';

        function render() {
            const type = document.getElementById('filter-type').value;
            const status = document.getElementById('filter-status').value;
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const rows = records.map((r, i) => ({ r, i })).filter(({ r }) =>
                (!type || r.type === type) &&
                (!status || r.status === status) &&
                (!start || r.date >= start) &&
                (!end || r.date <= end));

            const tbody = document.getElementById('ot-tbody');
            tbody.innerHTML = rows.map(({ r, i }) => {
                const canWithdraw = r.status === '待簽核';
                const withdrawBtn = canWithdraw
                    ? `<button onclick="withdraw(${i})" class="ui-btn ui-btn-sm text-rose-600 border border-rose-200 hover:bg-rose-50"><i class="fa-solid fa-rotate-left"></i> 撤回</button>`
                    : '';
                return '<tr class="hover:bg-gray-50/70 transition-colors">' +
                    '<td class="text-gray-500">' + r.applyDate + '</td>' +
                    '<td class="font-medium text-gray-800">' + r.date + '</td>' +
                    '<td class="font-mono text-gray-600">' + r.start + '–' + r.end + '</td>' +
                    '<td class="text-center font-semibold text-gray-700">' + fmtHours(r.hours) + '</td>' +
                    '<td><span class="ui-badge ui-badge-info">' + r.type + '</span></td>' +
                    '<td class="text-gray-600">' + r.comp + '</td>' +
                    '<td class="whitespace-normal break-words text-gray-600 text-sm">' + r.reason + '</td>' +
                    '<td class="text-center">' + statusBadge(r.status) + '</td>' +
                    '<td class="text-center"><div class="flex items-center justify-center gap-2">' +
                        '<button onclick="viewRecord(' + i + ')" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-regular fa-eye"></i> 檢視</button>' +
                        withdrawBtn +
                    '</div></td>' +
                    '</tr>';
            }).join('');

            document.getElementById('count-badge').innerText = rows.length + ' 筆';
            document.getElementById('pagination-info').innerText = '共 ' + rows.length + ' 筆記錄';
            document.getElementById('no-data-view').classList.toggle('hidden', rows.length > 0);
            tbody.parentElement.classList.toggle('hidden', rows.length === 0);
        }

        /* ===== 新增加班申請彈窗 ===== */
        function openModal(prefillDate) {
            document.getElementById('m-date').value = prefillDate || '';
            document.getElementById('m-type').value = '平日加班';
            document.getElementById('m-start').value = '';
            document.getElementById('m-end').value = '';
            document.getElementById('m-hours').value = '0 小時';
            document.getElementById('m-comp').value = '加班費';
            document.getElementById('m-reason').value = '';
            document.getElementById('m-error').classList.add('hidden');
            const modal = document.getElementById('ot-modal');
            const panel = document.getElementById('ot-panel');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            panel.classList.remove('modal-enter');
            panel.classList.add('modal-enter-active');
        }
        function closeModal() {
            const modal = document.getElementById('ot-modal');
            const panel = document.getElementById('ot-panel');
            panel.classList.remove('modal-enter-active');
            panel.classList.add('modal-enter');
            setTimeout(() => modal.classList.add('hidden'), 180);
        }

        function diffHours(start, end) {
            if (!start || !end) return 0;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            let mins = (eh * 60 + em) - (sh * 60 + sm);
            if (mins <= 0) return 0;
            return Math.round((mins / 60) * 100) / 100;
        }
        function calcHours() {
            const h = diffHours(document.getElementById('m-start').value, document.getElementById('m-end').value);
            document.getElementById('m-hours').value = fmtHours(h);
        }

        function submitOT() {
            const date = document.getElementById('m-date').value;
            const start = document.getElementById('m-start').value;
            const end = document.getElementById('m-end').value;
            const reason = document.getElementById('m-reason').value.trim();
            const hours = diffHours(start, end);
            if (!date || !start || !end || !reason || hours <= 0) {
                document.getElementById('m-error').classList.remove('hidden');
                return;
            }
            const today = new Date().toISOString().slice(0, 10);
            records.unshift({
                applyDate: today, date, start, end, hours,
                type: document.getElementById('m-type').value,
                comp: document.getElementById('m-comp').value,
                reason, status: '待簽核'
            });
            closeModal();
            render();
            showToast('success', '已提交加班申請');
        }

        function withdraw(i) {
            if (!confirm('確定要撤回此筆加班申請嗎？')) return;
            records[i].status = '撤回';
            render();
            showToast('info', '已撤回加班申請');
        }
        /* ===== 加班申請單 檢視彈窗（比照 請假申請單）===== */
        const OTV_APPLICANT = 'Dev（100258）';
        let otvOpinionsOn = false;
        function otvSteps(status) {
            const submit = { seq: '1', title: '提交申請', status: '已審批', sign: OTV_APPLICANT };
            if (/完成/.test(status)) return [submit, { seq: '2', title: '直屬主管', status: '已審批', sign: 'James' }, { seq: '3', title: '人資審核', status: '已審批', sign: 'Emma' }];
            if (/駁回/.test(status)) return [submit, { seq: '2', title: '直屬主管', status: '已駁回', sign: 'James' }, { seq: '3', title: '人資審核', status: '待審批', sign: '-' }];
            if (/撤回/.test(status)) return [submit, { seq: '2', title: '直屬主管', status: '待審批', sign: '-' }, { seq: '3', title: '人資審核', status: '待審批', sign: '-' }];
            return [submit, { seq: '2', title: '直屬主管', status: '審批中', sign: '-' }, { seq: '3', title: '人資審核', status: '待審批', sign: '-' }];
        }
        function otvBadgeClass(s) { return s === '審批中' ? 'ui-badge-info' : (s === '待審批' ? 'ui-badge-gray' : (s === '已駁回' ? 'ui-badge-danger' : 'ui-badge-success')); }
        function otvToggleOpinions() {
            otvOpinionsOn = !otvOpinionsOn;
            document.getElementById('otv-opinions').classList.toggle('hidden', !otvOpinionsOn);
            const tgl = document.getElementById('otv-op-toggle');
            tgl.classList.toggle('bg-[#3F51B5]', otvOpinionsOn); tgl.classList.toggle('bg-gray-300', !otvOpinionsOn);
            const knob = document.getElementById('otv-op-knob');
            knob.classList.toggle('translate-x-6', otvOpinionsOn); knob.classList.toggle('translate-x-1', !otvOpinionsOn);
        }
        function closeOtView() { document.getElementById('ot-view-modal').classList.add('hidden'); }
        function viewRecord(i) {
            const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            const r = records[i];
            document.getElementById('otv-docno').value = 'OT-RD-100258-' + String(r.date || '').replace(/\D/g, '');
            document.getElementById('otv-applytime').value = r.applyDate || '';
            document.getElementById('otv-name').value = OTV_APPLICANT;
            document.getElementById('otv-empno').value = '100258';
            document.getElementById('otv-project').value = 'GT';
            document.getElementById('otv-dept').value = 'RD';
            document.getElementById('otv-date').value = r.date || '';
            document.getElementById('otv-period').value = (r.start || '') + '–' + (r.end || '');
            document.getElementById('otv-hours').value = fmtHours(r.hours);
            document.getElementById('otv-type').value = r.type || '';
            document.getElementById('otv-comp').value = r.comp || '';
            document.getElementById('otv-reason').value = r.reason || '';
            const steps = otvSteps(r.status);
            document.getElementById('otv-progress-body').innerHTML = steps.map(s => `<tr>
                    <td class="px-3 py-1.5 text-center font-bold text-gray-800">${s.seq}</td>
                    <td class="px-3 py-1.5 text-center"><span class="ui-badge ${otvBadgeClass(s.status)}">${s.status}</span></td>
                    <td class="px-3 py-1.5 text-center text-gray-500">${s.seq === '1' ? '—' : '串聯'}</td>
                    <td class="px-3 py-1.5 text-gray-800">${s.title}</td>
                    <td class="px-3 py-1.5 text-gray-800">${esc(s.sign)}</td>
                    <td class="px-3 py-1.5 text-gray-600 font-mono">${s.seq === '1' ? '100258' : '-'}</td>
                    <td class="px-3 py-1.5 text-gray-400">${(s.status === '已審批' || s.status === '已駁回') ? esc(r.applyDate || '') + ' 10:00' : '-'}</td></tr>`).join('');
            document.getElementById('otv-opinions-body').innerHTML = steps.map(s => {
                const body = s.seq === '1'
                    ? `${esc(r.reason || '依專案需求提出加班申請。')}<ul class="mt-2 space-y-1"><li class="flex items-center gap-2 bg-white border border-gray-100 rounded px-3 py-1.5 text-xs text-gray-700"><span class="text-gray-400">📎</span><span class="truncate">加班證明.pdf</span></li></ul>`
                    : (s.status === '已審批' ? '已確認，同意本次加班。' : (s.status === '已駁回' ? '加班事由不足，請補充說明。' : '<span class="italic text-gray-400">尚未審批</span>'));
                return `<div class="flex items-start gap-3"><div class="w-20 shrink-0 text-xs font-bold text-gray-700">${s.title}<div class="font-normal text-gray-400 mt-0.5">${s.sign !== '-' ? esc(s.sign) : '—'}</div></div><div class="flex-1 text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-lg p-3">${body}</div></div>`;
            }).join('');
            document.getElementById('otv-flow').innerHTML = steps.map((s, idx, arr) => {
                const done = s.status === '已審批', active = s.status === '審批中', rej = s.status === '已駁回';
                const line = idx < arr.length - 1 ? `<span class="absolute left-[15px] top-8 -bottom-0 w-0.5 ${done ? 'bg-emerald-300' : 'bg-gray-200'}"></span>` : '';
                const circle = done ? 'bg-emerald-500 text-white' : active ? 'bg-[#4A90E2] text-white ring-4 ring-blue-100' : rej ? 'bg-rose-500 text-white' : 'bg-gray-200 text-gray-500';
                const sub = (s.sign && s.sign !== '-') ? esc(s.sign) : '—';
                const tag = done ? '<span class="ml-1 text-emerald-600 font-medium">· 已審批</span>' : active ? '<span class="ml-1 text-[#4A90E2] font-medium">· 審批中</span>' : rej ? '<span class="ml-1 text-rose-600 font-medium">· 已駁回</span>' : '';
                return `<div class="relative flex gap-3 pb-6 last:pb-0">${line}<div class="relative z-10 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${circle}">${done ? '✓' : rej ? '✕' : s.seq}</div><div class="pt-1 min-w-0"><div class="text-sm font-bold text-gray-800 whitespace-nowrap">${s.title}</div><div class="text-xs text-gray-400 mt-0.5 whitespace-nowrap">${sub}${tag}</div></div></div>`;
            }).join('');
            otvOpinionsOn = false;
            document.getElementById('otv-opinions').classList.add('hidden');
            const tgl = document.getElementById('otv-op-toggle'); tgl.classList.remove('bg-[#3F51B5]'); tgl.classList.add('bg-gray-300');
            const knob = document.getElementById('otv-op-knob'); knob.classList.remove('translate-x-6'); knob.classList.add('translate-x-1');
            document.getElementById('ot-view-modal').classList.remove('hidden');
        }

        /* ===== Toast ===== */
        function showToast(type, text) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-text').innerText = text;
            icon.className = type === 'success' ? 'fa-solid fa-circle-check text-emerald-400 text-base'
                : type === 'error' ? 'fa-solid fa-circle-xmark text-rose-400 text-base'
                : 'fa-solid fa-circle-info text-blue-400 text-base';
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            clearTimeout(window.__t);
            window.__t = setTimeout(() => { toast.style.transform = 'translateY(5rem)'; toast.style.opacity = '0'; }, 2400);
        }

        render();
    </script>
</body>
</html>
