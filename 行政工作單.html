<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行政工作單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC', background: '#F8F9FB', card: '#FFFFFF',
                    text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' } },
                fontFamily: { sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                boxShadow: { 'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)', 'modal': '0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04)' }
            } }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="mx-auto w-full space-y-6">

        <header class="ui-page-header">
            <h1 class="ui-page-title">行政工作單</h1>
            <button onclick="mockExport()" class="ui-btn ui-btn-secondary"><i class="fa-solid fa-download"></i> 匯出報表</button>
        </header>

        <!-- 篩選台 -->
        <div class="ui-card p-5 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">搜尋（單號/申請人/工作項目）</label>
                    <div class="ui-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="f-search" oninput="render()" placeholder="輸入關鍵字..." class="ui-input ui-search-input">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">工作類型</label>
                    <select id="f-type" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="用印申請">用印申請</option>
                        <option value="設備維修">設備維修</option>
                        <option value="門禁開通">門禁開通</option>
                        <option value="名片印製">名片印製</option>
                        <option value="場地借用">場地借用</option>
                        <option value="文具請領">文具請領</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">工作狀態</label>
                    <select id="f-work" onchange="render()" class="ui-select">
                        <option value="all">全部</option>
                        <option value="待執行">待執行</option>
                        <option value="執行中">執行中</option>
                        <option value="執行完成">執行完成</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-text-muted mb-1.5">申請日期區間</label>
                    <div class="flex items-center gap-1.5">
                        <input type="date" id="f-start" onchange="render()" class="ui-input flex-1 min-w-0">
                        <span class="text-gray-400 text-xs shrink-0">至</span>
                        <input type="date" id="f-end" onchange="render()" class="ui-input flex-1 min-w-0">
                    </div>
                </div>
            </div>
            <div class="flex justify-end items-center gap-2 pt-1"><button onclick="render()" class="ui-btn ui-btn-primary ui-btn-sm"><i class="fa-solid fa-magnifying-glass"></i> 查詢</button><button onclick="resetFilters()" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-arrows-rotate"></i> 重置</button></div>
        </div>

        <!-- 列表 -->
        <section class="ui-card p-4 sm:p-6">
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">行政工作單列表</h2>
                <span id="count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆資料</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100 custom-scrollbar">
                <table class="ui-table text-center">
                    <thead>
                        <tr>
                            <th scope="col" class="text-left">單號</th>
                            <th scope="col">申請人</th>
                            <th scope="col">部門</th>
                            <th scope="col">執行人</th>
                            <th scope="col" class="text-left">工作項目</th>
                            <th scope="col">類型</th>
                            <th scope="col">申請日期</th>
                            <th scope="col">工作狀態</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

            <div id="no-data" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-clipboard-list text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的行政工作單</p>
                <button onclick="resetFilters()" class="text-xs text-primary font-semibold hover:underline">清除篩選條件</button>
            </div>

            <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
                <span id="pagination-info" class="text-sm text-gray-500">顯示第 0 到 0 筆，共 0 筆記錄</span>
                <div class="flex gap-1">
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button class="ui-page-btn is-active">1</button>
                    <button class="ui-page-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>
        </section>
    </div>

    <!-- 詳情彈窗 -->
    <div id="detail-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-[#F0F2F5] rounded-xl shadow-2xl w-full max-w-[1450px] h-[90vh] flex flex-col overflow-hidden">

            <!-- 彈窗標題與關閉按鈕 -->
            <div class="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200 flex-shrink-0">
                <span class="font-bold text-gray-800 text-base"><span id="d-title">行政工作單</span></span>
                <button onclick="closeDetail()" class="bg-[#3F51B5] hover:bg-blue-800 text-white p-1 rounded transition-colors">
                    <i class="fa-solid fa-xmark text-lg leading-none px-0.5"></i>
                </button>
            </div>

            <!-- 表單卡片（可垂直滾動） -->
            <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">

                <!-- 基本資訊卡片 -->
                <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                    <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">基本資訊</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">文件編號</label>
                            <input type="text" disabled id="d-docno" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed font-mono">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">申請日期</label>
                            <input type="text" disabled id="d-date" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">工作項目</label>
                            <input type="text" disabled id="d-title-field" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">申請人</label>
                            <input type="text" disabled id="d-applicant" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">部門</label>
                            <input type="text" disabled id="d-dept" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">類型</label>
                            <input type="text" disabled id="d-type" class="w-full bg-[#EAECEF] border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-xs mb-1.5 font-medium">簽核狀態</label>
                            <div id="d-status" class="flex items-center h-[38px]"></div>
                        </div>
                    </div>
                </div>

                <!-- 工作內容卡片 -->
                <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-5">
                    <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">工作內容</div>
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div class="lg:col-span-8">
                            <label class="block text-gray-700 text-xs mb-1.5 font-semibold">工作項目</label>
                            <input type="text" disabled id="d-item" class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 font-medium">
                        </div>
                        <div class="lg:col-span-4">
                            <label class="block text-gray-700 text-xs mb-1.5 font-semibold">類型</label>
                            <input type="text" disabled id="d-type2" class="w-full bg-white border border-gray-200 rounded px-3 py-2 text-sm text-gray-800 font-medium">
                        </div>
                    </div>
                </div>

                <!-- 人員帳號異動明細卡片（僅帳號異動類型顯示） -->
                <div id="d-account-section" class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-4 hidden">
                    <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">人員帳號異動明細</div>
                    <div class="overflow-x-auto border border-gray-200 rounded-lg">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="bg-gray-50 text-gray-500 text-xs">
                                <tr>
                                    <th class="px-4 py-2.5 font-medium">欄位</th>
                                    <th class="px-4 py-2.5 font-medium">異動類型</th>
                                    <th class="px-4 py-2.5 font-medium">異動內容 / 刪除方式</th>
                                    <th class="px-4 py-2.5 font-medium">備註</th>
                                    <th class="px-4 py-2.5 font-medium">附件</th>
                                </tr>
                            </thead>
                            <tbody id="d-account-rows" class="divide-y divide-gray-100 text-gray-800"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 備註卡片 -->
                <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm space-y-3">
                    <div class="text-[#1A237E] font-bold text-[15px] border-b border-gray-100 pb-2">備註</div>
                    <textarea disabled rows="4" class="w-full border border-gray-200 rounded-lg p-3 text-sm text-gray-700 bg-white h-32 focus:outline-none"></textarea>
                </div>

                <!-- 審批線詳情卡片 -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <div class="bg-[#EEF2F6] px-6 py-3.5 flex items-center justify-between border-b border-gray-200">
                        <span class="font-bold text-[#1A237E] text-[15px]">審批線詳情</span>
                    </div>
                    <div class="p-4">
                        <div class="overflow-x-auto border border-gray-100 rounded-lg">
                            <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                    <tr class="border-b border-gray-200 bg-gray-50 text-gray-700 font-bold">
                                        <th class="px-4 py-3 text-center w-16">序號</th>
                                        <th class="px-4 py-3 text-center w-28">審批狀態</th>
                                        <th class="px-4 py-3 text-center w-24">級別</th>
                                        <th class="px-4 py-3">職稱</th>
                                        <th class="px-4 py-3">簽名</th>
                                        <th class="px-4 py-3 w-28">ID</th>
                                        <th class="px-4 py-3 w-40">審批時間</th>
                                    </tr>
                                </thead>
                                <tbody id="d-approval-rows" class="divide-y divide-gray-100 font-medium"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 固定底部按鈕區塊 -->
            <div class="bg-[#F8F9FA] border-t border-gray-200 px-6 py-4 flex flex-wrap justify-end gap-2.5 flex-shrink-0">
                <button onclick="closeDetail()" class="ui-btn ui-btn-secondary">關閉</button>
                <button onclick="withdrawDoc()" class="ui-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50"><i class="fa-solid fa-rotate-left"></i> 撤回</button>
                <button onclick="supplementDoc()" class="ui-btn bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100"><i class="fa-solid fa-circle-exclamation"></i> 要求補件</button>
                <button onclick="approveDoc()" class="ui-btn ui-btn-primary"><i class="fa-solid fa-circle-check"></i> 審批通過</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        // 行政工作單（含工作流）。實務上由「簽核」建立後同步至此；此為原型示意資料。
        const docs = [
            { docNo: 'AW-20260613-002-1', applicant: 'Benjamin', dept: 'RD', owner: 'IT 郵件管理員', title: '人員帳號異動 — E-mail 修改', type: '人員帳號異動', date: '2026-06-13', signStatus: '簽核中',
              approvals: [{ role: '申請人直屬主管', status: '已核准' }, { role: '資訊安全', status: '審批中' }],
              workflow: [{ task: '設定郵件帳號更名／轉址', owner: 'IT 郵件管理員', status: '處理中' }, { task: '通知申請人確認', owner: 'IT 郵件管理員', status: '待處理' }],
              accountChanges: [{ field: 'E-mail', action: '修改', detail: 'gibson.yang@roycetech.com', note: '配合網域整併調整', attach: '異動申請表.pdf' }] },
            { docNo: 'AW-20260613-002-2', applicant: 'Benjamin', dept: 'RD', owner: 'IT 系統管理員', title: '人員帳號異動 — Jira 新增', type: '人員帳號異動', date: '2026-06-13', signStatus: '待簽核',
              approvals: [{ role: '申請人直屬主管', status: '待審批' }, { role: '資訊安全', status: '待審批' }],
              workflow: [{ task: '建立 Jira 帳號與專案權限', owner: 'IT 系統管理員', status: '待處理' }],
              accountChanges: [{ field: 'Jira', action: '新增', detail: 'gibsonyang', note: '專案協作需求', attach: '' }] },
            { docNo: 'AW-20260613-002-3', applicant: 'Benjamin', dept: 'RD', owner: '行政總務', title: '人員帳號異動 — 門禁卡片 刪除', type: '人員帳號異動', date: '2026-06-13', signStatus: '簽核完成',
              approvals: [{ role: '申請人直屬主管', status: '已核准' }, { role: '行政主管', status: '已核准' }],
              workflow: [{ task: '停用門禁卡片', owner: '行政總務', status: '已完成' }, { task: '卡片回收／註記遺失', owner: '行政總務', status: '處理中' }],
              accountChanges: [{ field: '門禁卡片', action: '刪除', detail: '立即刪除', note: '原卡片遺失，立即停用', attach: '遺失聲明.jpg' }] },
            { docNo: 'AW-20260613-002-4', applicant: 'Benjamin', dept: 'RD', owner: '資訊安全', title: '人員帳號異動 — 指紋 刪除', type: '人員帳號異動', date: '2026-06-13', signStatus: '簽核中',
              approvals: [{ role: '申請人直屬主管', status: '已核准' }, { role: '資訊安全', status: '審批中' }],
              workflow: [{ task: '指紋資料轉移至新門禁系統', owner: '資訊安全', status: '處理中' }, { task: '原系統指紋資料刪除', owner: '資訊安全', status: '待處理' }],
              accountChanges: [{ field: '指紋', action: '刪除', detail: '資料轉移', note: '轉移至新門禁系統', attach: '' }] },
            { docNo: 'AW-20260613-002-5', applicant: 'Benjamin', dept: 'RD', owner: 'OA 系統管理員', title: '人員帳號異動 — OA 刪除', type: '人員帳號異動', date: '2026-06-13', signStatus: '待簽核',
              approvals: [{ role: '申請人直屬主管', status: '待審批' }, { role: '行政主管', status: '待審批' }],
              workflow: [{ task: 'OA 帳號設為暫時保留／停用', owner: 'OA 系統管理員', status: '待處理' }],
              accountChanges: [{ field: 'OA', action: '刪除', detail: '暫時保留', note: '留職停薪期間先行保留', attach: '' }] }
        ];

        let currentIndex = -1;

        /* ===== 狀態徽章 ===== */
        function signBadge(s) {
            const map = { '待簽核': 'ui-badge-info', '簽核中': 'ui-badge-warning', '簽核完成': 'ui-badge-success', '駁回': 'ui-badge-danger', '撤回': 'ui-badge-gray', '待補件': 'ui-badge-warning' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'} mx-auto">${s}</span>`;
        }
        function stepBadge(s) {
            const map = { '待處理': 'ui-badge-gray', '待審批': 'ui-badge-gray', '處理中': 'ui-badge-warning', '審批中': 'ui-badge-warning', '已完成': 'ui-badge-success', '已核准': 'ui-badge-success', '駁回': 'ui-badge-danger' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'}">${s}</span>`;
        }
        // 工作狀態：全完成→執行完成；有進行/完成→執行中；否則待執行
        function workStatus(d) {
            const st = d.workflow.map(w => w.status);
            if (st.length && st.every(s => s === '已完成')) return '執行完成';
            if (st.some(s => s === '處理中' || s === '已完成')) return '執行中';
            return '待執行';
        }
        function workBadge(s) {
            const map = { '待執行': 'ui-badge-gray', '執行中': 'ui-badge-warning', '執行完成': 'ui-badge-success' };
            return `<span class="ui-badge ${map[s] || 'ui-badge-gray'} mx-auto">${s}</span>`;
        }

        /* ===== 列表渲染與篩選 ===== */
        function render() {
            const kw = document.getElementById('f-search').value.trim().toLowerCase();
            const type = document.getElementById('f-type').value;
            const work = document.getElementById('f-work').value;
            const start = document.getElementById('f-start').value;
            const end = document.getElementById('f-end').value;

            const rows = docs.map((d, i) => ({ d, i })).filter(({ d }) =>
                (!kw || d.docNo.toLowerCase().includes(kw) || d.applicant.toLowerCase().includes(kw) || d.title.toLowerCase().includes(kw)) &&
                (type === 'all' || d.type === type) &&
                (work === 'all' || workStatus(d) === work) &&
                (!start || d.date >= start) && (!end || d.date <= end));

            const tbody = document.getElementById('tbody');
            const noData = document.getElementById('no-data');
            tbody.innerHTML = '';

            if (rows.length === 0) {
                tbody.parentElement.classList.add('hidden');
                noData.classList.remove('hidden');
                document.getElementById('count-badge').innerText = '0 筆資料';
                document.getElementById('pagination-info').innerText = '顯示第 0 到 0 筆，共 0 筆記錄';
                return;
            }
            tbody.parentElement.classList.remove('hidden');
            noData.classList.add('hidden');

            rows.forEach(({ d, i }) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50/70 transition-colors';
                tr.innerHTML = `
                    <td class="text-left font-mono font-semibold text-gray-600">${d.docNo}</td>
                    <td class="text-gray-700">${d.applicant}</td>
                    <td><span class="px-2 py-0.5 bg-gray-100 rounded text-xs font-semibold text-gray-700">${d.dept}</span></td>
                    <td class="text-gray-700 whitespace-nowrap">${d.owner || '—'}</td>
                    <td class="text-left text-gray-800">${d.title}</td>
                    <td><span class="px-2 py-0.5 bg-blue-50 text-primary rounded text-xs font-semibold">${d.type}</span></td>
                    <td class="text-gray-600">${d.date}</td>
                    <td>${workBadge(workStatus(d))}</td>
                    <td>
                        <button onclick="openDetail(${i})" class="ui-btn ui-btn-secondary ui-btn-sm mx-auto"><i class="fa-solid fa-circle-info"></i> 詳情</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('count-badge').innerText = `${rows.length} 筆資料`;
            document.getElementById('pagination-info').innerText = `顯示第 1 到 ${rows.length} 筆，共 ${rows.length} 筆記錄`;
        }

        function resetFilters() {
            document.getElementById('f-search').value = '';
            document.getElementById('f-type').value = 'all';
            document.getElementById('f-work').value = 'all';
            document.getElementById('f-start').value = '';
            document.getElementById('f-end').value = '';
            render();
        }

        /* ===== 詳情 ===== */
        function openDetail(i) {
            currentIndex = i;
            const d = docs[i];
            document.getElementById('d-title').innerText = `行政工作單 — ${d.docNo}`;

            // 基本資訊
            document.getElementById('d-docno').value = d.docNo;
            document.getElementById('d-date').value = d.date;
            document.getElementById('d-title-field').value = d.title;
            document.getElementById('d-applicant').value = d.applicant;
            document.getElementById('d-dept').value = d.dept;
            document.getElementById('d-type').value = d.type;
            document.getElementById('d-status').innerHTML = signBadge(d.signStatus).replace(' mx-auto', '');

            // 工作內容
            document.getElementById('d-item').value = d.title;
            document.getElementById('d-type2').value = d.type;

            // 人員帳號異動明細（若此工作單為帳號異動申請）
            const acctSec = document.getElementById('d-account-section');
            const acctRows = document.getElementById('d-account-rows');
            if (d.accountChanges && d.accountChanges.length) {
                acctRows.innerHTML = d.accountChanges.map(c => {
                    const actCls = c.action === '新增' ? 'ui-badge-success' : (c.action === '修改' ? 'ui-badge-info' : 'ui-badge-danger');
                    const detail = c.action === '刪除'
                        ? `<span class="ui-badge ui-badge-warning">${c.detail}</span>`
                        : (c.detail || '—');
                    const attach = c.attach
                        ? `<span class="text-primary"><i class="fa-solid fa-paperclip mr-1"></i>${c.attach}</span>`
                        : '<span class="text-gray-300">—</span>';
                    return `<tr>
                        <td class="px-4 py-2.5 font-medium">${c.field}</td>
                        <td class="px-4 py-2.5"><span class="ui-badge ${actCls}">${c.action}</span></td>
                        <td class="px-4 py-2.5">${detail}</td>
                        <td class="px-4 py-2.5 text-gray-600">${c.note || '—'}</td>
                        <td class="px-4 py-2.5">${attach}</td>
                    </tr>`;
                }).join('');
                acctSec.classList.remove('hidden');
            } else {
                acctSec.classList.add('hidden');
            }

            // 審批線詳情：審批人 + 後續工作
            let rows = d.approvals.map((a, idx) => `
                <tr>
                    <td class="px-4 py-3 text-center font-bold text-gray-800">${idx + 1}</td>
                    <td class="px-4 py-3 text-center">${stepBadge(a.status)}</td>
                    <td class="px-4 py-3 text-center text-gray-500">location</td>
                    <td class="px-4 py-3 text-gray-800">${a.role}</td>
                    <td class="px-4 py-3 text-gray-400">-</td>
                    <td class="px-4 py-3 text-gray-400 font-mono">-</td>
                    <td class="px-4 py-3 text-gray-400">-</td>
                </tr>`).join('');

            rows += `
                <tr class="bg-gray-50/50">
                    <td colspan="7" class="px-4 py-2 text-[11px] font-bold text-gray-500">後續工作（審批通過後執行）</td>
                </tr>`;
            rows += d.workflow.map((w, idx) => `
                <tr class="bg-gray-50/50">
                    <td class="px-4 py-3 text-center text-gray-400 font-bold">${idx + 1}</td>
                    <td class="px-4 py-3 text-center">${stepBadge(w.status)}</td>
                    <td class="px-4 py-3 text-center text-gray-400">location</td>
                    <td class="px-4 py-3 text-gray-600">${w.task}</td>
                    <td class="px-4 py-3 text-gray-500">${w.owner}</td>
                    <td class="px-4 py-3 text-gray-400 font-mono">-</td>
                    <td class="px-4 py-3 text-gray-400">-</td>
                </tr>`).join('');

            document.getElementById('d-approval-rows').innerHTML = rows;

            document.getElementById('detail-modal').classList.remove('hidden');
        }
        function approveDoc() {
            if (currentIndex < 0) return;
            const d = docs[currentIndex];
            d.signStatus = '簽核完成';
            d.approvals.forEach(a => a.status = '已核准');
            closeDetail(); render();
            showToast('success', `已審批通過 ${d.docNo}`);
        }
        function supplementDoc() {
            if (currentIndex < 0) return;
            docs[currentIndex].signStatus = '待補件';
            closeDetail(); render();
            showToast('info', `已要求補件 ${docs[currentIndex].docNo}`);
        }
        function withdrawDoc() {
            if (currentIndex < 0) return;
            docs[currentIndex].signStatus = '撤回';
            closeDetail(); render();
            showToast('info', `已撤回 ${docs[currentIndex].docNo}`);
        }
        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

        function mockExport() { showToast('success', '行政工作單報表已開始匯出'); }

        function showToast(type, text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            const icon = document.getElementById('toast-icon');
            if (type === 'success') { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-emerald-500/20"; icon.className = "fa-solid fa-circle-check text-emerald-400 text-base"; }
            else { toast.className = "fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border border-blue-500/20"; icon.className = "fa-solid fa-circle-info text-blue-400 text-base"; }
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            clearTimeout(window.__t); window.__t = setTimeout(() => { toast.style.transform = 'translateY(5rem)'; toast.style.opacity = '0'; }, 2400);
        }

        document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
        window.onload = render;
    </script>
</body>
</html>
