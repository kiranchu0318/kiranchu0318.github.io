<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封鎖設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#4A90E2', 'primary-light': '#EAF2FC', background: '#F8F9FB', card: '#FFFFFF',
                    text: { main: '#1F2937', muted: '#6B7280', light: '#9CA3AF' } },
                fontFamily: { sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                boxShadow: { 'card': '0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)', 'modal': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)' }
            } }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); font-family: theme('fontFamily.sans'); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
</head>
<body class="ui-page text-text-main antialiased relative">

    <div class="relative mx-auto w-full space-y-6">
        <header class="ui-page-header">
            <h1 class="ui-page-title">封鎖設定</h1>
        </header>

        <section class="ui-card p-4 sm:p-6 space-y-4">
            <div class="flex items-start gap-2.5 p-3.5 rounded-lg bg-primary-light/60 border border-primary/20">
                <i class="fa-solid fa-shield-halved text-primary mt-0.5"></i>
                <p class="text-sm text-gray-600 leading-relaxed">於此設定封鎖名單。被封鎖的 IP、帳號或裝置在封鎖期間內將無法登入或存取系統；可設定為永久封鎖或指定期間。</p>
            </div>

            <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3">
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                    <div class="ui-search w-full sm:w-72">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="blk-search" oninput="renderBlocks()" placeholder="搜尋對象 / 原因..." class="ui-input ui-search-input">
                    </div>
                    <select id="blk-filter-type" onchange="renderBlocks()" class="ui-select w-full sm:w-32">
                        <option value="">全部類型</option>
                        <option>IP 位址</option><option>帳號</option><option>裝置</option>
                    </select>
                </div>
                <button onclick="openBlockCreate()" class="ui-btn ui-btn-primary w-full sm:w-auto"><i class="fa-solid fa-plus"></i> 新增封鎖</button>
            </div>

            <div class="flex items-center gap-2">
                <h2 class="text-lg font-bold text-gray-900 whitespace-nowrap">封鎖名單</h2>
                <span id="blk-count-badge" class="bg-blue-50 text-primary text-xs px-2.5 py-1 rounded-md font-bold">0 筆</span>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-100">
                <table class="ui-table whitespace-nowrap">
                    <thead>
                        <tr>
                            <th class="text-center w-28">封鎖類型</th>
                            <th class="text-left w-40">對象</th>
                            <th class="text-left min-w-[220px]">封鎖原因</th>
                            <th class="text-left w-52">封鎖期間</th>
                            <th class="text-center w-24">狀態</th>
                            <th class="text-center w-44">操作</th>
                        </tr>
                    </thead>
                    <tbody id="blk-tbody"></tbody>
                </table>
            </div>
            <div id="blk-no-data" class="hidden py-16 text-center space-y-3">
                <div class="inline-flex p-4 bg-gray-50 text-gray-400 rounded-full"><i class="fa-solid fa-ban text-3xl"></i></div>
                <p class="text-sm text-text-muted font-medium">查無符合條件的封鎖項目</p>
            </div>
        </section>
    </div>

    <!-- 新增 / 編輯 封鎖 彈窗 -->
    <div id="blk-modal" class="fixed inset-0 bg-black/40 z-50 flex justify-center items-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-modal w-full max-w-lg max-h-[92vh] flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
                <h3 id="blk-modal-title" class="text-base font-bold text-gray-900">新增封鎖</h3>
                <button onclick="closeBlockModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="blk-form" onsubmit="return false" class="px-6 py-5 overflow-y-auto space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-[110px_1fr] gap-2 sm:gap-4 sm:items-center">
                    <label class="text-xs font-semibold text-gray-600">封鎖類型</label>
                    <select id="blk-type" class="ui-select"><option>IP 位址</option><option>帳號</option><option>裝置</option></select>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-[110px_1fr] gap-2 sm:gap-4 sm:items-center">
                    <label class="text-xs font-semibold text-gray-600">對象 <span class="text-rose-500">*</span></label>
                    <input type="text" id="blk-target" placeholder="例如：203.0.113.9 或 EMP301" class="ui-input">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-[110px_1fr] gap-2 sm:gap-4">
                    <label class="text-xs font-semibold text-gray-600 sm:pt-2">封鎖原因</label>
                    <textarea id="blk-reason" rows="2" placeholder="選填，說明封鎖原因" class="ui-input resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-[110px_1fr] gap-2 sm:gap-4">
                    <label class="text-xs font-semibold text-gray-600 sm:pt-1">封鎖期間</label>
                    <div class="flex flex-col gap-2">
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="radio" name="blk-period" data-label="永久" class="w-4 h-4 text-primary focus:ring-primary" checked onchange="toggleBlkPeriod()"> 永久封鎖</label>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700 cursor-pointer flex-wrap"><input type="radio" name="blk-period" data-label="指定期間" class="w-4 h-4 text-primary focus:ring-primary" onchange="toggleBlkPeriod()"> 指定期間</label>
                        <div id="blk-period-range" class="hidden flex items-center gap-2 pl-6">
                            <input type="date" id="blk-from" class="border border-gray-300 rounded px-2 py-1 text-sm">
                            <span class="text-gray-400 text-sm">~</span>
                            <input type="date" id="blk-to" class="border border-gray-300 rounded px-2 py-1 text-sm">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-[110px_1fr] gap-2 sm:gap-4 sm:items-center">
                    <label class="text-xs font-semibold text-gray-600">狀態</label>
                    <select id="blk-status" class="ui-select"><option value="true">啟用</option><option value="false">停用</option></select>
                </div>
            </form>
            <div class="flex justify-end gap-2.5 px-6 py-4 bg-gray-50 border-t border-gray-100 flex-shrink-0">
                <button onclick="closeBlockModal()" class="ui-btn ui-btn-secondary">取消</button>
                <button onclick="saveBlock()" class="ui-btn ui-btn-primary">儲存</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
        <span id="toast-text" class="text-sm font-medium">操作成功！</span>
    </div>

    <script>
        let blocks = [
            { id: 1, type: 'IP 位址', target: '203.0.113.9',  reason: '多次密碼錯誤，疑似暴力破解', period: '永久',     from: '', to: '',                 active: true },
            { id: 2, type: '帳號',    target: 'EMP301',       reason: '離職員工帳號，暫停存取',     period: '指定期間', from: '2026-06-15', to: '2026-12-31', active: true },
            { id: 3, type: '裝置',    target: 'DEV-8842-AC',  reason: '非公司核可裝置',             period: '永久',     from: '', to: '',                 active: false },
            { id: 4, type: 'IP 位址', target: '198.51.100.24', reason: '境外異常登入來源',           period: '指定期間', from: '2026-07-01', to: '2026-07-31', active: true }
        ];
        let editBlockId = null;

        const typeBadge = (t) => {
            const map = { 'IP 位址': 'ui-badge-info', '帳號': 'ui-badge-purple', '裝置': 'ui-badge-warning' };
            return `<span class="ui-badge ${map[t] || 'ui-badge-gray'}">${t}</span>`;
        };
        const periodText = (b) => b.period === '永久'
            ? '<span class="ui-badge ui-badge-danger">永久</span>'
            : `<span class="text-gray-600">${b.from || '—'} ~ ${b.to || '—'}</span>`;

        function renderBlocks() {
            const kw = (document.getElementById('blk-search').value || '').trim().toLowerCase();
            const ft = document.getElementById('blk-filter-type').value;
            const list = blocks.filter(b => (!kw || `${b.target} ${b.reason}`.toLowerCase().includes(kw)) && (!ft || b.type === ft));
            const tbody = document.getElementById('blk-tbody');
            tbody.innerHTML = list.map(b => {
                const badge = b.active ? '<span class="ui-badge ui-badge-success">啟用</span>' : '<span class="ui-badge bg-gray-100 text-gray-500">停用</span>';
                const toggle = b.active
                    ? `<button onclick="toggleBlock(${b.id})" class="ui-btn ui-btn-sm text-amber-600 border border-amber-200 hover:bg-amber-50"><i class="fa-solid fa-unlock"></i> 解除</button>`
                    : `<button onclick="toggleBlock(${b.id})" class="ui-btn ui-btn-sm text-emerald-600 border border-emerald-200 hover:bg-emerald-50"><i class="fa-solid fa-lock"></i> 啟用</button>`;
                return '<tr class="hover:bg-gray-50/70 transition-colors">' +
                    '<td class="text-center">' + typeBadge(b.type) + '</td>' +
                    '<td class="text-left font-mono font-semibold text-gray-800">' + b.target + '</td>' +
                    '<td class="text-left text-gray-600 whitespace-normal">' + (b.reason || '<span class="text-gray-300">—</span>') + '</td>' +
                    '<td class="text-left">' + periodText(b) + '</td>' +
                    '<td class="text-center">' + badge + '</td>' +
                    '<td class="text-center"><div class="flex items-center justify-center gap-2">' +
                        '<button onclick="openBlockEdit(' + b.id + ')" class="ui-btn ui-btn-secondary ui-btn-sm"><i class="fa-solid fa-pen-to-square"></i> 編輯</button>' + toggle +
                    '</div></td>' +
                    '</tr>';
            }).join('');
            document.getElementById('blk-count-badge').innerText = list.length + ' 筆';
            document.getElementById('blk-no-data').classList.toggle('hidden', list.length > 0);
            tbody.parentElement.classList.toggle('hidden', list.length === 0);
        }

        function toggleBlkPeriod() {
            const sel = document.querySelector('input[name="blk-period"]:checked');
            const custom = sel && sel.dataset.label === '指定期間';
            document.getElementById('blk-period-range').classList.toggle('hidden', !custom);
        }

        function openBlockCreate() {
            editBlockId = null;
            document.getElementById('blk-modal-title').innerText = '新增封鎖';
            document.getElementById('blk-form').reset();
            toggleBlkPeriod();
            document.getElementById('blk-modal').classList.remove('hidden');
        }
        function openBlockEdit(id) {
            const b = blocks.find(x => x.id === id);
            if (!b) return;
            editBlockId = id;
            document.getElementById('blk-modal-title').innerText = '編輯封鎖';
            document.getElementById('blk-form').reset();
            document.getElementById('blk-type').value = b.type;
            document.getElementById('blk-target').value = b.target;
            document.getElementById('blk-reason').value = b.reason || '';
            const pr = document.querySelector(`input[name="blk-period"][data-label="${b.period}"]`);
            if (pr) pr.checked = true;
            document.getElementById('blk-from').value = b.from || '';
            document.getElementById('blk-to').value = b.to || '';
            document.getElementById('blk-status').value = String(b.active);
            toggleBlkPeriod();
            document.getElementById('blk-modal').classList.remove('hidden');
        }
        function closeBlockModal() { document.getElementById('blk-modal').classList.add('hidden'); }

        function saveBlock() {
            const target = document.getElementById('blk-target').value.trim();
            if (!target) { showToast('error', '請填寫封鎖對象'); return; }
            const period = document.querySelector('input[name="blk-period"]:checked');
            const isCustom = period && period.dataset.label === '指定期間';
            const data = {
                type: document.getElementById('blk-type').value,
                target,
                reason: document.getElementById('blk-reason').value.trim(),
                period: isCustom ? '指定期間' : '永久',
                from: isCustom ? document.getElementById('blk-from').value : '',
                to: isCustom ? document.getElementById('blk-to').value : '',
                active: document.getElementById('blk-status').value === 'true'
            };
            if (editBlockId === null) {
                const nextId = blocks.length ? Math.max(...blocks.map(b => b.id)) + 1 : 1;
                blocks.push({ id: nextId, ...data });
                showToast('success', `已新增封鎖「${target}」`);
            } else {
                const b = blocks.find(x => x.id === editBlockId);
                if (b) Object.assign(b, data);
                showToast('success', `已更新封鎖「${target}」`);
            }
            closeBlockModal();
            renderBlocks();
        }
        function toggleBlock(id) {
            const b = blocks.find(x => x.id === id);
            if (!b) return;
            b.active = !b.active;
            renderBlocks();
            showToast(b.active ? 'success' : 'info', `已${b.active ? '啟用' : '解除'}封鎖「${b.target}」`);
        }

        function showToast(type, text) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-text').innerText = text;
            const base = 'fixed bottom-5 right-5 z-50 flex items-center gap-3 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-modal transform transition-all duration-300 border ';
            if (type === 'error') { toast.className = base + 'border-rose-500/20'; icon.className = 'fa-solid fa-circle-xmark text-rose-400 text-base'; }
            else if (type === 'info') { toast.className = base + 'border-blue-500/20'; icon.className = 'fa-solid fa-circle-info text-blue-400 text-base'; }
            else { toast.className = base + 'border-emerald-500/20'; icon.className = 'fa-solid fa-circle-check text-emerald-400 text-base'; }
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            clearTimeout(window.__t); window.__t = setTimeout(() => { toast.style.transform = 'translateY(5rem)'; toast.style.opacity = '0'; }, 2600);
        }

        document.getElementById('blk-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeBlockModal(); });
        renderBlocks();
    </script>
</body>
</html>
